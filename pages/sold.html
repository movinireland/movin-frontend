<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sold & Let Archive – Movin.ie</title>
  <meta name="description" content="Research sold and let property prices across Ireland on Movin.ie."/>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/favicon-apple-touch-icon-180x180.png"/>
  <meta name="theme-color" content="#1a5c45"/>
  <script>(function(){var t=localStorage.getItem('movin_theme');if(t&&t!=='auto')document.documentElement.setAttribute('data-theme',t)})()</script>
  <style>
    :root{--g:#1a5c45;--gd:#0e3d2e;--gl:#e9f4ef;--o:#e07b3f;--border:#e8e4dc}
    .archive-hero{background:linear-gradient(135deg,var(--g),var(--gd));padding:2rem 1.25rem 1.75rem;color:#fff}
    .archive-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:#fff;margin-bottom:.35rem}
    .archive-sub{font-size:13px;color:rgba(255,255,255,.7);font-weight:300}
    .filters-row{display:flex;gap:8px;padding:.75rem 1rem;background:var(--white,#fff);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
    .filters-row::-webkit-scrollbar{display:none}
    .f-select{border:1.5px solid var(--border);border-radius:50px;padding:7px 14px;font-size:13px;background:var(--white,#fff);color:#555;outline:none;font-family:inherit;-webkit-appearance:none;cursor:pointer;flex-shrink:0}
    .type-tabs{display:flex;gap:0;background:var(--white,#fff);border-bottom:1px solid var(--border)}
    .type-tab{padding:.75rem 1.25rem;font-size:13px;font-weight:500;color:#888;cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
    .type-tab.active{color:var(--g);border-bottom-color:var(--g)}
    .results-bar{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1rem;background:#f5f2ec}
    .results-count{font-size:13px;color:#888}
    .results-count strong{color:var(--text,#111);font-size:14px}
    .archive-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem;padding:.85rem}
    @media(max-width:380px){.archive-grid{grid-template-columns:1fr}}
    @media(min-width:640px){.archive-grid{grid-template-columns:repeat(3,1fr);gap:1rem;padding:1rem}}
    @media(min-width:1024px){.archive-grid{grid-template-columns:repeat(4,1fr)}}
    .archive-card{background:var(--white,#fff);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
    .archive-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
    .archive-photo{height:150px;overflow:hidden;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
    .archive-photo img{width:100%;height:100%;object-fit:cover}
    .archive-status{position:absolute;top:8px;left:8px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;color:#fff}
    .status-sold{background:#dc2626}
    .status-let{background:#1d4ed8}
    .archive-body{padding:.75rem}
    .archive-price{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--g);margin-bottom:3px}
    .archive-addr{font-size:12px;color:#888;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .archive-meta{display:flex;gap:8px;font-size:11px;color:#aaa;border-top:1px solid var(--border);padding-top:6px;flex-wrap:wrap}
    .archive-date{font-size:11px;color:#bbb;margin-top:4px}
    .pagination{display:flex;justify-content:center;gap:6px;padding:1rem;flex-wrap:wrap}
    .pg-btn{border:1.5px solid var(--border);background:var(--white,#fff);color:#555;border-radius:8px;padding:7px 13px;font-size:13px;cursor:pointer;font-family:inherit}
    .pg-btn.on{background:var(--g);color:#fff;border-color:var(--g)}
    [data-theme="dark"] .archive-card{background:#1a1a1a;border-color:#2a2a2a}
    [data-theme="dark"] .type-tabs,[data-theme="dark"] .filters-row{background:#1a1a1a;border-bottom-color:#2a2a2a}
    [data-theme="dark"] .f-select{background:#1e1e1e;border-color:#2a2a2a;color:#aaa}
    [data-theme="dark"] .results-bar{background:#141414}
  </style>
</head>
<body>
<nav class="nav" id="main-nav"></nav>

<div class="archive-hero">
  <div style="font-size:12px;color:rgba(255,255,255,.6);margin-bottom:.5rem"><a href="../index.html" style="color:rgba(255,255,255,.6);text-decoration:none">Home</a> › Sold & Let Archive</div>
  <h1 class="archive-title">🏷️ Sold & Let Archive</h1>
  <p class="archive-sub">Research property prices — see what sold and let across Ireland</p>
</div>

<div class="type-tabs">
  <button class="type-tab active" onclick="setType('',this)">All</button>
  <button class="type-tab" onclick="setType('sale',this)">Sold</button>
  <button class="type-tab" onclick="setType('rent',this)">Let</button>
</div>

<div class="filters-row">
  <select class="f-select" id="f-county" onchange="doSearch()">
    <option value="">All counties</option>
    <option>Dublin</option><option>Cork</option><option>Galway</option>
    <option>Limerick</option><option>Waterford</option><option>Kerry</option>
    <option>Meath</option><option>Kildare</option><option>Wicklow</option>
    <option>Wexford</option><option>Kilkenny</option><option>Clare</option>
    <option>Tipperary</option><option>Donegal</option><option>Mayo</option>
    <option>Sligo</option><option>Leitrim</option><option>Roscommon</option>
    <option>Longford</option><option>Westmeath</option><option>Offaly</option>
    <option>Laois</option><option>Carlow</option><option>Louth</option>
    <option>Monaghan</option><option>Cavan</option>
  </select>
</div>

<div class="results-bar">
  <div class="results-count" id="result-count">Loading…</div>
</div>

<div id="archive-grid" class="archive-grid">
  <div style="grid-column:1/-1;text-align:center;padding:3rem;color:#aaa"><div class="spinner" style="margin:0 auto 1rem"></div>Loading…</div>
</div>
<div id="pagination" class="pagination"></div>

<footer class="site-footer" id="site-footer"></footer>

<script>window.MOVIN_API_URL = 'https://movin-backend-production-1fb3.up.railway.app'</script>
<script src="../js/icons.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
  renderNav()
  var activeType = ''
  var currentPage = 1

  function setType(type, el) {
    activeType = type
    document.querySelectorAll('.type-tab').forEach(function(t) { t.classList.remove('active') })
    el.classList.add('active')
    currentPage = 1
    doSearch()
  }

  async function doSearch(page) {
    currentPage = page || 1
    var grid = document.getElementById('archive-grid')
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#aaa"><div class="spinner" style="margin:0 auto 1rem"></div>Loading…</div>'

    var params = new URLSearchParams({ page: currentPage, limit: 16 })
    if (activeType) params.append('listing_type', activeType)
    var county = document.getElementById('f-county').value
    if (county) params.append('county', county)

    try {
      var res = await fetch(window.MOVIN_API_URL + '/api/listings/sold?' + params)
      var data = await res.json()
      var listings = data.listings || []
      var total = data.total || 0

      document.getElementById('result-count').innerHTML =
        '<strong>' + total.toLocaleString('en-IE') + '</strong> ' + (activeType === 'sale' ? 'sold' : activeType === 'rent' ? 'let' : 'sold & let') + ' properties' + (county ? ' in ' + county : '')

      if (!listings.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#aaa"><div style="font-size:36px;margin-bottom:.75rem">🏠</div><div>No archived properties found</div></div>'
        document.getElementById('pagination').innerHTML = ''
        return
      }

      grid.innerHTML = listings.map(function(l) {
        var photo = l.primary_photo
          ? (l.primary_photo.startsWith('http') ? l.primary_photo : window.MOVIN_API_URL + l.primary_photo)
          : null
        var dateStr = l.updated_at ? new Date(l.updated_at).toLocaleDateString('en-IE', { month:'short', year:'numeric' }) : ''
        return '<div class="archive-card" onclick="window.location.href=\'listing.html?id=' + l.id + '\'">' +
          '<div class="archive-photo">' +
            (photo ? '<img src="' + photo + '" loading="lazy"/>' : '🏡') +
            '<span class="archive-status status-' + l.status + '">' + (l.status === 'sold' ? '🏷 Sold' : '🔑 Let') + '</span>' +
          '</div>' +
          '<div class="archive-body">' +
            '<div class="archive-price">€' + parseInt(l.price).toLocaleString('en-IE') + (l.status === 'let' ? '/mo' : '') + '</div>' +
            '<div class="archive-addr">' + (l.address_line1 || l.address_area || l.county) + '</div>' +
            '<div class="archive-meta">' +
              (l.bedrooms ? '<span>' + l.bedrooms + ' bed</span>' : '') +
              (l.bathrooms ? '<span>' + l.bathrooms + ' bath</span>' : '') +
              (l.floor_size_m2 ? '<span>' + l.floor_size_m2 + 'm²</span>' : '') +
              (l.floor_size_m2 && l.price ? '<span>€' + Math.round(parseInt(l.price)/parseInt(l.floor_size_m2)).toLocaleString('en-IE') + '/m²</span>' : '') +
            '</div>' +
            '<div class="archive-date">' + dateStr + ' · ' + l.county + '</div>' +
          '</div>' +
        '</div>'
      }).join('')

      // Pagination
      var pg = document.getElementById('pagination')
      if (data.pages <= 1) { pg.innerHTML = ''; return }
      var html = ''
      if (data.page > 1) html += '<button class="pg-btn" onclick="doSearch(' + (data.page-1) + ')">‹</button>'
      for (var i = Math.max(1,data.page-2); i <= Math.min(data.pages,data.page+2); i++) {
        html += '<button class="pg-btn' + (i===data.page?' on':'') + '" onclick="doSearch(' + i + ')">' + i + '</button>'
      }
      if (data.page < data.pages) html += '<button class="pg-btn" onclick="doSearch(' + (data.page+1) + ')">›</button>'
      pg.innerHTML = html

    } catch(e) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#aaa">' + e.message + '</div>'
    }
  }

  doSearch()
  setTimeout(function() { if (typeof renderFooter === 'function') renderFooter() }, 300)
</script>
</body>
</html>
