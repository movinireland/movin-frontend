<!DOCTYPE html>
<html lang="en">
<script>
(function(){
  var t=localStorage.getItem('movin_theme');
  if(t&&t!=='auto') document.documentElement.setAttribute('data-theme',t);
})()
</script>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Latest Listings – Movin.ie</title>
  <meta name="description" content="The newest residential and commercial properties listed on Movin.ie in the last 7 days."/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/favicon.svg"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <meta name="theme-color" content="#1a5c45"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Movin"/>
  <style>
    :root{--g:#1a5c45;--gd:#0e3d2e;--gl:#e9f4ef;--o:#e07b3f;--border:#e8e4dc}
    *{box-sizing:border-box}

    .lt-hero{background:linear-gradient(160deg,#1a5c45 0%,#0e3d2e 100%);padding:2.75rem 1.25rem 4rem;position:relative;overflow:hidden}
    .lt-hero::before{content:'';position:absolute;width:520px;height:520px;border-radius:50%;background:rgba(255,255,255,.05);top:-200px;left:-180px;pointer-events:none}
    .lt-hero::after{content:'';position:absolute;width:420px;height:420px;border-radius:50%;background:rgba(224,123,63,.10);bottom:-200px;right:-160px;pointer-events:none}
    .lt-hero-inner{max-width:1080px;margin:0 auto;position:relative;z-index:2}
    .lt-eyebrow{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:2px;text-transform:uppercase;margin-bottom:.6rem}
    .lt-h1{font-family:'Playfair Display',serif;font-size:clamp(28px,7vw,42px);font-weight:900;color:#fff;line-height:1.05;margin-bottom:.4rem}
    .lt-h1 em{font-style:normal;color:#e07b3f}
    .lt-sub{font-size:13px;color:rgba(255,255,255,.7);font-weight:300;max-width:540px;line-height:1.6}

    .lt-toolbar{
      background:var(--white,#fff);border-radius:18px;margin:1.5rem auto -2.25rem;
      box-shadow:0 12px 36px rgba(0,0,0,.08);padding:.85rem;max-width:1080px;
      position:relative;z-index:5;display:flex;flex-direction:column;gap:.65rem
    }
    .lt-pills{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
    .lt-pills::-webkit-scrollbar{display:none}
    .lt-pill{
      display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--border);
      border-radius:50px;padding:7px 14px;font-size:13px;font-weight:500;color:#666;
      background:#fafaf8;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;
      transition:all .15s;-webkit-tap-highlight-color:transparent
    }
    .lt-pill svg{width:14px;height:14px}
    .lt-pill.on{background:var(--g);color:#fff;border-color:var(--g)}
    .lt-pill .lt-count{display:inline-block;background:rgba(255,255,255,.18);color:inherit;font-size:11px;font-weight:600;padding:1px 7px;border-radius:50px;margin-left:2px}
    .lt-pill:not(.on) .lt-count{background:rgba(0,0,0,.06);color:#666}

    .lt-row2{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
    .lt-row2 .lt-search{
      flex:1;min-width:160px;border:1.5px solid var(--border);border-radius:50px;
      padding:9px 14px;font-size:13px;font-family:inherit;background:#fafaf8;
      color:var(--text,#111);outline:none;-webkit-appearance:none
    }
    .lt-row2 .lt-search:focus{border-color:var(--g);background:var(--white,#fff)}
    .lt-row2 .lt-sort{
      border:1.5px solid var(--border);border-radius:50px;padding:8px 14px;font-size:12px;
      font-family:inherit;background:#fff;color:#555;font-weight:500;outline:none;cursor:pointer;-webkit-appearance:none
    }

    .lt-results{max-width:1080px;margin:0 auto;padding:3rem 0 2.5rem}
    .lt-bar{display:flex;justify-content:space-between;align-items:center;padding:.5rem 1rem 1rem;flex-wrap:wrap;gap:.5rem}
    .lt-count-line{font-size:13px;color:var(--muted,#777);font-weight:400}
    .lt-count-line strong{color:var(--text,#111);font-weight:700}
    .lt-fresh{display:inline-flex;align-items:center;gap:5px;background:var(--gl);color:var(--g);font-size:11px;font-weight:600;padding:3px 10px;border-radius:50px;text-transform:uppercase;letter-spacing:.5px;margin-left:8px}

    .listings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.65rem;padding:0 1rem}
    @media(max-width:380px){.listings-grid{grid-template-columns:1fr}}
    @media(min-width:600px){.listings-grid{grid-template-columns:repeat(3,1fr);gap:.85rem}}
    @media(min-width:960px){.listings-grid{grid-template-columns:repeat(4,1fr);gap:1rem}}

    .lt-empty{
      grid-column:1/-1;text-align:center;padding:3rem 1rem;background:var(--white,#fff);
      border:1px dashed var(--border);border-radius:16px;color:var(--muted,#888)
    }
    .lt-empty h4{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text,#111);margin-bottom:.5rem}
    .lt-empty p{font-size:13px;font-weight:300;margin-bottom:1rem}
    .lt-empty .btn{background:var(--g);color:#fff;padding:10px 20px;font-size:13px}

    [data-theme="dark"] .lt-toolbar{background:#1a1a1a;border:1px solid #2a2a2a}
    [data-theme="dark"] .lt-row2 .lt-search,[data-theme="dark"] .lt-row2 .lt-sort{background:#0f0f0f;border-color:#2a2a2a;color:#e8e8e8}
    [data-theme="dark"] .lt-pill{background:#1e1e1e;border-color:#2a2a2a;color:#aaa}
    [data-theme="dark"] .lt-empty{background:#1a1a1a;border-color:#2a2a2a}
    @media(prefers-color-scheme:dark){
      :root:not([data-theme="light"]) .lt-toolbar{background:#1a1a1a;border:1px solid #2a2a2a}
      :root:not([data-theme="light"]) .lt-row2 .lt-search,
      :root:not([data-theme="light"]) .lt-row2 .lt-sort{background:#0f0f0f;border-color:#2a2a2a;color:#e8e8e8}
      :root:not([data-theme="light"]) .lt-pill{background:#1e1e1e;border-color:#2a2a2a;color:#aaa}
      :root:not([data-theme="light"]) .lt-empty{background:#1a1a1a;border-color:#2a2a2a}
    }
  </style>
</head>
<body>

<nav class="nav" id="main-nav"></nav>
<div class="toast-wrap" id="toast-wrap"></div>

<div class="lt-hero">
  <div class="lt-hero-inner">
    <div class="lt-eyebrow">Fresh on Movin</div>
    <h1 class="lt-h1">The latest listings <em>across Ireland</em></h1>
    <p class="lt-sub">Every property listed on Movin.ie in the past 7 days — residential and commercial, all in one place.</p>
  </div>
</div>

<div class="lt-toolbar">
  <div class="lt-pills" id="lt-pills"></div>
  <div class="lt-row2">
    <input class="lt-search" id="lt-q" type="text" placeholder="Filter by area, county, Eircode…" oninput="onQuery()" />
    <select class="lt-sort" id="lt-sort" onchange="render()">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first (within 7 days)</option>
      <option value="price_asc">Price low → high</option>
      <option value="price_desc">Price high → low</option>
    </select>
  </div>
</div>

<div class="lt-results">
  <div class="lt-bar">
    <div class="lt-count-line" id="lt-count">Loading the latest…</div>
    <div><span class="lt-fresh">⏱ Last 7 days</span></div>
  </div>
  <div class="listings-grid" id="lt-grid">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</div>

<footer class="site-footer" id="site-footer"></footer>

<script>window.MOVIN_API_URL = 'https://movin-backend-production-1fb3.up.railway.app'</script>
<script src="../js/icons.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
  renderNav('latest')

  // ── State ────────────────────────────────────────────────────────────────
  var ALL = []         // raw listings (≤7 days old)
  var SAVED = []       // saved IDs

  var FILTERS = [
    { key:'all',         label:'All',                       match: function(){ return true }, icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/></svg>' },
    { key:'residential', label:'Residential',               match: function(l){ return !isCommercialType(l.property_type) }, icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 4l9 8"/><path d="M5 10v10h14V10"/></svg>' },
    { key:'commercial',  label:'Commercial',                match: function(l){ return isCommercialType(l.property_type) },  icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4 8 4v14"/></svg>' },
    { key:'sale',        label:'For sale',                  match: function(l){ return l.listing_type === 'sale' },  icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2v20M5 9l7-7 7 7"/></svg>' },
    { key:'rent',        label:'To rent',                   match: function(l){ return l.listing_type === 'rent' || l.listing_type === 'share' }, icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>' }
  ]
  var COMMERCIAL_TYPES = ['commercial','office','offices','retail','shop','industrial','warehouse','factory','hospitality','hotel','pub','restaurant','leisure','healthcare','medical','clinic','mixed-use','mixeduse','investment','development','agricultural','land']
  function isCommercialType(t){
    if (!t) return false
    return COMMERCIAL_TYPES.indexOf(String(t).toLowerCase()) !== -1
  }

  var state = { cat: 'all', q: '' }

  // Optional initial filter from query
  ;(function(){
    var p = new URLSearchParams(location.search)
    if (p.get('cat')) state.cat = p.get('cat')
  })()

  // ── Pills ────────────────────────────────────────────────────────────────
  function renderPills(){
    var el = document.getElementById('lt-pills')
    el.innerHTML = FILTERS.map(function(f){
      var n = ALL.filter(f.match).length
      return ''
        + '<button class="lt-pill' + (state.cat===f.key?' on':'') + '" data-cat="' + f.key + '" onclick="setCat(\'' + f.key + '\')">'
        +   f.icon + f.label
        +   (n ? '<span class="lt-count">' + n + '</span>' : '')
        + '</button>'
    }).join('')
  }
  window.setCat = function(k){ state.cat = k; renderPills(); render() }

  function onQuery(){
    state.q = (document.getElementById('lt-q').value || '').trim().toLowerCase()
    render()
  }
  window.onQuery = onQuery

  // ── Render results ───────────────────────────────────────────────────────
  function render(){
    var f = FILTERS.find(function(x){return x.key===state.cat}) || FILTERS[0]
    var rows = ALL.filter(f.match)
    if (state.q){
      rows = rows.filter(function(l){
        var hay = ((l.title||'') + ' ' + (l.address_line1||'') + ' ' + (l.address_area||'') + ' ' + (l.county||'') + ' ' + (l.eircode||'')).toLowerCase()
        return hay.indexOf(state.q) !== -1
      })
    }

    var sort = document.getElementById('lt-sort').value
    if (sort === 'newest')     rows.sort(function(a,b){return new Date(b.created_at||0) - new Date(a.created_at||0)})
    if (sort === 'oldest')     rows.sort(function(a,b){return new Date(a.created_at||0) - new Date(b.created_at||0)})
    if (sort === 'price_asc')  rows.sort(function(a,b){return (a.price||0)-(b.price||0)})
    if (sort === 'price_desc') rows.sort(function(a,b){return (b.price||0)-(a.price||0)})

    var grid = document.getElementById('lt-grid')
    document.getElementById('lt-count').innerHTML = rows.length
      ? '<strong>' + rows.length + '</strong> ' + (rows.length === 1 ? 'listing' : 'listings')
        + (state.cat !== 'all' ? ' · ' + (FILTERS.find(function(x){return x.key===state.cat})||{}).label.toLowerCase() : '')
        + (state.q ? ' · matching "' + state.q + '"' : '')
      : 'No matching listings'

    if (!rows.length){
      grid.innerHTML = ''
        + '<div class="lt-empty">'
        +   '<h4>Nothing matches yet</h4>'
        +   '<p>Try a different filter or check back soon — we add new listings every day.</p>'
        +   '<a class="btn btn-primary" href="search.html">Browse all listings →</a>'
        + '</div>'
      return
    }

    grid.innerHTML = rows.map(function(l){
      try { return window.buildPropertyCard(l, SAVED) }
      catch(e){ return '' }
    }).join('')
  }

  // ── Load ─────────────────────────────────────────────────────────────────
  async function load(){
    var sevenDaysAgo = new Date(Date.now() - 7 * 86400000)
    var seen = {}
    var listings = []

    // Pull a wide net: newest sort, large page, both listing types.
    // Backend may not have a dedicated "since" filter, so we filter client-side.
    var queries = [
      { sort:'newest', limit:200 },
      { sort:'newest', limit:200, listing_type:'sale' },
      { sort:'newest', limit:200, listing_type:'rent' }
    ]
    // Also try each commercial property_type so commercial listings show up
    ;['office','retail','industrial','hospitality','healthcare','mixed-use','warehouse','land','commercial']
      .forEach(function(t){ queries.push({ sort:'newest', limit:50, property_type: t }) })

    try {
      for (var i = 0; i < queries.length; i++){
        try {
          var res = await window.API.listings.search(queries[i])
          if (res && Array.isArray(res.listings)){
            res.listings.forEach(function(l){
              if (seen[l.id]) return
              if (!l.created_at) return
              if (new Date(l.created_at) < sevenDaysAgo) return
              seen[l.id] = 1
              listings.push(l)
            })
          }
        } catch(_){}
      }
    } catch(_){}

    // Try to grab saved IDs (if logged in)
    try {
      if (window.API.auth.isLoggedIn()){
        var sv = await window.API.saved.all()
        if (sv && Array.isArray(sv.saved)) SAVED = sv.saved.map(function(s){return s.listing_id || s.id})
      }
    } catch(_){}

    ALL = listings
    renderPills()
    render()
  }

  load()
</script>
</body>
</html>
