<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – Movin.ie</title>
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    .auth-wrap { min-height:calc(100vh - 64px); display:flex; align-items:center; justify-content:center; padding:2rem; }
    .auth-card { background:#fff; border-radius:20px; padding:2.5rem; width:100%; max-width:420px; border:1px solid var(--border); box-shadow:var(--shadow-lg); }
    .auth-logo { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:var(--green); text-align:center; margin-bottom:.5rem; cursor:pointer; }
    .auth-logo span { color:var(--orange); }
    .auth-title { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; text-align:center; margin-bottom:.5rem; }
    .auth-sub { font-size:14px; color:#999; text-align:center; margin-bottom:2rem; font-weight:300; }
    .auth-switch { text-align:center; margin-top:1.5rem; font-size:14px; color:#888; }
    .auth-switch a { color:var(--green); font-weight:500; cursor:pointer; }
    .divider-text { display:flex; align-items:center; gap:10px; margin:1.25rem 0; }
    .divider-text span { font-size:12px; color:#ccc; white-space:nowrap; }
    .divider-text::before,.divider-text::after { content:''; flex:1; border-top:1px solid var(--border); }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo" onclick="window.location.href='../index.html'">mov<span>in</span></div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to manage your listings and enquiries</p>
      <div id="auth-alert"></div>
      <form onsubmit="doLogin(event)">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Your password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn" style="margin-top:.5rem">Sign in</button>
      </form>
      <p class="auth-switch">Don't have an account? <a href="register.html">Create one free →</a></p>
    </div>
  </div>

  <script>
  window.MOVIN_API_URL = 'https://movin-backend-production-1fb3.up.railway.app'
</script>
  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    // Already logged in? redirect to dashboard
    if (API.auth.isLoggedIn()) window.location.href = 'dashboard.html'
    renderNav()

    async function doLogin(e) {
      e.preventDefault()
      const btn = document.getElementById('login-btn')
      const alert = document.getElementById('auth-alert')
      btn.classList.add('btn-loading'); btn.disabled = true
      alert.innerHTML = ''
      try {
        await API.auth.login(document.getElementById('email').value, document.getElementById('password').value)
        const redirect = new URLSearchParams(window.location.search).get('redirect') || 'dashboard.html'
        window.location.href = redirect
      } catch(err) {
        alert.innerHTML = `<div class="alert alert-error">${err.message}</div>`
        btn.classList.remove('btn-loading'); btn.disabled = false
      }
    }
  </script>
</body>
</html>
