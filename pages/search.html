<!DOCTYPE html>
<html lang="en">
  <script>
(function(){
  var t=localStorage.getItem('movin_theme');
  if(t&&t!=='auto') document.documentElement.setAttribute('data-theme',t);
})()
</script>
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Properties – Movin.ie</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/favicon-apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png"/>
  <meta name="theme-color" content="#1a5c45"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Movin"/>
  <style>
    :root{--g:#1a5c45;--gd:#0e3d2e;--gl:#e9f4ef;--o:#e07b3f;--border:#e8e4dc}
    *{box-sizing:border-box}

    /* ── Top search bar ── */
    /* ── Premium search topbar ── */
    .sr-topbar{background:var(--white,#fff);border-bottom:1px solid var(--border);padding:.75rem 1rem .65rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.07);transition:box-shadow .2s}
    /* Bigger search bar */
    .sr-search-row{display:flex;gap:8px;align-items:center;margin-bottom:.65rem;position:relative}
    .sr-input{flex:1;border:2px solid var(--border);border-radius:50px;padding:11px 18px;font-size:14px;font-family:inherit;background:var(--white,#fff);color:var(--text,#111);outline:none;transition:border-color .15s;min-width:0}
    .sr-input:focus{border-color:var(--green,#1a5c45)}
    .sr-search-btn{background:var(--green,#1a5c45);color:#fff;border:none;border-radius:50px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:background .15s}
    .sr-search-btn:active{background:#0e3d2e}
    .sr-search-row{display:flex;gap:8px;margin-bottom:.65rem;position:relative}
    .sr-input{flex:1;min-width:0;border:2px solid var(--border);border-radius:50px;padding:11px 18px;font-size:14px;outline:none;background:#fafaf8;-webkit-appearance:none;font-family:inherit;transition:border .15s}
    .sr-input:focus{border-color:var(--g);background:#fff}
    .sr-search-btn{background:var(--g);color:#fff;border:none;border-radius:50px;padding:11px 20px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
    .sr-search-btn:active{transform:scale(.97)}

    /* ── Autocomplete ── */
    .search-suggestions{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:0 12px 32px rgba(0,0,0,.12);z-index:200;margin-top:6px;overflow:hidden;display:none}
    .search-suggestions.open{display:block}
    .suggestion-item{padding:.85rem 1rem;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f5f2ec;-webkit-tap-highlight-color:transparent}
    .suggestion-item:last-child{border-bottom:none}
    .suggestion-item:hover,.suggestion-item:active{background:var(--gl)}
    .suggestion-icon{font-size:16px;flex-shrink:0}
    .suggestion-main{font-weight:500;color:#111}
    .suggestion-sub{font-size:12px;color:#aaa}
    .suggestion-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--gl);color:var(--g);font-weight:500;margin-left:auto;flex-shrink:0}

    /* ── Type pills ── */
    .sr-pills{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none}
    .sr-pills::-webkit-scrollbar{display:none}
    .pill{border:1.5px solid var(--border);border-radius:50px;padding:7px 16px;font-size:13px;font-weight:500;background:#fafaf8;cursor:pointer;color:#666;white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0;font-family:inherit}
    .pill.active{background:var(--g);color:#fff;border-color:var(--g)}
    .filter-btn{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--border);border-radius:50px;padding:7px 14px;font-size:13px;font-weight:500;background:#fafaf8;cursor:pointer;color:#555;flex-shrink:0;font-family:inherit;-webkit-tap-highlight-color:transparent}
    .filter-btn.has-filters{background:var(--gl);border-color:var(--g);color:var(--g)}

    /* ── Search chip ── */
    .search-chip{display:inline-flex;align-items:center;gap:6px;background:var(--gl);color:var(--g);border:1px solid #c8dfd4;border-radius:50px;padding:5px 14px;font-size:13px;font-weight:500;margin-bottom:.5rem}
    .search-chip button{background:none;border:none;color:var(--g);cursor:pointer;font-size:16px;line-height:1;padding:0}

    /* ── Results bar ── */
    .results-header{display:flex;justify-content:space-between;align-items:center;padding:.65rem 1rem;background:#f5f2ec}
    .results-count{font-size:13px;font-weight:500;color:#555}
    .results-count strong{color:#111;font-size:14px}
    .sort-select{border:1.5px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;background:#fff;outline:none;font-family:inherit;-webkit-appearance:none;cursor:pointer;color:#555;font-weight:500}

    /* ── Grid ── */
    .listings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.65rem;padding:.65rem}
    @media(max-width:360px){.listings-grid{grid-template-columns:1fr}}
    @media(min-width:600px){.listings-grid{grid-template-columns:repeat(3,1fr);gap:.85rem;padding:.85rem}}
    @media(min-width:900px){.listings-grid{grid-template-columns:repeat(4,1fr)}}
    @media(max-width:380px){.listings-grid{grid-template-columns:1fr;gap:.75rem}}
    @media(min-width:640px){.listings-grid{grid-template-columns:repeat(2,1fr);gap:1rem;padding:1rem}}
    @media(min-width:900px){.listings-grid{grid-template-columns:repeat(3,1fr)}}

    /* ── Filter modal ── */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-bg.open{opacity:1;pointer-events:all}
    .modal{background:#fff;border-radius:24px 24px 0 0;padding:1.25rem 1.25rem 2rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s ease}
    .modal-bg.open .modal{transform:translateY(0)}
    .modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 1rem}
    .modal-title{font-family:'Playfair Display', Georgia, 'Times New Roman', serif;font-size:20px;font-weight:700;margin-bottom:1.25rem}
    .filter-section{margin-bottom:1.25rem}
    .filter-section-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:.65rem}
    .filter-opts{display:flex;flex-wrap:wrap;gap:6px}
    .f-opt{border:1.5px solid var(--border);border-radius:50px;padding:6px 14px;font-size:13px;cursor:pointer;background:#fafaf8;color:#666;transition:all .15s;font-family:inherit;-webkit-tap-highlight-color:transparent}
    .f-opt.on{border-color:var(--g);color:var(--g);background:var(--gl);font-weight:500}
    .f-range{display:flex;gap:8px;align-items:center}
    .f-range select{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:9px 12px;font-size:13px;background:#fafaf8;outline:none;font-family:inherit;-webkit-appearance:none}
    .ber-wrap{display:flex;flex-wrap:wrap;gap:5px}
    .ber-btn{padding:5px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:#fafaf8;font-family:inherit;transition:all .15s}
    .ber-btn.on{background:#2aaa50;color:#fff;border-color:#2aaa50}
    .cb-col{display:flex;flex-direction:column;gap:10px}
    .cb-row{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:#555}
    .cb-row input{accent-color:var(--g);width:18px;height:18px;cursor:pointer}

    /* ── Filter apply btn ── */
    .filter-apply{width:100%;background:var(--g);color:#fff;border:none;border-radius:50px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:.5rem}

    /* ── Pagination ── */
    .pg-btn{border:1.5px solid var(--border);background:#fff;color:#555;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
    .pg-btn.on{background:var(--g);color:#fff;border-color:var(--g)}
    .pg-btn:hover:not(.on){background:var(--gl)}

    /* ── Empty ── */
    .empty{text-align:center;padding:3rem 1rem;grid-column:1/-1}

    /* ── Map/alert strip ── */
    .quick-links{display:flex;gap:8px;padding:.5rem 1rem;overflow-x:auto;scrollbar-width:none;background:#f5f2ec}
    .quick-links::-webkit-scrollbar{display:none}
    .ql-btn{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--border);border-radius:50px;padding:6px 14px;font-size:12px;font-weight:500;color:#555;cursor:pointer;white-space:nowrap;text-decoration:none;flex-shrink:0;-webkit-tap-highlight-color:transparent}
    .ql-btn:hover{border-color:var(--g);color:var(--g)}

  /* ════════════════════════════════════════════════════════════════════
     MODERN MARKETPLACE — search page (matches the homepage)
     Warm cream paper, rounded tactile surfaces, soft shadows, Heath
     green accents. Desktop gets a roomy centred column; mobile gets a
     clean sticky search header.
     ════════════════════════════════════════════════════════════════════ */
  :root{
    --g:#1a5c45; --gd:#0e3d2e; --gl:#e3ebe1; --o:#d97847;
    --border:#dad6c8; --paper:#faf7f0; --paper-deep:#f3eee0;
    --white:#fffdf8; --text:#1f2421; --muted:#737069;
  }
  body{ background:#faf7f0 !important; color:#1f2421 !important;
        font-family:'DM Sans',sans-serif; line-height:1.55 }

  /* Sticky search header — frosted, rounded, generous */
  .sr-topbar{
    background:rgba(255,253,248,.92) !important;
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border-bottom:1px solid var(--border) !important;
    box-shadow:0 2px 20px -8px rgba(31,36,33,.10) !important;
    padding:1rem 1.25rem .85rem !important;
  }
  @media(min-width:900px){
    .sr-topbar{ padding:1.25rem 2rem 1rem !important }
    .sr-search-row, .sr-pills{ max-width:1180px; margin-left:auto !important; margin-right:auto !important }
  }
  .sr-search-row{ gap:10px !important; margin-bottom:.85rem !important }
  .sr-input{
    border:1.5px solid var(--border) !important;
    border-radius:50px !important;
    background:var(--white) !important;
    padding:14px 20px !important;
    font-size:15px !important;
    height:54px !important;
    transition:border-color .18s, box-shadow .18s !important;
    color:var(--text) !important;
  }
  .sr-input:focus{
    border-color:var(--g) !important;
    background:var(--white) !important;
    box-shadow:0 0 0 4px rgba(26,92,69,.10) !important;
  }
  .sr-input::placeholder{ color:#9c988c }
  .sr-search-btn{
    background:var(--g) !important; color:#fff !important;
    border-radius:50px !important;
    padding:0 28px !important; height:54px !important;
    font-size:14.5px !important; font-weight:600 !important;
    box-shadow:0 8px 20px -6px rgba(26,92,69,.40) !important;
    transition:transform .15s, background .18s !important;
  }
  .sr-search-btn:hover{ background:var(--gd) !important; transform:translateY(-1px) }
  .sr-search-btn:active{ transform:scale(.97) }

  .sr-pills{ gap:8px !important }
  .pill{
    border:1.5px solid var(--border) !important;
    border-radius:50px !important;
    background:var(--paper-deep) !important;
    color:var(--text) !important;
    font-weight:500 !important;
    font-size:13px !important;
    padding:9px 18px !important;
    transition:all .15s !important;
  }
  .pill:hover:not(.active){ background:var(--gl) !important; border-color:var(--g) !important; color:var(--g) !important }
  .pill.active{
    background:var(--g) !important; color:#fff !important; border-color:var(--g) !important;
    box-shadow:0 6px 14px -6px rgba(26,92,69,.40) !important;
  }
  .filter-btn{
    border:1.5px solid var(--border) !important;
    border-radius:50px !important;
    background:var(--white) !important;
    color:var(--text) !important;
    font-weight:600 !important;
    padding:9px 16px !important;
  }
  .filter-btn.has-filters{ background:var(--g) !important; color:#fff !important; border-color:var(--g) !important }

  .search-suggestions{
    border:1px solid var(--border) !important;
    border-radius:18px !important;
    box-shadow:0 18px 40px -16px rgba(31,36,33,.22) !important;
    background:var(--white) !important;
  }
  .suggestion-item:hover, .suggestion-item:active{ background:var(--gl) !important }
  .suggestion-main{ color:var(--text) !important }

  .search-chip{
    background:var(--gl) !important; color:var(--g) !important;
    border:1px solid rgba(26,92,69,.20) !important; border-radius:50px !important;
    padding:6px 16px !important;
  }

  /* Results bar — clean, on the cream paper */
  .results-header{
    background:transparent !important;
    border-bottom:1px solid var(--border) !important;
    padding:1rem 1.25rem !important;
    max-width:1180px; margin:0 auto;
  }
  .results-count{ color:var(--text) !important; font-size:14px !important; font-weight:500 }
  .results-count strong{ color:var(--g) !important }
  .sort-select{
    border:1.5px solid var(--border) !important;
    border-radius:50px !important;
    background:var(--white) !important;
    color:var(--text) !important;
    padding:8px 16px !important;
    font-weight:500 !important;
  }

  .quick-links{ background:transparent !important; padding:.65rem 1.25rem !important; max-width:1180px; margin:0 auto }
  .ql-btn{
    background:var(--white) !important;
    border:1px solid var(--border) !important;
    border-radius:50px !important;
    color:var(--text) !important;
    padding:7px 16px !important;
    transition:all .15s !important;
  }
  .ql-btn:hover{ border-color:var(--g) !important; color:var(--g) !important; transform:translateY(-1px) }

  /* Listings grid — roomier, centred column on desktop */
  .listings-grid{
    max-width:1180px !important;
    margin:0 auto !important;
    padding:1.25rem !important;
    gap:1rem !important;
    grid-template-columns:repeat(2,1fr) !important;
  }
  @media(min-width:640px){ .listings-grid{ grid-template-columns:repeat(2,1fr) !important } }
  @media(min-width:900px){ .listings-grid{ grid-template-columns:repeat(3,1fr) !important; gap:1.25rem !important } }
  @media(min-width:1200px){ .listings-grid{ grid-template-columns:repeat(4,1fr) !important } }
  @media(max-width:420px){ .listings-grid{ grid-template-columns:1fr !important } }

  .prop-card{
    background:var(--white) !important;
    border:1px solid var(--border) !important;
    border-radius:18px !important;
    overflow:hidden;
    transition:transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s, border-color .25s !important;
  }
  .prop-card:hover{
    transform:translateY(-4px);
    box-shadow:0 22px 44px -20px rgba(31,36,33,.22) !important;
    border-color:rgba(26,92,69,.25) !important;
  }

  /* Filter modal — rounded sheet, matches homepage cards */
  .modal{
    border-radius:28px 28px 0 0 !important;
    background:var(--white) !important;
    padding:1.5rem 1.5rem 2rem !important;
  }
  @media(min-width:640px){
    .modal-bg{ align-items:center !important }
    .modal{ border-radius:24px !important; max-height:86vh }
  }
  .modal-title{ color:var(--text) !important; font-size:22px !important }
  .filter-section-label{ color:var(--muted) !important }
  .f-opt{
    border:1.5px solid var(--border) !important;
    border-radius:50px !important;
    background:var(--paper-deep) !important;
    color:var(--text) !important;
    padding:8px 16px !important;
  }
  .f-opt.on{ background:var(--g) !important; color:#fff !important; border-color:var(--g) !important; font-weight:600 !important }
  .f-range select, .modal select{
    border:1.5px solid var(--border) !important;
    border-radius:12px !important;
    background:var(--white) !important;
    color:var(--text) !important;
    padding:11px 14px !important;
  }
  .filter-apply{
    background:var(--g) !important; border-radius:50px !important;
    padding:15px !important; font-weight:600 !important;
    box-shadow:0 10px 24px -8px rgba(26,92,69,.40) !important;
  }
  .pg-btn{ border:1.5px solid var(--border) !important; border-radius:10px !important; background:var(--white) !important; color:var(--text) !important }
  .pg-btn.on{ background:var(--g) !important; color:#fff !important; border-color:var(--g) !important }
  .pg-btn:hover:not(.on){ background:var(--gl) !important }

  /* Dark mode */
  [data-theme="dark"] body{ background:#14130f !important; color:#f1ebdc !important }
  [data-theme="dark"] .sr-topbar{ background:rgba(28,27,22,.92) !important; border-bottom-color:#38342a !important }
  [data-theme="dark"] .sr-input,
  [data-theme="dark"] .sort-select,
  [data-theme="dark"] .filter-btn,
  [data-theme="dark"] .ql-btn,
  [data-theme="dark"] .modal,
  [data-theme="dark"] .prop-card{ background:#1c1b16 !important; border-color:#38342a !important; color:#f1ebdc !important }
  [data-theme="dark"] .pill{ background:#1c1b16 !important; color:#cfc9bb !important; border-color:#38342a !important }
  [data-theme="dark"] .results-count, [data-theme="dark"] .modal-title{ color:#f1ebdc !important }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <!-- Search bar -->
  <div class="sr-topbar">
    <div class="sr-search-row">
      <input class="sr-input" type="text" id="search-q"
             placeholder="Area, county, Eircode or D1, D2…"
             autocomplete="off"
             oninput="handleSearchInput(this.value)"
             onkeydown="handleSearchKey(event)"/>
      <button class="sr-search-btn" onclick="doSearch()">Search</button>
      <div class="search-suggestions" id="suggestions"></div>
    </div>
    <div id="search-chip-wrap"></div>
    <div class="sr-pills">
      <button class="pill active" data-type="sale"  onclick="togglePill(this)">Buy</button>
      <button class="pill" data-type="rent"  onclick="togglePill(this)">Rent</button>
      <button class="pill" data-type="share" onclick="togglePill(this)">Room for rent</button>
      <button class="pill" data-type="new"   onclick="togglePill(this)">New homes</button>
      <button class="filter-btn" id="filter-btn" onclick="document.getElementById('filter-modal').classList.add('open')">
        <svg width="14" height="14" style="color:currentColor" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="5" x2="21" y2="5"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="19" x2="14" y2="19"/></svg>
        Filters
      </button>
    </div>
  </div>

  <!-- Quick filters + links -->
  <div style="background:var(--white,#fff);border-bottom:1px solid var(--border);padding:.5rem 1rem;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;align-items:center">
    <style>.qf-chip{display:inline-flex;align-items:center;gap:5px;border:1.5px solid var(--border);border-radius:50px;padding:5px 12px;font-size:12px;font-weight:500;background:var(--white,#fff);cursor:pointer;color:#666;white-space:nowrap;font-family:inherit;transition:all .15s;-webkit-tap-highlight-color:transparent;text-decoration:none;flex-shrink:0}.qf-chip:hover{border-color:var(--green);color:var(--green)}.qf-chip.active{background:var(--gl,#e9f4ef);border-color:var(--green);color:var(--green)}</style>
    <select class="qf-chip" id="qf-county" onchange="onSearchCountyChange()" style="-webkit-appearance:none;padding-right:10px">
      <option value="">All counties</option>
      <option>Dublin</option><option>Cork</option><option>Galway</option>
      <option>Limerick</option><option>Waterford</option><option>Kerry</option>
      <option>Meath</option><option>Kildare</option><option>Wicklow</option>
      <option>Wexford</option><option>Kilkenny</option><option>Clare</option>
      <option>Tipperary</option><option>Donegal</option><option>Mayo</option>
      <option>Sligo</option><option>Leitrim</option><option>Roscommon</option>
      <option>Longford</option><option>Westmeath</option><option>Offaly</option>
      <option>Laois</option><option>Carlow</option><option>Louth</option>
      <option>Monaghan</option><option>Cavan</option>
    </select>
    <select class="qf-chip" id="qf-area" onchange="doSearch()" style="-webkit-appearance:none;padding-right:10px;display:none">
      <option value="">All areas</option>
    </select>
    <select class="qf-chip" id="qf-beds" onchange="doSearch()" style="-webkit-appearance:none;padding-right:10px">
      <option value="">Any beds</option>
      <option value="1">1+ bed</option>
      <option value="2">2+ beds</option>
      <option value="3">3+ beds</option>
      <option value="4">4+ beds</option>
      <option value="5">5+ beds</option>
    </select>
    <select class="qf-chip" id="qf-min" onchange="doSearch()" style="-webkit-appearance:none;padding-right:10px">
      <option value="">Min price</option>
      <option value="50000">€50k</option>
      <option value="100000">€100k</option>
      <option value="150000">€150k</option>
      <option value="200000">€200k</option>
      <option value="250000">€250k</option>
      <option value="300000">€300k</option>
      <option value="400000">€400k</option>
      <option value="500000">€500k</option>
    </select>
    <select class="qf-chip" id="qf-max" onchange="doSearch()" style="-webkit-appearance:none;padding-right:10px">
      <option value="">Max price</option>
      <option value="100000">€100k</option>

  <script>
    window.MOVIN_API_URL = 'https://movin-backend-production-1fb3.up.railway.app'
  </script>
  <script src="../js/icons.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script>
    renderNav('search')
    if (typeof setSEO === 'function') setSEO({
      title:       'Search Properties for Sale & Rent in Ireland | Movin.ie',
      description: 'Search homes for sale, to rent or to share across Ireland — filter by area, county, Eircode, beds, price and more. Map and drive-time search included.',
      canonical:   '/pages/search.html',
      type:        'website',
      schema: {
        '@context': 'https://schema.org',
        '@type':    'CollectionPage',
        'name':     'Property search on Movin.ie',
        'description': 'Search every live listing on Movin.ie — buy, rent or share — with filters for area, beds, price, BER and more.',
        'isPartOf': { '@id': 'https://movin.ie/#website' },
        'inLanguage': 'en-IE'
      },
      breadcrumbs: [
        { name: 'Home',   url: '/' },
        { name: 'Search', url: '/pages/search.html' }
      ]
    })

    // ── Dublin district & Eircode data ──────────────────────────────────────
    const DUBLIN_DISTRICTS = [
      { code: 'D1',  name: 'Dublin 1',  area: 'City Centre, Mountjoy, North Wall' },
      { code: 'D2',  name: 'Dublin 2',  area: 'City Centre South, Merrion, Pembroke' },
      { code: 'D3',  name: 'Dublin 3',  area: 'Clontarf, East Wall, Fairview' },
      { code: 'D4',  name: 'Dublin 4',  area: 'Ballsbridge, Donnybrook, Sandymount' },
      { code: 'D5',  name: 'Dublin 5',  area: 'Artane, Coolock, Raheny' },
      { code: 'D6',  name: 'Dublin 6',  area: 'Ranelagh, Rathmines, Rathgar' },
      { code: 'D6W', name: 'Dublin 6W', area: 'Templeogue, Terenure' },
      { code: 'D7',  name: 'Dublin 7',  area: 'Cabra, Phibsborough, Stoneybatter' },
      { code: 'D8',  name: 'Dublin 8',  area: 'Inchicore, Kilmainham, Liberties' },
      { code: 'D9',  name: 'Dublin 9',  area: 'Drumcondra, Glasnevin, Whitehall' },
      { code: 'D10', name: 'Dublin 10', area: 'Ballyfermot, Cherry Orchard' },
      { code: 'D11', name: 'Dublin 11', area: 'Finglas, Ballymun, Glasnevin North' },
      { code: 'D12', name: 'Dublin 12', area: 'Crumlin, Kimmage, Walkinstown' },
      { code: 'D13', name: 'Dublin 13', area: 'Baldoyle, Howth, Sutton' },
      { code: 'D14', name: 'Dublin 14', area: 'Churchtown, Dundrum, Rathfarnham' },
      { code: 'D15', name: 'Dublin 15', area: 'Blanchardstown, Castleknock, Clonsilla' },
      { code: 'D16', name: 'Dublin 16', area: 'Ballinteer, Knocklyon, Sandyford' },
      { code: 'D17', name: 'Dublin 17', area: 'Darndale, Priorswood' },
      { code: 'D18', name: 'Dublin 18', area: 'Foxrock, Sandyford, Stillorgan' },
      { code: 'D20', name: 'Dublin 20', area: 'Chapelizod, Palmerstown' },
      { code: 'D22', name: 'Dublin 22', area: 'Clondalkin, Liffey Valley' },
      { code: 'D24', name: 'Dublin 24', area: 'Firhouse, Tallaght, Templeogue' },
    ]

    const COUNTIES = [
      'Dublin','Cork','Galway','Limerick','Waterford','Kerry',
      'Meath','Kildare','Wicklow','Wexford','Kilkenny','Clare',
      'Tipperary','Donegal','Mayo','Sligo','Leitrim','Roscommon',
      'Longford','Westmeath','Offaly','Laois','Carlow','Louth',
      'Monaghan','Cavan'
    ]

    // ── Search state ────────────────────────────────────────────────────────
    let currentPage = 1
    let activeType = 'sale'
    let searchQuery = ''
    let searchCounty = ''
    let searchDistrict = ''

    // ── Read URL params ─────────────────────────────────────────────────────
    let urlPropertyType = ''
    const urlP = new URLSearchParams(window.location.search)
    if (urlP.get('listing_type')) {
      activeType = urlP.get('listing_type')
      document.querySelectorAll('.pill[data-type]').forEach(p => {
        if (p.dataset.type === activeType) p.classList.add('active')
        else p.classList.remove('active')
      })
    }
    if (urlP.get('county')) {
      searchCounty = urlP.get('county')
      var qfC = document.getElementById('qf-county')
      if (qfC) qfC.value = searchCounty
    }
    if (urlP.get('q')) {
      searchQuery = urlP.get('q')
      document.getElementById('search-q').value = searchQuery
    }
    if (urlP.get('property_type')) {
      urlPropertyType = urlP.get('property_type')
    }
    if (urlP.get('min_price')) {
      var fMin = document.getElementById('f-min')
      if (fMin) fMin.value = urlP.get('min_price')
    }
    if (urlP.get('max_price')) {
      var fMax = document.getElementById('f-max')
      if (fMax) fMax.value = urlP.get('max_price')
    }
    if (urlP.get('bedrooms')) {
      var bedTarget = urlP.get('bedrooms')
      document.querySelectorAll('.filter-opts .f-opt').forEach(o => {
        if (o.dataset.val === bedTarget) o.classList.add('on')
      })
    }

    // Re-runs search whenever the county dropdown changes. Defined at module
    // scope so the inline onchange="onSearchCountyChange()" can find it.
    function onSearchCountyChange() {
      var sel = document.getElementById('qf-county')
      searchCounty = sel ? (sel.value || '') : ''
      if (searchCounty) showSearchChip(searchCounty)
      else document.getElementById('search-chip-wrap').innerHTML = ''
      doSearch(1)
    }
    window.onSearchCountyChange = onSearchCountyChange

    // ── Autocomplete ────────────────────────────────────────────────────────
    function handleSearchInput(val) {
      const box = document.getElementById('suggestions')
      if (!val || val.length < 1) { box.classList.remove('open'); return }

      const q = val.toUpperCase().trim()
      const results = []

      // Match Dublin districts: D1, D2, D6W etc
      DUBLIN_DISTRICTS.forEach(d => {
        if (d.code.startsWith(q) || d.name.toUpperCase().includes(q)) {
          results.push({ type: 'district', ...d })
        }
      })

      // Match Eircode pattern (e.g. D06, A94, V94)
      if (/^[A-Z][0-9]{0,2}/.test(q) && q.length >= 1) {
        if (!results.length) {
          results.push({
            type: 'eircode',
            code: val.toUpperCase(),
            name: `Eircode: ${val.toUpperCase()}`,
            area: 'Search by Eircode'
          })
        }
      }

      // Match counties
      COUNTIES.forEach(c => {
        if (c.toUpperCase().startsWith(q) || c.toUpperCase().includes(q)) {
          results.push({ type: 'county', code: c, name: c, area: 'County' })
        }
      })

      if (!results.length) { box.classList.remove('open'); return }

      box.innerHTML = results.slice(0, 6).map(r => `
        <div class="suggestion-item" onclick="selectSuggestion(${JSON.stringify(r).replace(/"/g, '&quot;')})">
          <span class="suggestion-icon">${r.type === 'county' ? '📍' : r.type === 'eircode' ? '🔢' : '🏘'}</span>
          <div>
            <div class="suggestion-main">${r.name}</div>
            <div class="suggestion-sub">${r.area}</div>
          </div>
          <span class="suggestion-tag">${r.type === 'district' ? 'Dublin' : r.type === 'eircode' ? 'Eircode' : 'County'}</span>
        </div>
      `).join('')

      box.classList.add('open')
    }

    function handleSearchKey(e) {
      if (e.key === 'Enter') {
        document.getElementById('suggestions').classList.remove('open')
        function createAlert() {
      if (!API.auth.isLoggedIn()) {
        if (confirm('Sign in to create search alerts. Go to login?')) window.location.href = 'login.html'
        return
      }
      var params = buildSearchParams()
      var label = (params.listing_type === 'sale' ? 'For Sale' : params.listing_type === 'rent' ? 'To Rent' : params.listing_type === 'share' ? 'Rooms for Rent' : 'Properties') +
        (params.county ? ' in ' + params.county : ' in Ireland') +
        (params.bedrooms ? ', ' + params.bedrooms + '+ beds' : '')

      fetch(window.MOVIN_API_URL + '/api/alerts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('movin_token') },
        body: JSON.stringify({ ...params, label: label })
      })
      .then(function(r) { return r.json() })
      .then(function(data) {
        if (data.id) {
          toast('🔔 Alert created! We will email you when new listings match.', 'success')
          document.getElementById('create-alert-btn').textContent = '✓ Alert created'
          document.getElementById('create-alert-btn').style.color = '#1a5c45'
        } else {
          toast(data.error || 'Could not create alert', 'error')
        }
      })
      .catch(function() { toast('Could not create alert', 'error') })
    }

    function buildSearchParams() {
      var params = { listing_type: activeType || 'sale' }
      var q = document.getElementById('search-q').value.trim()
      if (q) params.county = q
      var beds = document.getElementById('f-beds') ? document.getElementById('f-beds').value : ''
      var min  = document.getElementById('f-min')  ? document.getElementById('f-min').value  : ''
      var max  = document.getElementById('f-max')  ? document.getElementById('f-max').value  : ''
      if (beds) params.bedrooms  = beds
      if (min)  params.min_price = min
      if (max)  params.max_price = max
      return params
    }

    doSearch()
      }
      if (e.key === 'Escape') {
        document.getElementById('suggestions').classList.remove('open')
      }
    }

    function selectSuggestion(item) {
      document.getElementById('suggestions').classList.remove('open')
      document.getElementById('search-q').value = item.name

      searchQuery = item.name
      searchCounty = ''
      searchDistrict = ''

      if (item.type === 'county') searchCounty = item.code
      if (item.type === 'district') {
        searchCounty = 'Dublin'
        searchDistrict = item.code
      }
      if (item.type === 'eircode') searchQuery = item.code

      // Show active chip
      showSearchChip(item.name)
      doSearch()
    }

    function showSearchChip(label) {
      document.getElementById('search-chip-wrap').innerHTML = `
        <div class="search-chip">
          <svg width="13" height="13" style="color:#aaa;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-location"/></svg> ${label}
          <button onclick="clearSearch()" title="Clear">×</button>
        </div>
      `
    }

    function clearSearch() {
      searchQuery = ''
      searchCounty = ''
      searchDistrict = ''
      document.getElementById('search-q').value = ''
      document.getElementById('search-chip-wrap').innerHTML = ''
      doSearch()
    }

    // Close suggestions on outside click
    document.addEventListener('click', e => {
      if (!e.target.closest('.sr-search-row')) {
        document.getElementById('suggestions').classList.remove('open')
      }
    })

    // ── Type pills ──────────────────────────────────────────────────────────
    function togglePill(el) {
      const t = el.dataset.type
      activeType = t
      document.querySelectorAll('.pill[data-type]').forEach(p => p.classList.remove('active'))
      el.classList.add('active')
      if (typeof applyFilterVisibility === 'function') applyFilterVisibility()
      doSearch()
    }

    // ── Filter modal ────────────────────────────────────────────────────────
    function closeFilterBg(e) {
      if (e.target === document.getElementById('filter-modal')) {
        document.getElementById('filter-modal').classList.remove('open')
      }
    }

    function resetFilters() {
      document.getElementById('f-min').value = ''
      document.getElementById('f-max').value = ''
      document.querySelectorAll('.f-opt').forEach(o => o.classList.remove('on'))
      document.querySelectorAll('.ber-btn').forEach(b => b.classList.remove('on'))
      ;['f-parking','f-garden','f-garage','f-alarm','f-wheelchair','f-auction','f-newdev'].forEach(function(id){
        var el = document.getElementById(id); if (el) el.checked = false
      })
    }

    // Show/hide buy-only filter section based on active listing type.
    // Called whenever the user changes between Buy / Rent / Share tabs.
    function applyFilterVisibility(){
      var buyOnly = document.getElementById('filters-buy-only')
      if (!buyOnly) return
      var isBuy = !activeType || activeType === 'sale'
      buyOnly.style.display = isBuy ? '' : 'none'
    }
    applyFilterVisibility()

    function applyFilters() {
      document.getElementById('filter-modal').classList.remove('open')
      doSearch()
    }

    document.querySelectorAll('.ber-btn').forEach(b =>
      b.addEventListener('click', () => b.classList.toggle('on'))
    )
    document.querySelectorAll('.f-opt').forEach(o =>
      o.addEventListener('click', () => {
        o.closest('.filter-opts').querySelectorAll('.f-opt').forEach(x => x.classList.remove('on'))
        o.classList.add('on')
      })
    )

    // ── Main search ─────────────────────────────────────────────────────────
    async function doSearch(page = 1) {
      currentPage = page
      const grid = document.getElementById('results-grid')
      grid.innerHTML = '<div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>'

      const bedEl = document.querySelector('.filter-opts .f-opt.on')
      const berEl = Array.from(document.querySelectorAll('.ber-btn.on')).map(b => b.dataset.val)

      const filters = {}
      if (activeType)      filters.listing_type  = activeType
      if (searchCounty)    filters.county        = searchCounty
      if (urlPropertyType) filters.property_type = urlPropertyType
      if (searchQuery && !searchCounty) filters.q = searchQuery
      if (document.getElementById('f-min').value) filters.min_price = document.getElementById('f-min').value
      if (document.getElementById('f-max').value) filters.max_price = document.getElementById('f-max').value
      if (bedEl)        filters.bedrooms = bedEl.dataset.val
      if (berEl.length) filters.ber = berEl[0]
      if (document.getElementById('f-parking')?.checked)    filters.parking    = '1'
      if (document.getElementById('f-garden')?.checked)     filters.garden     = '1'
      if (document.getElementById('f-garage')?.checked)     filters.garage     = '1'
      if (document.getElementById('f-alarm')?.checked)      filters.alarm      = '1'
      if (document.getElementById('f-wheelchair')?.checked) filters.wheelchair = '1'
      // Buy-only flags
      if ((!activeType || activeType === 'sale')) {
        if (document.getElementById('f-auction')?.checked) filters.is_auction = '1'
        if (document.getElementById('f-newdev')?.checked)  filters.is_new_dev = '1'
      }
      filters.sort  = document.getElementById('sort-sel').value
      filters.page  = page
      filters.limit = 12

      try {
        const savedIds = API.auth.isLoggedIn()
          ? (await API.saved.all().catch(() => [])).map(s => s.id)
          : []

        const res = await API.listings.search(filters)

        const countLabel = searchQuery || searchCounty || searchDistrict
          ? ` in <strong>${searchQuery || searchCounty}</strong>` : ''
        document.getElementById('result-count').innerHTML =
          `<strong>${res.total.toLocaleString()}</strong> <span>propert${res.total === 1 ? 'y' : 'ies'}${countLabel}</span>`

        if (!res.listings.length) {
          grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem 1rem">
            <div style="font-size:44px;margin-bottom:1rem">🔍</div>
            <h3 style="font-family:'Playfair Display', Georgia, 'Times New Roman', serif;font-size:20px;font-weight:700;color:#111;margin-bottom:.5rem">No properties found</h3>
            <p style="font-size:14px;color:#aaa;margin-bottom:1.5rem;max-width:300px;margin-left:auto;margin-right:auto">Try widening your search — remove a filter or choose a different area.</p>
            <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
              <button onclick="clearSearch()" class="btn btn-primary btn-sm">Clear all filters</button>
              <button onclick="window.location.href='map-search.html'" class="btn btn-ghost btn-sm">Try map search</button>
            </div>
          </div>`
          document.getElementById('pagination').innerHTML = ''
          return
        }

        grid.innerHTML = res.listings.map(l => buildPropertyCard(l, savedIds)).join('')

        // Pagination
        const pg = document.getElementById('pagination')
        if (res.pages <= 1) { pg.innerHTML = ''; return }
        let html = ''
        if (res.page > 1) html += `<button class="pg-btn" onclick="doSearch(${res.page-1})">‹</button>`
        for (let i = 1; i <= Math.min(res.pages, 7); i++) {
          html += `<button class="pg-btn ${i===res.page?'on':''}" onclick="doSearch(${i})">${i}</button>`
        }
        if (res.pages > 7) html += `<button class="pg-btn" disabled>…</button><button class="pg-btn" onclick="doSearch(${res.pages})">${res.pages}</button>`
        if (res.page < res.pages) html += `<button class="pg-btn" onclick="doSearch(${res.page+1})">›</button>`
        pg.innerHTML = html

      } catch(e) {
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
          <p style="color:#aaa">Could not load listings. Please try again.</p>
        </div>`
        document.getElementById('result-count').textContent = 'Error loading results'
      }
    }

    // Show chip if county was set from URL
    if (searchCounty || searchQuery) showSearchChip(searchCounty || searchQuery)

    doSearch()

    // Init compare bar
    if (typeof updateCompareBar === 'function') updateCompareBar()

    // Recently viewed
    setTimeout(function() {
      if (typeof renderRecentlyViewed !== 'function') return
      renderRecentlyViewed('rv-strip')
      var strip = document.getElementById('rv-strip')
      if (strip && strip.children.length > 0) {
        document.getElementById('rv-wrap').style.display = 'block'
      }
      if (typeof renderFooter === 'function') renderFooter()
    }, 400)
  </script>
  <footer class="site-footer" id="site-footer"></footer>

    <div style="font-family:'Playfair Display', Georgia, 'Times New Roman', serif;font-size:16px;font-weight:700;color:#111;margin-bottom:.75rem">Recently viewed</div>
    <div id="rv-strip" style="display:flex;gap:.75rem;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:.5rem"></div>
  </div>

  <!-- Compare bar -->
  <div id="compare-bar" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #1a5c45;padding:.75rem 1rem;z-index:500;gap:.75rem;align-items:center;box-shadow:0 -4px 20px rgba(0,0,0,.1)"></div>

  <!-- Recently viewed -->
  <div id="rv-wrap" style="padding:1rem 1rem 0;display:none">
    <div style="font-family:'Playfair Display', Georgia, 'Times New Roman', serif;font-size:16px;font-weight:700;color:#111;margin-bottom:.75rem">Recently viewed</div>

  </div>
