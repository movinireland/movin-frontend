<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Properties – Movin.ie</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#1a5c45"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Movin"/>
  <style>
    .sr-topbar{background:var(--white);border-bottom:1px solid var(--border);padding:.75rem 1rem}
    .sr-search-row{display:flex;gap:8px;margin-bottom:.6rem;position:relative}
    .sr-input{flex:1;min-width:0;border:1.5px solid var(--border);border-radius:var(--rp);padding:10px 16px;font-size:14px;outline:none;background:#fafaf8;-webkit-appearance:none}
    .sr-input:focus{border-color:var(--g)}

    /* ── Autocomplete dropdown ── */
    .search-suggestions{position:absolute;top:100%;left:0;right:60px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:50;margin-top:4px;overflow:hidden;display:none}
    .search-suggestions.open{display:block}
    .suggestion-item{padding:.75rem 1rem;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f5f2ec}
    .suggestion-item:last-child{border-bottom:none}
    .suggestion-item:hover{background:var(--gl)}
    .suggestion-icon{font-size:16px;flex-shrink:0}
    .suggestion-main{font-weight:500;color:#111}
    .suggestion-sub{font-size:12px;color:#aaa}
    .suggestion-tag{font-size:10px;padding:2px 7px;border-radius:var(--rp);background:var(--gl);color:var(--g);font-weight:500;margin-left:auto;flex-shrink:0}

    .sr-pills{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
    .sr-pills::-webkit-scrollbar{display:none}
    .pill{border:1.5px solid var(--border);border-radius:var(--rp);padding:6px 14px;font-size:13px;background:#fafaf8;cursor:pointer;color:#555;white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
    .pill.active{background:var(--g);color:#fff;border-color:var(--g)}
    .filter-btn{display:flex;align-items:center;gap:6px;border:1.5px solid var(--border);border-radius:var(--rp);padding:6px 14px;font-size:13px;background:#fafaf8;cursor:pointer;color:#555;flex-shrink:0}
    .results-header{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;font-size:14px}
    .results-count{font-weight:500}
    .results-count span{font-size:12px;color:var(--muted);font-weight:300}
    .sort-select{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;background:#fafaf8;outline:none;font-family:inherit;-webkit-appearance:none;cursor:pointer}

    /* active search chip */
    .search-chip{display:inline-flex;align-items:center;gap:6px;background:var(--gl);color:var(--g);border:1px solid var(--border);border-radius:var(--rp);padding:4px 12px;font-size:13px;font-weight:500;margin-bottom:.5rem}
    .search-chip button{background:none;border:none;color:var(--g);cursor:pointer;font-size:14px;line-height:1;padding:0}

    /* filter sheet */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-bg.open{opacity:1;pointer-events:all}
    .modal{background:var(--white);border-radius:20px 20px 0 0;padding:1.25rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s ease}
    .modal-bg.open .modal{transform:translateY(0)}
    .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto .75rem}
    .modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:1rem}
    .filter-section{margin-bottom:1.25rem}
    .filter-section-label{font-size:12px;font-weight:500;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.6rem}
    .filter-opts{display:flex;flex-wrap:wrap;gap:6px}
    .f-opt{border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;background:#fafaf8;color:#666;transition:all .15s}
    .f-opt.on{border-color:var(--g);color:var(--g);background:var(--gl)}
    .f-range{display:flex;gap:8px;align-items:center}
    .f-range select{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;background:#fafaf8;outline:none;font-family:inherit;-webkit-appearance:none}
    .ber-wrap{display:flex;flex-wrap:wrap;gap:5px}
    .ber-btn{width:36px;height:26px;border-radius:5px;border:1.5px solid var(--border);font-size:11px;font-weight:500;cursor:pointer;background:#fafaf8;font-family:inherit}
    .ber-btn.on{background:#2aaa50;color:#fff;border-color:#2aaa50}
    .cb-col{display:flex;flex-direction:column;gap:8px}
    .cb-row{display:flex;align-items:center;gap:8px;cursor:pointer}
    .cb-row input{accent-color:var(--g);width:16px;height:16px;cursor:pointer}

    .listings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;padding:0 .75rem}
    @media(max-width:400px){.listings-grid{grid-template-columns:1fr}}
    @media(min-width:768px){.listings-grid{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <!-- Search bar -->
  <div class="sr-topbar">
    <div class="sr-search-row">
      <input class="sr-input" type="text" id="search-q"
             placeholder="Area, county, Eircode or D1, D2…"
             autocomplete="off"
             oninput="handleSearchInput(this.value)"
             onkeydown="handleSearchKey(event)"/>
      <button class="btn btn-primary btn-sm" onclick="doSearch()">Search</button>

      <!-- Autocomplete suggestions -->
      <div class="search-suggestions" id="suggestions"></div>
    </div>

    <!-- Active search chip -->
    <div id="search-chip-wrap"></div>

    <!-- Type pills -->
    <div class="sr-pills">
      <button class="pill active" data-type="sale"  onclick="togglePill(this)">Buy</button>
      <button class="pill" data-type="rent"  onclick="togglePill(this)">Rent</button>
      <button class="pill" data-type="share" onclick="togglePill(this)">Sharing</button>
      <button class="pill" data-type="new"   onclick="togglePill(this)">New homes</button>
      <button class="filter-btn" onclick="document.getElementById('filter-modal').classList.add('open')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 2h12M3 7h8M5 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Filters
      </button>
    </div>
  </div>

  <!-- Results header -->
  <div class="results-header">
    <div class="results-count" id="result-count">Loading…</div>
    <select class="sort-select" id="sort-sel" onchange="doSearch()">
      <option value="newest">Most recent</option>
      <option value="price_asc">Price: low → high</option>
      <option value="price_desc">Price: high → low</option>
      <option value="most_viewed">Most viewed</option>
    </select>
  </div>

  <!-- Results -->
  <div id="results-grid" class="listings-grid">
    <div class="loading-wrap" style="grid-column:1/-1">
      <div class="spinner"></div><span>Loading properties…</span>
    </div>
  </div>

  <!-- Pagination -->
  <div id="pagination" class="pagination"></div>

  <!-- Filter modal -->
  <div class="modal-bg" id="filter-modal" onclick="closeFilterBg(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Filters</div>

      <div class="filter-section">
        <div class="filter-section-label">Price range</div>
        <div class="f-range">
          <select id="f-min"><option value="">Min price</option><option value="100000">€100k</option><option value="200000">€200k</option><option value="300000">€300k</option><option value="400000">€400k</option><option value="500000">€500k</option></select>
          <span style="color:#ccc">—</span>
          <select id="f-max"><option value="">Max price</option><option value="200000">€200k</option><option value="300000">€300k</option><option value="400000">€400k</option><option value="500000">€500k</option><option value="750000">€750k</option><option value="1000000">€1m+</option></select>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-section-label">Bedrooms</div>
        <div class="filter-opts">
          <div class="f-opt" data-val="0">Studio</div>
          <div class="f-opt" data-val="1">1+</div>
          <div class="f-opt" data-val="2">2+</div>
          <div class="f-opt" data-val="3">3+</div>
          <div class="f-opt" data-val="4">4+</div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-section-label">Property type</div>
        <div class="cb-col">
          <label class="cb-row"><input type="checkbox" value="house"/><label>House</label></label>
          <label class="cb-row"><input type="checkbox" value="apartment"/><label>Apartment</label></label>
          <label class="cb-row"><input type="checkbox" value="bungalow"/><label>Bungalow</label></label>
          <label class="cb-row"><input type="checkbox" value="site"/><label>Site / Land</label></label>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-section-label">BER rating</div>
        <div class="ber-wrap">
          <button class="ber-btn" data-val="A1">A1</button>
          <button class="ber-btn" data-val="A2">A2</button>
          <button class="ber-btn" data-val="A3">A3</button>
          <button class="ber-btn" data-val="B1">B1</button>
          <button class="ber-btn" data-val="B2">B2</button>
          <button class="ber-btn" data-val="B3">B3</button>
          <button class="ber-btn" data-val="C1">C1</button>
          <button class="ber-btn" data-val="C2">C2</button>
          <button class="ber-btn" data-val="C3">C3</button>
          <button class="ber-btn" data-val="D1">D1</button>
          <button class="ber-btn" data-val="D2">D2</button>
          <button class="ber-btn" data-val="E">E</button>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-section-label">Facilities</div>
        <div class="cb-col">
          <label class="cb-row"><input type="checkbox" id="f-parking"/><label>Parking</label></label>
          <label class="cb-row"><input type="checkbox" id="f-garden"/><label>Garden</label></label>
          <label class="cb-row"><input type="checkbox" id="f-garage"/><label>Garage</label></label>
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:.75rem">
        <button class="btn btn-ghost" style="flex:1" onclick="resetFilters()">Reset</button>
        <button class="btn btn-primary" style="flex:2" onclick="applyFilters()">Apply filters</button>
      </div>
    </div>
  </div>

  <script>
    window.MOVIN_API_URL = 'https://movin-backend-production-1fb3.up.railway.app'
  </script>
  <script src="../js/icons.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script>
    renderNav('search')

    // ── Dublin district & Eircode data ──────────────────────────────────────
    const DUBLIN_DISTRICTS = [
      { code: 'D1',  name: 'Dublin 1',  area: 'City Centre, Mountjoy, North Wall' },
      { code: 'D2',  name: 'Dublin 2',  area: 'City Centre South, Merrion, Pembroke' },
      { code: 'D3',  name: 'Dublin 3',  area: 'Clontarf, East Wall, Fairview' },
      { code: 'D4',  name: 'Dublin 4',  area: 'Ballsbridge, Donnybrook, Sandymount' },
      { code: 'D5',  name: 'Dublin 5',  area: 'Artane, Coolock, Raheny' },
      { code: 'D6',  name: 'Dublin 6',  area: 'Ranelagh, Rathmines, Rathgar' },
      { code: 'D6W', name: 'Dublin 6W', area: 'Templeogue, Terenure' },
      { code: 'D7',  name: 'Dublin 7',  area: 'Cabra, Phibsborough, Stoneybatter' },
      { code: 'D8',  name: 'Dublin 8',  area: 'Inchicore, Kilmainham, Liberties' },
      { code: 'D9',  name: 'Dublin 9',  area: 'Drumcondra, Glasnevin, Whitehall' },
      { code: 'D10', name: 'Dublin 10', area: 'Ballyfermot, Cherry Orchard' },
      { code: 'D11', name: 'Dublin 11', area: 'Finglas, Ballymun, Glasnevin North' },
      { code: 'D12', name: 'Dublin 12', area: 'Crumlin, Kimmage, Walkinstown' },
      { code: 'D13', name: 'Dublin 13', area: 'Baldoyle, Howth, Sutton' },
      { code: 'D14', name: 'Dublin 14', area: 'Churchtown, Dundrum, Rathfarnham' },
      { code: 'D15', name: 'Dublin 15', area: 'Blanchardstown, Castleknock, Clonsilla' },
      { code: 'D16', name: 'Dublin 16', area: 'Ballinteer, Knocklyon, Sandyford' },
      { code: 'D17', name: 'Dublin 17', area: 'Darndale, Priorswood' },
      { code: 'D18', name: 'Dublin 18', area: 'Foxrock, Sandyford, Stillorgan' },
      { code: 'D20', name: 'Dublin 20', area: 'Chapelizod, Palmerstown' },
      { code: 'D22', name: 'Dublin 22', area: 'Clondalkin, Liffey Valley' },
      { code: 'D24', name: 'Dublin 24', area: 'Firhouse, Tallaght, Templeogue' },
    ]

    const COUNTIES = [
      'Dublin','Cork','Galway','Limerick','Waterford','Kerry',
      'Meath','Kildare','Wicklow','Wexford','Kilkenny','Clare',
      'Tipperary','Donegal','Mayo','Sligo','Leitrim','Roscommon',
      'Longford','Westmeath','Offaly','Laois','Carlow','Louth',
      'Monaghan','Cavan'
    ]

    // ── Search state ────────────────────────────────────────────────────────
    let currentPage = 1
    let activeType = 'sale'
    let searchQuery = ''
    let searchCounty = ''
    let searchDistrict = ''

    // Read URL params
    const urlP = new URLSearchParams(window.location.search)
    if (urlP.get('listing_type')) {
      activeType = urlP.get('listing_type')
      document.querySelectorAll('.pill[data-type]').forEach(p => {
        if (p.dataset.type === activeType) p.classList.add('active')
        else p.classList.remove('active')
      })
    }
    if (urlP.get('county')) searchCounty = urlP.get('county')
    if (urlP.get('q')) {
      searchQuery = urlP.get('q')
      document.getElementById('search-q').value = searchQuery
    }

    // ── Autocomplete ────────────────────────────────────────────────────────
    function handleSearchInput(val) {
      const box = document.getElementById('suggestions')
      if (!val || val.length < 1) { box.classList.remove('open'); return }

      const q = val.toUpperCase().trim()
      const results = []

      // Match Dublin districts: D1, D2, D6W etc
      DUBLIN_DISTRICTS.forEach(d => {
        if (d.code.startsWith(q) || d.name.toUpperCase().includes(q)) {
          results.push({ type: 'district', ...d })
        }
      })

      // Match Eircode pattern (e.g. D06, A94, V94)
      if (/^[A-Z][0-9]{0,2}/.test(q) && q.length >= 1) {
        if (!results.length) {
          results.push({
            type: 'eircode',
            code: val.toUpperCase(),
            name: `Eircode: ${val.toUpperCase()}`,
            area: 'Search by Eircode'
          })
        }
      }

      // Match counties
      COUNTIES.forEach(c => {
        if (c.toUpperCase().startsWith(q) || c.toUpperCase().includes(q)) {
          results.push({ type: 'county', code: c, name: c, area: 'County' })
        }
      })

      if (!results.length) { box.classList.remove('open'); return }

      box.innerHTML = results.slice(0, 6).map(r => `
        <div class="suggestion-item" onclick="selectSuggestion(${JSON.stringify(r).replace(/"/g, '&quot;')})">
          <span class="suggestion-icon">${r.type === 'county' ? '📍' : r.type === 'eircode' ? '🔢' : '🏘'}</span>
          <div>
            <div class="suggestion-main">${r.name}</div>
            <div class="suggestion-sub">${r.area}</div>
          </div>
          <span class="suggestion-tag">${r.type === 'district' ? 'Dublin' : r.type === 'eircode' ? 'Eircode' : 'County'}</span>
        </div>
      `).join('')

      box.classList.add('open')
    }

    function handleSearchKey(e) {
      if (e.key === 'Enter') {
        document.getElementById('suggestions').classList.remove('open')
        doSearch()
      }
      if (e.key === 'Escape') {
        document.getElementById('suggestions').classList.remove('open')
      }
    }

    function selectSuggestion(item) {
      document.getElementById('suggestions').classList.remove('open')
      document.getElementById('search-q').value = item.name

      searchQuery = item.name
      searchCounty = ''
      searchDistrict = ''

      if (item.type === 'county') searchCounty = item.code
      if (item.type === 'district') {
        searchCounty = 'Dublin'
        searchDistrict = item.code
      }
      if (item.type === 'eircode') searchQuery = item.code

      // Show active chip
      showSearchChip(item.name)
      doSearch()
    }

    function showSearchChip(label) {
      document.getElementById('search-chip-wrap').innerHTML = `
        <div class="search-chip">
          <svg width="13" height="13" style="color:#aaa;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-location"/></svg> ${label}
          <button onclick="clearSearch()" title="Clear">×</button>
        </div>
      `
    }

    function clearSearch() {
      searchQuery = ''
      searchCounty = ''
      searchDistrict = ''
      document.getElementById('search-q').value = ''
      document.getElementById('search-chip-wrap').innerHTML = ''
      doSearch()
    }

    // Close suggestions on outside click
    document.addEventListener('click', e => {
      if (!e.target.closest('.sr-search-row')) {
        document.getElementById('suggestions').classList.remove('open')
      }
    })

    // ── Type pills ──────────────────────────────────────────────────────────
    function togglePill(el) {
      const t = el.dataset.type
      activeType = t
      document.querySelectorAll('.pill[data-type]').forEach(p => p.classList.remove('active'))
      el.classList.add('active')
      doSearch()
    }

    // ── Filter modal ────────────────────────────────────────────────────────
    function closeFilterBg(e) {
      if (e.target === document.getElementById('filter-modal')) {
        document.getElementById('filter-modal').classList.remove('open')
      }
    }

    function resetFilters() {
      document.getElementById('f-min').value = ''
      document.getElementById('f-max').value = ''
      document.querySelectorAll('.f-opt').forEach(o => o.classList.remove('on'))
      document.querySelectorAll('.ber-btn').forEach(b => b.classList.remove('on'))
      document.getElementById('f-parking').checked = false
      document.getElementById('f-garden').checked = false
      document.getElementById('f-garage').checked = false
    }

    function applyFilters() {
      document.getElementById('filter-modal').classList.remove('open')
      doSearch()
    }

    document.querySelectorAll('.ber-btn').forEach(b =>
      b.addEventListener('click', () => b.classList.toggle('on'))
    )
    document.querySelectorAll('.f-opt').forEach(o =>
      o.addEventListener('click', () => {
        o.closest('.filter-opts').querySelectorAll('.f-opt').forEach(x => x.classList.remove('on'))
        o.classList.add('on')
      })
    )

    // ── Main search ─────────────────────────────────────────────────────────
    async function doSearch(page = 1) {
      currentPage = page
      const grid = document.getElementById('results-grid')
      grid.innerHTML = '<div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>'

      const bedEl = document.querySelector('.filter-opts .f-opt.on')
      const berEl = Array.from(document.querySelectorAll('.ber-btn.on')).map(b => b.dataset.val)

      const filters = {}
      if (activeType)   filters.listing_type = activeType
      if (searchCounty) filters.county = searchCounty
      if (document.getElementById('f-min').value) filters.min_price = document.getElementById('f-min').value
      if (document.getElementById('f-max').value) filters.max_price = document.getElementById('f-max').value
      if (bedEl)        filters.bedrooms = bedEl.dataset.val
      if (berEl.length) filters.ber = berEl[0]
      if (document.getElementById('f-parking')?.checked) filters.parking = '1'
      if (document.getElementById('f-garden')?.checked)  filters.garden  = '1'
      filters.sort  = document.getElementById('sort-sel').value
      filters.page  = page
      filters.limit = 12

      try {
        const savedIds = API.auth.isLoggedIn()
          ? (await API.saved.all().catch(() => [])).map(s => s.id)
          : []

        const res = await API.listings.search(filters)

        const countLabel = searchQuery || searchCounty || searchDistrict
          ? ` in <strong>${searchQuery || searchCounty}</strong>` : ''
        document.getElementById('result-count').innerHTML =
          `<strong>${res.total.toLocaleString()}</strong> <span>propert${res.total === 1 ? 'y' : 'ies'}${countLabel}</span>`

        if (!res.listings.length) {
          grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
            <div class="empty-icon"><svg width="16" height="16" style="color:#aaa;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-search"/></svg></div>
            <h3>No properties found</h3>
            <p>Try a different area or adjust your filters.</p>
            <button class="btn btn-ghost btn-sm" onclick="clearSearch()">Clear search</button>
          </div>`
          document.getElementById('pagination').innerHTML = ''
          return
        }

        grid.innerHTML = res.listings.map(l => buildPropertyCard(l, savedIds)).join('')

        // Pagination
        const pg = document.getElementById('pagination')
        if (res.pages <= 1) { pg.innerHTML = ''; return }
        let html = ''
        if (res.page > 1) html += `<button class="pg-btn" onclick="doSearch(${res.page-1})">‹</button>`
        for (let i = 1; i <= Math.min(res.pages, 7); i++) {
          html += `<button class="pg-btn ${i===res.page?'on':''}" onclick="doSearch(${i})">${i}</button>`
        }
        if (res.pages > 7) html += `<button class="pg-btn" disabled>…</button><button class="pg-btn" onclick="doSearch(${res.pages})">${res.pages}</button>`
        if (res.page < res.pages) html += `<button class="pg-btn" onclick="doSearch(${res.page+1})">›</button>`
        pg.innerHTML = html

      } catch(e) {
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
          <p style="color:#aaa">Could not load listings. Please try again.</p>
        </div>`
        document.getElementById('result-count').textContent = 'Error loading results'
      }
    }

    // Show chip if county was set from URL
    if (searchCounty || searchQuery) showSearchChip(searchCounty || searchQuery)

    doSearch()
  </script>
  <footer class="site-footer" id="site-footer"></footer>
  <div id="rv-section" style="padding:1rem 1rem 0;display:none">
    <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#111;margin-bottom:.75rem">Recently viewed</div>
    <div id="rv-strip" style="display:flex;gap:.75rem;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:.5rem"></div>
