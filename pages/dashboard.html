<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Movin.ie</title>
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    .db-layout { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 64px); }
    .db-sidebar { background:#fff; border-right:1px solid var(--border); padding:1.5rem; }
    .db-user { display:flex; align-items:center; gap:10px; margin-bottom:2rem; padding-bottom:1.25rem; border-bottom:1px solid var(--border); }
    .db-avatar { width:46px;height:46px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0; }
    .db-uname { font-size:14px;font-weight:500;color:#111; }
    .db-uemail { font-size:12px;color:#aaa;margin-top:2px; }
    .db-nav { display:flex;flex-direction:column;gap:4px; }
    .db-nav-item { display:flex;align-items:center;gap:10px;padding:.75rem 1rem;border-radius:10px;cursor:pointer;font-size:14px;color:#555;transition:all .15s; }
    .db-nav-item:hover { background:var(--bg);color:var(--green); }
    .db-nav-item.active { background:var(--green-light);color:var(--green);font-weight:500; }
    .db-nav-item .badge { margin-left:auto;background:var(--orange);color:#fff;padding:2px 8px;border-radius:var(--radius-pill);font-size:11px; }
    .db-main { padding:2rem; }
    .db-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem; }
    .db-title { font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#111; }
    .listing-row { display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.75rem;transition:box-shadow .15s; }
    .listing-row:hover { box-shadow:var(--shadow); }
    .listing-thumb { width:72px;height:54px;border-radius:8px;object-fit:cover;background:linear-gradient(135deg,#c8dfd4,#e9f4ef);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden; }
    .listing-thumb img { width:100%;height:100%;object-fit:cover; }
    .listing-info { flex:1;min-width:0; }
    .listing-title { font-size:14px;font-weight:500;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .listing-meta { font-size:12px;color:#aaa;margin-top:3px; }
    .listing-price { font-size:15px;font-weight:500;color:var(--green);white-space:nowrap; }
    .listing-actions { display:flex;gap:6px;flex-shrink:0; }
    .status-dot { width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px; }
    .dot-active { background:#2aaa50; }
    .dot-pending { background:var(--orange); }
    .dot-expired { background:#ccc; }
    .dot-draft   { background:#aaa; }
    .enq-card-row { background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:.75rem;transition:box-shadow .15s; }
    .enq-card-row:hover { box-shadow:var(--shadow); }
    .enq-card-row.unread { border-left:3px solid var(--green); }
    .enq-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;flex-wrap:wrap;gap:.5rem; }
    .enq-from { font-size:14px;font-weight:500;color:#111; }
    .enq-time { font-size:12px;color:#aaa; }
    .enq-listing { font-size:12px;color:var(--green);margin-bottom:.6rem; }
    .enq-message { font-size:13px;color:#666;line-height:1.65;font-weight:300; }
    .enq-contact { display:flex;gap:1rem;margin-top:.85rem;flex-wrap:wrap; }
    .enq-contact a { font-size:13px;color:var(--green);font-weight:500; }
    .profile-grid { display:grid;grid-template-columns:1fr 1fr;gap:1rem; }
    @media(max-width:768px){ .db-layout{grid-template-columns:1fr;} .db-sidebar{display:none;} .profile-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="db-layout">
    <!-- Sidebar -->
    <aside class="db-sidebar">
      <div class="db-user">
        <div class="db-avatar" id="db-avatar">U</div>
        <div>
          <div class="db-uname" id="db-uname">Loading…</div>
          <div class="db-uemail" id="db-uemail"></div>
        </div>
      </div>
      <nav class="db-nav">
        <div class="db-nav-item active" data-tab="listings" onclick="switchTab('listings')">🏠 My listings</div>
        <div class="db-nav-item" data-tab="enquiries" onclick="switchTab('enquiries')">📨 Enquiries <span class="badge" id="unread-badge" style="display:none">0</span></div>
        <div class="db-nav-item" data-tab="saved" onclick="switchTab('saved')">♡ Saved</div>
        <div class="db-nav-item" data-tab="profile" onclick="switchTab('profile')">👤 Profile</div>
        <div style="margin-top:auto;padding-top:2rem;border-top:1px solid var(--border);margin-top:3rem">
          <div class="db-nav-item" onclick="API.auth.logout()" style="color:#d93025">↩ Sign out</div>
        </div>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="db-main">
      <!-- Listings tab -->
      <div id="tab-listings">
        <div class="db-header">
          <div class="db-title">My listings</div>
          <a href="list.html" class="btn btn-primary">+ New listing</a>
        </div>
        <div id="listings-content"><div class="loading-wrap"><div class="spinner"></div></div></div>
      </div>

      <!-- Enquiries tab -->
      <div id="tab-enquiries" style="display:none">
        <div class="db-header">
          <div class="db-title">Enquiries inbox</div>
        </div>
        <div id="enquiries-content"><div class="loading-wrap"><div class="spinner"></div></div></div>
      </div>

      <!-- Saved tab -->
      <div id="tab-saved" style="display:none">
        <div class="db-header">
          <div class="db-title">Saved properties</div>
        </div>
        <div id="saved-content" style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem">
          <div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Profile tab -->
      <div id="tab-profile" style="display:none">
        <div class="db-header">
          <div class="db-title">Your profile</div>
        </div>
        <div class="card" style="max-width:560px">
          <div class="card-title">Account details</div>
          <div class="card-sub">Update your name, phone, or password</div>
          <div id="profile-alert"></div>
          <form onsubmit="saveProfile(event)">
            <div class="profile-grid">
              <div class="form-group">
                <label class="form-label">Full name</label>
                <input class="form-input" type="text" id="p-name" />
              </div>
              <div class="form-group">
                <label class="form-label">Phone number</label>
                <input class="form-input" type="tel" id="p-phone" placeholder="085 123 4567" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Email address</label>
              <input class="form-input" type="email" id="p-email" disabled style="opacity:.6" />
              <div class="form-hint">Email cannot be changed</div>
            </div>
            <hr style="border:none;border-top:1px solid var(--border);margin:1.25rem 0" />
            <div style="font-size:13px;font-weight:500;color:#333;margin-bottom:.85rem">Change password</div>
            <div class="form-group">
              <label class="form-label">Current password</label>
              <input class="form-input" type="password" id="p-current-pw" placeholder="Leave blank to keep current" />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">New password</label>
                <input class="form-input" type="password" id="p-new-pw" placeholder="Min 8 characters" />
              </div>
              <div class="form-group">
                <label class="form-label">Confirm new password</label>
                <input class="form-input" type="password" id="p-confirm-pw" />
              </div>
            </div>
            <button type="submit" class="btn btn-primary" id="profile-btn">Save changes</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    if (!requireLogin()) {}
    renderNav()

    let activeTab = new URLSearchParams(window.location.search).get('tab') || 'listings'

    async function init() {
      const user = await API.auth.me()
      document.getElementById('db-avatar').textContent = user.name?.charAt(0)?.toUpperCase() || 'U'
      document.getElementById('db-uname').textContent = user.name
      document.getElementById('db-uemail').textContent = user.email
      document.getElementById('p-name').value = user.name || ''
      document.getElementById('p-phone').value = user.phone || ''
      document.getElementById('p-email').value = user.email || ''
      switchTab(activeTab)
    }

    function switchTab(tab) {
      activeTab = tab
      document.querySelectorAll('#tab-listings,#tab-enquiries,#tab-saved,#tab-profile').forEach(el => el.style.display = 'none')
      document.querySelectorAll('.db-nav-item').forEach(el => el.classList.remove('active'))
      document.getElementById(`tab-${tab}`).style.display = 'block'
      document.querySelector(`.db-nav-item[data-tab="${tab}"]`)?.classList.add('active')

      if (tab === 'listings')  loadListings()
      if (tab === 'enquiries') loadEnquiries()
      if (tab === 'saved')     loadSaved()
    }

    async function loadListings() {
      const el = document.getElementById('listings-content')
      try {
        const listings = await API.listings.mine()
        if (!listings.length) {
          el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🏡</div><h3>No listings yet</h3><p>List your first property — it's free!</p><a href="list.html" class="btn btn-primary">Create listing</a></div>`
          return
        }
        el.innerHTML = listings.map(l => `
          <div class="listing-row">
            <div class="listing-thumb">
              ${l.primary_photo ? `<img src="${window.MOVIN_API_URL}${l.primary_photo}" />` : '🏡'}
            </div>
            <div class="listing-info">
              <div class="listing-title">${l.title}</div>
              <div class="listing-meta">
                <span class="status-dot dot-${l.status}"></span>${l.status}
                · ${l.county} · ${l.enquiry_count || 0} enquir${l.enquiry_count === 1 ? 'y' : 'ies'}
                · ${l.views} views
              </div>
            </div>
            <div class="listing-price">${formatPrice(l.price, l.listing_type)}</div>
            <div class="listing-actions">
              <a href="listing.html?id=${l.id}" class="btn btn-ghost btn-sm">View</a>
              ${l.status === 'pending_payment' ? `<button class="btn btn-orange btn-sm" onclick="payForListing('${l.id}')">Pay €9</button>` : ''}
              <button class="btn btn-sm" style="background:#fdf2f2;color:#b91c1c;border:1px solid #fecaca" onclick="deleteListing('${l.id}', this)">Delete</button>
            </div>
          </div>
        `).join('')
      } catch(e) {
        el.innerHTML = `<div class="alert alert-error">${e.message}</div>`
      }
    }

    async function loadEnquiries() {
      const el = document.getElementById('enquiries-content')
      try {
        const { enquiries, unread } = await API.enquiries.inbox()

        const badge = document.getElementById('unread-badge')
        if (unread > 0) { badge.textContent = unread; badge.style.display = 'inline' }
        else badge.style.display = 'none'

        if (!enquiries.length) {
          el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📨</div><h3>No enquiries yet</h3><p>When someone contacts you about a listing, it'll appear here.</p></div>`
          return
        }
        el.innerHTML = enquiries.map(e => `
          <div class="enq-card-row ${!e.is_read ? 'unread' : ''}" onclick="markRead('${e.id}', this)">
            <div class="enq-header">
              <span class="enq-from">${e.sender_name} ${!e.is_read ? '<span style="background:var(--green);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px">New</span>' : ''}</span>
              <span class="enq-time">${timeAgo(e.created_at)}</span>
            </div>
            <div class="enq-listing">Re: ${e.listing_title} · ${e.listing_county}</div>
            <div class="enq-message">${e.message}</div>
            <div class="enq-contact">
              <a href="mailto:${e.sender_email}">📧 ${e.sender_email}</a>
              ${e.sender_phone ? `<a href="tel:${e.sender_phone}">📞 ${e.sender_phone}</a>` : ''}
            </div>
          </div>
        `).join('')
      } catch(err) {
        el.innerHTML = `<div class="alert alert-error">${err.message}</div>`
      }
    }

    async function loadSaved() {
      const el = document.getElementById('saved-content')
      try {
        const items = await API.saved.all()
        if (!items.length) {
          el.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">♡</div><h3>No saved properties</h3><p>Heart any property while browsing to save it here.</p><a href="search.html" class="btn btn-ghost">Browse listings</a></div>`
          return
        }
        el.innerHTML = items.map(l => buildPropertyCard(l, items.map(x => x.id))).join('')
      } catch(err) {
        el.innerHTML = `<div class="alert alert-error" style="grid-column:1/-1">${err.message}</div>`
      }
    }

    async function markRead(id, el) {
      await API.enquiries.markRead(id).catch(() => {})
      el.classList.remove('unread')
      el.querySelector('.enq-from span')?.remove()
    }

    async function payForListing(id) {
      try {
        toast('Redirecting to payment…', 'info')
        const res = await API.payments.startCheckout(id)
        window.location.href = res.checkout_url
      } catch(e) { toast(e.message, 'error') }
    }

    async function deleteListing(id, btn) {
      if (!confirm('Are you sure you want to delete this listing? This cannot be undone.')) return
      btn.textContent = '…'; btn.disabled = true
      try {
        await API.listings.delete(id)
        toast('Listing deleted')
        loadListings()
      } catch(e) { toast(e.message, 'error'); btn.textContent = 'Delete'; btn.disabled = false }
    }

    async function saveProfile(e) {
      e.preventDefault()
      const btn = document.getElementById('profile-btn')
      const alert = document.getElementById('profile-alert')
      btn.classList.add('btn-loading'); btn.disabled = true
      alert.innerHTML = ''

      const newPw = document.getElementById('p-new-pw').value
      const confirmPw = document.getElementById('p-confirm-pw').value
      if (newPw && newPw !== confirmPw) {
        alert.innerHTML = '<div class="alert alert-error">New passwords do not match.</div>'
        btn.classList.remove('btn-loading'); btn.disabled = false
        return
      }

      try {
        await API.auth.updateProfile({
          name: document.getElementById('p-name').value,
          phone: document.getElementById('p-phone').value,
          currentPassword: document.getElementById('p-current-pw').value || undefined,
          newPassword: newPw || undefined
        })
        alert.innerHTML = '<div class="alert alert-success">✓ Profile updated successfully.</div>'
        document.getElementById('p-current-pw').value = ''
        document.getElementById('p-new-pw').value = ''
        document.getElementById('p-confirm-pw').value = ''
        renderNav()
      } catch(err) {
        alert.innerHTML = `<div class="alert alert-error">${err.message}</div>`
      } finally {
        btn.classList.remove('btn-loading'); btn.disabled = false
      }
    }

    init()
  </script>
</body>
</html>
