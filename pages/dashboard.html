<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Dashboard – Movin.ie</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    :root{--g:#1a5c45;--gd:#0e3d2e;--gl:#e9f4ef;--o:#e07b3f;--border:#e8e4dc;--safe-b:env(safe-area-inset-bottom,0px)}
    *,*::before,*::after{box-sizing:border-box}

    /* ── DESKTOP LAYOUT ── */
    .db-layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 64px)}
    .db-sidebar{background:#fff;border-right:1px solid var(--border);padding:1.5rem;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
    .db-user{display:flex;align-items:center;gap:10px;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
    .db-avatar{width:46px;height:46px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0}
    .db-uname{font-size:14px;font-weight:500;color:#111}
    .db-uemail{font-size:12px;color:#aaa;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
    .db-nav{display:flex;flex-direction:column;gap:4px}
    .db-nav-item{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;border-radius:10px;cursor:pointer;font-size:14px;color:#555;transition:all .15s;-webkit-tap-highlight-color:transparent}
    .db-nav-item:hover{background:#f5f5f5;color:var(--g)}
    .db-nav-item.active{background:var(--gl);color:var(--g);font-weight:500}
    .db-nav-item .badge{margin-left:auto;background:var(--o);color:#fff;padding:2px 8px;border-radius:20px;font-size:11px}
    .db-main{padding:1.5rem 2rem;min-width:0}

    /* ── MOBILE BOTTOM TABS ── */
    .mobile-tabs{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:100;padding-bottom:var(--safe-b)}
    .mobile-tabs-inner{display:flex}
    .mt-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:.6rem .5rem;cursor:pointer;font-size:10px;font-weight:500;color:#aaa;-webkit-tap-highlight-color:transparent;border:none;background:none;font-family:inherit;position:relative}
    .mt-item.active{color:var(--g)}
    .mt-icon{font-size:20px;line-height:1}
    .mt-badge{position:absolute;top:6px;right:calc(50% - 16px);background:var(--o);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;min-width:16px;text-align:center}

    /* ── HEADER ── */
    .db-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
    .db-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#111}

    /* ── LISTING ROWS ── */
    .listing-row{display:flex;align-items:center;gap:.85rem;padding:1rem;background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:.75rem;transition:box-shadow .15s}
    .listing-row:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
    .listing-thumb{width:76px;height:58px;border-radius:10px;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
    .listing-thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .listing-info{flex:1;min-width:0}
    .listing-title{font-size:14px;font-weight:500;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .listing-meta{font-size:11px;color:#aaa;margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
    .listing-price{font-size:15px;font-weight:500;color:var(--g);white-space:nowrap;flex-shrink:0}
    .listing-actions{display:flex;gap:6px;flex-shrink:0}
    .status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
    .dot-active{background:#2aaa50}
    .dot-pending,.dot-pending_review,.dot-pending_payment{background:var(--o)}
    .dot-expired,.dot-rejected{background:#ccc}
    .dot-draft{background:#aaa}

    /* ── ENQUIRY CARDS ── */
    .enq-card-row{background:#fff;border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:.75rem}
    .enq-card-row.unread{border-left:3px solid var(--g)}
    .enq-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;gap:.5rem}
    .enq-from{font-size:14px;font-weight:500;color:#111}
    .enq-time{font-size:12px;color:#aaa}
    .enq-listing{font-size:12px;color:var(--g);margin-bottom:.5rem}
    .enq-message{font-size:13px;color:#666;line-height:1.65;font-weight:300}
    .enq-contact{display:flex;gap:1rem;margin-top:.85rem;flex-wrap:wrap}
    .enq-contact a{font-size:13px;color:var(--g);font-weight:500}

    /* ── PROFILE ── */
    .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

    /* ── STATS CARDS ── */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.5rem}
    .stat-mini{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center}
    .stat-mini-n{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#111}
    .stat-mini-l{font-size:11px;color:#aaa;margin-top:2px}

    /* ── MOBILE RESPONSIVE ── */
    @media(max-width:768px){
      .db-layout{grid-template-columns:1fr;min-height:auto}
      .db-sidebar{display:none}
      .db-main{padding:1rem;padding-bottom:calc(80px + var(--safe-b))}
      .mobile-tabs{display:block}
      .db-title{font-size:20px}
      .stats-row{grid-template-columns:repeat(3,1fr);gap:.5rem}
      .stat-mini{padding:.75rem .5rem}
      .stat-mini-n{font-size:20px}
      .listing-row{padding:.85rem}
      .listing-thumb{width:64px;height:48px}
      .listing-actions{flex-direction:column;gap:4px}
      .listing-actions .btn{font-size:11px;padding:5px 10px}
      .listing-price{font-size:14px}
      .profile-grid{grid-template-columns:1fr}
      .saved-grid{grid-template-columns:1fr!important}
    }
    @media(max-width:380px){
      .listing-thumb{width:54px;height:42px;font-size:18px}
      .listing-title{font-size:13px}
    }

    .btn{display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;font-weight:500;border:none;border-radius:50px;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;text-decoration:none}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--g);color:#fff;padding:9px 18px;font-size:13px}
    .btn-ghost{background:#fff;color:var(--g);border:1.5px solid var(--border);padding:8px 16px;font-size:13px}
    .btn-sm{padding:6px 14px;font-size:12px}
    .btn-orange{background:var(--o);color:#fff;padding:9px 18px;font-size:13px}
    .empty-state{text-align:center;padding:3rem 1rem}
    .empty-state-icon{font-size:40px;margin-bottom:.75rem}
    .empty-state h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#111;margin-bottom:.5rem}
    .empty-state p{font-size:14px;color:#aaa;margin-bottom:1.25rem}
    .spinner{width:24px;height:24px;border-radius:50%;border:3px solid var(--gl);border-top-color:var(--g);animation:spin .7s linear infinite;margin:2rem auto;display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .alert-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:.75rem 1rem;border-radius:8px;font-size:13px}
    .alert-success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;padding:.75rem 1rem;border-radius:8px;font-size:13px}
    .form-group{margin-bottom:.85rem}
    .form-label{font-size:12px;font-weight:500;color:#555;display:block;margin-bottom:4px}
    .form-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;background:#fafaf8;color:#333;outline:none;transition:border .15s;-webkit-appearance:none;font-family:inherit}
    .form-input:focus{border-color:var(--g);background:#fff}
    .form-hint{font-size:11px;color:#aaa;margin-top:3px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    @media(max-width:480px){.form-row{grid-template-columns:1fr}}
    .card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
    .card-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#111;margin-bottom:.25rem}
    .card-sub{font-size:13px;color:#aaa;margin-bottom:1.25rem;font-weight:300}
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="db-layout">
    <!-- Desktop Sidebar -->
    <aside class="db-sidebar">
      <div class="db-user">
        <div class="db-avatar" id="db-avatar">U</div>
        <div style="min-width:0">
          <div class="db-uname" id="db-uname">Loading…</div>
          <div class="db-uemail" id="db-uemail"></div>
        </div>
      </div>
      <nav class="db-nav">
        <div class="db-nav-item active" data-tab="listings" onclick="switchTab('listings')">🏠 My listings</div>
        <div class="db-nav-item" data-tab="enquiries" onclick="switchTab('enquiries')">📨 Enquiries <span class="badge" id="unread-badge" style="display:none">0</span></div>
        <div class="db-nav-item" data-tab="saved" onclick="switchTab('saved')">♡ Saved</div>
        <div class="db-nav-item" data-tab="profile" onclick="switchTab('profile')">👤 Profile</div>
        <div style="padding-top:2rem;margin-top:2rem;border-top:1px solid var(--border)">
          <div class="db-nav-item" onclick="API.auth.logout()" style="color:#d93025">↩ Sign out</div>
        </div>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="db-main">

      <!-- Listings tab -->
      <div id="tab-listings">
        <div class="db-header">
          <div class="db-title">My listings</div>
          <a href="list.html" class="btn btn-primary">+ New listing</a>
        </div>
        <div id="stats-row" class="stats-row" style="display:none">
          <div class="stat-mini"><div class="stat-mini-n" id="s-total">0</div><div class="stat-mini-l">Total</div></div>
          <div class="stat-mini"><div class="stat-mini-n" id="s-views">0</div><div class="stat-mini-l">Views</div></div>
          <div class="stat-mini"><div class="stat-mini-n" id="s-enqs">0</div><div class="stat-mini-l">Enquiries</div></div>
        </div>
        <div id="listings-content"><div class="spinner"></div></div>
      </div>

      <!-- Enquiries tab -->
      <div id="tab-enquiries" style="display:none">
        <div class="db-header">
          <div class="db-title">Enquiries inbox</div>
        </div>
        <div id="enquiries-content"><div class="spinner"></div></div>
      </div>

      <!-- Saved tab -->
      <div id="tab-saved" style="display:none">
        <div class="db-header">
          <div class="db-title">Saved properties</div>
        </div>
        <div id="saved-content" class="saved-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem">
          <div class="spinner" style="grid-column:1/-1"></div>
        </div>
      </div>

      <!-- Profile tab -->
      <div id="tab-profile" style="display:none">
        <div class="db-header">
          <div class="db-title">Your profile</div>
        </div>
        <div class="card" style="max-width:560px">
          <div class="card-title">Account details</div>
          <div class="card-sub">Update your name, phone, or password</div>
          <div id="profile-alert"></div>
          <form onsubmit="saveProfile(event)">
            <div class="profile-grid">
              <div class="form-group">
                <label class="form-label">Full name</label>
                <input class="form-input" type="text" id="p-name"/>
              </div>
              <div class="form-group">
                <label class="form-label">Phone number</label>
                <input class="form-input" type="tel" id="p-phone" placeholder="085 123 4567"/>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Email address</label>
              <input class="form-input" type="email" id="p-email" disabled style="opacity:.6"/>
              <div class="form-hint">Email cannot be changed</div>
            </div>
            <hr style="border:none;border-top:1px solid var(--border);margin:1.25rem 0"/>
            <div style="font-size:13px;font-weight:500;color:#333;margin-bottom:.85rem">Change password</div>
            <div class="form-group">
              <label class="form-label">Current password</label>
              <input class="form-input" type="password" id="p-current-pw" placeholder="Leave blank to keep current"/>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">New password</label>
                <input class="form-input" type="password" id="p-new-pw" placeholder="Min 8 characters"/>
              </div>
              <div class="form-group">
                <label class="form-label">Confirm new password</label>
                <input class="form-input" type="password" id="p-confirm-pw"/>
              </div>
            </div>
            <button type="submit" class="btn btn-primary" id="profile-btn">Save changes</button>
          </form>
        </div>
      </div>

    </main>
  </div>

  <!-- Mobile bottom tabs -->
  <div class="mobile-tabs">
    <div class="mobile-tabs-inner">
      <button class="mt-item active" id="mt-listings" onclick="switchTab('listings')">
        <span class="mt-icon">🏠</span>Listings
      </button>
      <button class="mt-item" id="mt-enquiries" onclick="switchTab('enquiries')">
        <span class="mt-icon">📨</span>Enquiries
        <span class="mt-badge" id="mobile-badge" style="display:none">0</span>
      </button>
      <button class="mt-item" id="mt-saved" onclick="switchTab('saved')">
        <span class="mt-icon">♡</span>Saved
      </button>
      <button class="mt-item" id="mt-profile" onclick="switchTab('profile')">
        <span class="mt-icon">👤</span>Profile
      </button>
    </div>
  </div>

  <script>
    window.MOVIN_API_URL = 'https://movin-backend-production-1fb3.up.railway.app'
  </script>
  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    if (!requireLogin()) {}
    renderNav()

    var activeTab = new URLSearchParams(window.location.search).get('tab') || 'listings'

    function init() {
      var user = API.getUser()
      if (!user) return
      document.getElementById('db-avatar').textContent = (user.name || 'U').charAt(0).toUpperCase()
      document.getElementById('db-uname').textContent  = user.name || 'User'
      document.getElementById('db-uemail').textContent = user.email || ''
      document.getElementById('p-name').value  = user.name || ''
      document.getElementById('p-phone').value = user.phone || ''
      document.getElementById('p-email').value = user.email || ''
      switchTab(activeTab)
    }

    function switchTab(tab) {
      activeTab = tab

      // Hide all tabs
      ['listings','enquiries','saved','profile'].forEach(function(t) {
        document.getElementById('tab-' + t).style.display = 'none'
      })
      document.getElementById('tab-' + tab).style.display = 'block'

      // Desktop nav
      document.querySelectorAll('.db-nav-item').forEach(function(el) { el.classList.remove('active') })
      var navEl = document.querySelector('.db-nav-item[data-tab="' + tab + '"]')
      if (navEl) navEl.classList.add('active')

      // Mobile tabs
      document.querySelectorAll('.mt-item').forEach(function(el) { el.classList.remove('active') })
      var mobileEl = document.getElementById('mt-' + tab)
      if (mobileEl) mobileEl.classList.add('active')

      if (tab === 'listings')  loadListings()
      if (tab === 'enquiries') loadEnquiries()
      if (tab === 'saved')     loadSaved()
    }

    function getPhotoUrl(photo) {
      if (!photo) return null
      if (photo.startsWith('http')) return photo
      return window.MOVIN_API_URL + photo
    }

    async function loadListings() {
      var el = document.getElementById('listings-content')
      try {
        var listings = await API.listings.mine()

        if (!listings.length) {
          document.getElementById('stats-row').style.display = 'none'
          el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏡</div><h3>No listings yet</h3><p>List your first property — it\'s free!</p><a href="list.html" class="btn btn-primary">Create listing</a></div>'
          return
        }

        // Show stats
        var totalViews = listings.reduce(function(s, l) { return s + (l.views || 0) }, 0)
        var totalEnqs  = listings.reduce(function(s, l) { return s + (parseInt(l.enquiry_count) || 0) }, 0)
        document.getElementById('s-total').textContent = listings.length
        document.getElementById('s-views').textContent = totalViews
        document.getElementById('s-enqs').textContent  = totalEnqs
        document.getElementById('stats-row').style.display = 'grid'

        el.innerHTML = listings.map(function(l) {
          var photoUrl = getPhotoUrl(l.primary_photo)
          var thumbHtml = photoUrl
            ? '<img src="' + photoUrl + '" alt="' + l.title + '" loading="lazy"/>'
            : '🏡'

          var statusClass = 'dot-' + (l.status || 'draft').replace('_', '-')
          var statusLabel = (l.status || 'draft').replace(/_/g, ' ')

          var payBtn = l.status === 'pending_payment'
            ? '<button class="btn btn-orange btn-sm" onclick="payForListing(\'' + l.id + '\')">Pay €24.99</button>'
            : ''

          return '<div class="listing-row">' +
            '<div class="listing-thumb">' + thumbHtml + '</div>' +
            '<div class="listing-info">' +
              '<div class="listing-title">' + l.title + '</div>' +
              '<div class="listing-meta">' +
                '<span class="status-dot ' + statusClass + '"></span>' +
                '<span>' + statusLabel + '</span>' +
                '<span>· ' + l.county + '</span>' +
                '<span>· ' + (l.enquiry_count || 0) + ' enquir' + (parseInt(l.enquiry_count) === 1 ? 'y' : 'ies') + '</span>' +
                '<span>· ' + (l.views || 0) + ' views</span>' +
              '</div>' +
            '</div>' +
            '<div class="listing-price">' + formatPrice(l.price, l.listing_type) + '</div>' +
            '<div class="listing-actions">' +
              '<a href="listing.html?id=' + l.id + '" class="btn btn-ghost btn-sm">View</a>' +
              payBtn +
              '<button class="btn btn-sm" style="background:#fdf2f2;color:#b91c1c;border:1px solid #fecaca" onclick="deleteListing(\'' + l.id + '\', this)">Delete</button>' +
            '</div>' +
          '</div>'
        }).join('')
      } catch(e) {
        el.innerHTML = '<div class="alert-error">' + e.message + '</div>'
      }
    }

    async function loadEnquiries() {
      var el = document.getElementById('enquiries-content')
      try {
        var result = await API.enquiries.inbox()
        var enquiries = result.enquiries || []
        var unread    = result.unread    || 0

        // Update badges
        var badge = document.getElementById('unread-badge')
        var mobileBadge = document.getElementById('mobile-badge')
        if (unread > 0) {
          badge.textContent = unread; badge.style.display = 'inline'
          mobileBadge.textContent = unread; mobileBadge.style.display = 'block'
        } else {
          badge.style.display = 'none'
          mobileBadge.style.display = 'none'
        }

        if (!enquiries.length) {
          el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📨</div><h3>No enquiries yet</h3><p>When someone contacts you about a listing, it\'ll appear here.</p></div>'
          return
        }

        el.innerHTML = enquiries.map(function(e) {
          return '<div class="enq-card-row ' + (!e.is_read ? 'unread' : '') + '" onclick="markRead(\'' + e.id + '\', this)">' +
            '<div class="enq-header">' +
              '<span class="enq-from">' + e.sender_name +
                (!e.is_read ? ' <span style="background:var(--g);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px">New</span>' : '') +
              '</span>' +
              '<span class="enq-time">' + timeAgo(e.created_at) + '</span>' +
            '</div>' +
            '<div class="enq-listing">Re: ' + (e.listing_title || 'Your listing') + ' · ' + (e.listing_county || '') + '</div>' +
            '<div class="enq-message">' + e.message + '</div>' +
            '<div class="enq-contact">' +
              '<a href="mailto:' + e.sender_email + '">📧 ' + e.sender_email + '</a>' +
              (e.sender_phone ? '<a href="tel:' + e.sender_phone + '">📞 ' + e.sender_phone + '</a>' : '') +
            '</div>' +
          '</div>'
        }).join('')
      } catch(err) {
        el.innerHTML = '<div class="alert-error">' + err.message + '</div>'
      }
    }

    async function loadSaved() {
      var el = document.getElementById('saved-content')
      try {
        var items = await API.saved.all()
        if (!items.length) {
          el.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">♡</div><h3>No saved properties</h3><p>Heart any property while browsing to save it here.</p><a href="search.html" class="btn btn-ghost">Browse listings</a></div>'
          return
        }
        el.innerHTML = items.map(function(l) { return buildPropertyCard(l, items.map(function(x) { return x.id })) }).join('')
      } catch(err) {
        el.innerHTML = '<div class="alert-error" style="grid-column:1/-1">' + err.message + '</div>'
      }
    }

    async function markRead(id, el) {
      await API.enquiries.markRead(id).catch(function(){})
      el.classList.remove('unread')
      var badge = el.querySelector('.enq-from span')
      if (badge) badge.remove()
    }

    async function payForListing(id) {
      try {
        toast('Redirecting to payment…', 'info')
        var res = await API.payments.startCheckout(id)
        window.location.href = res.checkout_url
      } catch(e) { toast(e.message, 'error') }
    }

    async function deleteListing(id, btn) {
      if (!confirm('Are you sure you want to delete this listing? This cannot be undone.')) return
      btn.textContent = '…'; btn.disabled = true
      try {
        await API.listings.delete(id)
        toast('Listing deleted')
        loadListings()
      } catch(e) {
        toast(e.message, 'error')
        btn.textContent = 'Delete'
        btn.disabled = false
      }
    }

    async function saveProfile(e) {
      e.preventDefault()
      var btn   = document.getElementById('profile-btn')
      var alertEl = document.getElementById('profile-alert')
      btn.disabled = true
      btn.textContent = 'Saving…'
      alertEl.innerHTML = ''

      var newPw     = document.getElementById('p-new-pw').value
      var confirmPw = document.getElementById('p-confirm-pw').value
      if (newPw && newPw !== confirmPw) {
        alertEl.innerHTML = '<div class="alert-error">New passwords do not match.</div>'
        btn.disabled = false
        btn.textContent = 'Save changes'
        return
      }

      try {
        await API.auth.updateProfile({
          name:            document.getElementById('p-name').value,
          phone:           document.getElementById('p-phone').value,
          currentPassword: document.getElementById('p-current-pw').value || undefined,
          newPassword:     newPw || undefined
        })
        alertEl.innerHTML = '<div class="alert-success">✓ Profile updated successfully.</div>'
        document.getElementById('p-current-pw').value = ''
        document.getElementById('p-new-pw').value = ''
        document.getElementById('p-confirm-pw').value = ''
        renderNav()
      } catch(err) {
        alertEl.innerHTML = '<div class="alert-error">' + err.message + '</div>'
      }
      btn.disabled = false
      btn.textContent = 'Save changes'
    }

    init()
  </script>
</body>
</html>
