<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Dashboard – Movin.ie</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#1a5c45"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Movin"/>
  <style>
    :root{--g:#1a5c45;--gd:#0e3d2e;--gl:#e9f4ef;--o:#e07b3f;--border:#e8e4dc;--safe-b:env(safe-area-inset-bottom,0px)}
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#f5f2ec;color:#111;margin:0}

    .db-layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 64px)}
    .db-sidebar{background:#fff;border-right:1px solid var(--border);padding:1.5rem;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
    .db-user{display:flex;align-items:center;gap:10px;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
    .db-avatar{width:46px;height:46px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0}
    .db-uname{font-size:14px;font-weight:500;color:#111}
    .db-uemail{font-size:12px;color:#aaa;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
    .db-nav{display:flex;flex-direction:column;gap:4px}
    .db-nav-item{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;border-radius:10px;cursor:pointer;font-size:14px;color:#555;transition:all .15s;-webkit-tap-highlight-color:transparent}
    .db-nav-item:hover{background:#f5f5f5;color:var(--g)}
    .db-nav-item.active{background:var(--gl);color:var(--g);font-weight:500}
    .db-nav-item .nbadge{margin-left:auto;background:var(--o);color:#fff;padding:2px 8px;border-radius:20px;font-size:11px}
    .db-main{padding:1.5rem 2rem;min-width:0}

    .mobile-tabs{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:100;padding-bottom:var(--safe-b)}
    .mobile-tabs-inner{display:flex}
    .mt-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:.6rem .5rem;cursor:pointer;font-size:10px;font-weight:500;color:#aaa;-webkit-tap-highlight-color:transparent;border:none;background:none;font-family:inherit;position:relative}
    .mt-item.active{color:var(--g)}
    .mt-icon{font-size:20px;line-height:1}
    .mt-badge{position:absolute;top:6px;right:calc(50% - 16px);background:var(--o);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;min-width:16px;text-align:center}

    .db-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
    .db-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#111}

    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.5rem}
    .stat-mini{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center}
    .stat-mini-n{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#111}
    .stat-mini-l{font-size:11px;color:#aaa;margin-top:2px}

    .listing-row{display:flex;align-items:center;gap:.85rem;padding:1rem;background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:.75rem}
    .listing-thumb{width:76px;height:58px;border-radius:10px;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
    .listing-thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .listing-info{flex:1;min-width:0}
    .listing-title{font-size:14px;font-weight:500;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .listing-meta{font-size:11px;color:#aaa;margin-top:3px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
    .listing-price{font-size:15px;font-weight:500;color:var(--g);white-space:nowrap;flex-shrink:0}
    .listing-actions{display:flex;gap:6px;flex-shrink:0}
    .status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
    .dot-active{background:#2aaa50}
    .dot-pending,.dot-pending_review,.dot-pending_payment{background:var(--o)}
    .dot-expired,.dot-rejected{background:#ccc}
    .dot-draft{background:#aaa}

    .enq-card-row{background:#fff;border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:.75rem;cursor:pointer}
    .enq-card-row.unread{border-left:3px solid var(--g)}
    .enq-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;gap:.5rem}
    .enq-from{font-size:14px;font-weight:500;color:#111}
    .enq-time{font-size:12px;color:#aaa}
    .enq-listing{font-size:12px;color:var(--g);margin-bottom:.5rem}
    .enq-message{font-size:13px;color:#666;line-height:1.65;font-weight:300}
    .enq-contact{display:flex;gap:1rem;margin-top:.85rem;flex-wrap:wrap}
    .enq-contact a{font-size:13px;color:var(--g);font-weight:500;text-decoration:none}

    .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
    .card-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#111;margin-bottom:.25rem}
    .card-sub{font-size:13px;color:#aaa;margin-bottom:1.25rem;font-weight:300}
    .form-group{margin-bottom:.85rem}
    .form-label{font-size:12px;font-weight:500;color:#555;display:block;margin-bottom:4px}
    .form-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;background:#fafaf8;color:#333;outline:none;transition:border .15s;-webkit-appearance:none;font-family:inherit}
    .form-input:focus{border-color:var(--g);background:#fff}
    .form-hint{font-size:11px;color:#aaa;margin-top:3px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}

    .btn{display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;font-weight:500;border:none;border-radius:50px;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;text-decoration:none;font-size:13px}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--g);color:#fff;padding:9px 18px}
    .btn-ghost{background:#fff;color:var(--g);border:1.5px solid var(--border);padding:8px 16px}
    .btn-sm{padding:6px 14px;font-size:12px}
    .btn-orange{background:var(--o);color:#fff;padding:9px 18px}

    .empty-state{text-align:center;padding:3rem 1rem}
    .empty-state-icon{font-size:40px;margin-bottom:.75rem}
    .empty-state h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#111;margin-bottom:.5rem}
    .empty-state p{font-size:14px;color:#aaa;margin-bottom:1.25rem}

    .db-spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--gl);border-top-color:var(--g);animation:spin .7s linear infinite;margin:3rem auto;display:block}
    @keyframes spin{to{transform:rotate(360deg)}}

    .alert-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:.75rem 1rem;border-radius:8px;font-size:13px;margin-bottom:.75rem}
    .alert-success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;padding:.75rem 1rem;border-radius:8px;font-size:13px;margin-bottom:.75rem}

    @media(max-width:768px){
      .db-layout{grid-template-columns:1fr;min-height:auto}
      .db-sidebar{display:none}
      .db-main{padding:1rem;padding-bottom:calc(80px + var(--safe-b))}
      .mobile-tabs{display:block}
      .db-title{font-size:20px}
      .stats-row{gap:.5rem}
      .stat-mini{padding:.75rem .5rem}
      .stat-mini-n{font-size:20px}
      .listing-row{padding:.85rem;gap:.65rem}
      .listing-thumb{width:64px;height:48px}
      .listing-actions{flex-direction:column;gap:4px}
      .listing-actions .btn{font-size:11px;padding:5px 10px}
      .profile-grid{grid-template-columns:1fr}
      .form-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="db-layout">
    <aside class="db-sidebar">
      <div class="db-user">
        <div class="db-avatar" id="db-avatar">U</div>
        <div style="min-width:0">
          <div class="db-uname" id="db-uname">—</div>
          <div class="db-uemail" id="db-uemail"></div>
        </div>
      </div>
      <nav class="db-nav">
        <div class="db-nav-item active" data-tab="listings" onclick="switchTab('listings')"><svg width="16" height="16" style="color:currentColor;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-house"/></svg> My listings</div>
        <div class="db-nav-item" data-tab="enquiries" onclick="switchTab('enquiries')"><svg width="16" height="16" style="color:currentColor;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-inbox"/></svg> Enquiries <span class="nbadge" id="unread-badge" style="display:none">0</span></div>
        <div class="db-nav-item" data-tab="saved" onclick="switchTab('saved')"><svg width="16" height="16" style="color:currentColor;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-heart"/></svg> Saved</div>
        <div class="db-nav-item" data-tab="profile" onclick="switchTab('profile')"><svg width="16" height="16" style="color:currentColor;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-user"/></svg> Profile</div>
        <div style="padding-top:2rem;margin-top:2rem;border-top:1px solid var(--border)">
          <div class="db-nav-item" id="signout-btn" style="color:#d93025"><svg width="16" height="16" style="color:currentColor;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-signout"/></svg> Sign out</div>
        </div>
      </nav>
    </aside>

    <main class="db-main">
      <div id="tab-listings">
        <div class="db-header">
          <div class="db-title">My listings</div>
          <a href="list.html" class="btn btn-primary">+ New listing</a>
        </div>
        <div id="stats-row" class="stats-row" style="display:none">
          <div class="stat-mini"><div class="stat-mini-n" id="s-total">0</div><div class="stat-mini-l">Total</div></div>
          <div class="stat-mini"><div class="stat-mini-n" id="s-views">0</div><div class="stat-mini-l">Views</div></div>
          <div class="stat-mini"><div class="stat-mini-n" id="s-enqs">0</div><div class="stat-mini-l">Enquiries</div></div>
        </div>
        <div id="listings-content"><div class="db-spinner"></div></div>
      </div>

      <div id="tab-enquiries" style="display:none">
        <div class="db-header"><div class="db-title">Enquiries inbox</div></div>
        <div id="enquiries-content"><div class="db-spinner"></div></div>
      </div>

      <div id="tab-saved" style="display:none">
        <div class="db-header"><div class="db-title">Saved properties</div></div>
        <div id="saved-content" style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem">
          <div class="db-spinner" style="grid-column:1/-1"></div>
        </div>
      </div>

      <div id="tab-profile" style="display:none">
        <div class="db-header"><div class="db-title">Your profile</div></div>
        <div class="card" style="max-width:560px">
          <div class="card-title">Account details</div>
          <div class="card-sub">Update your name, phone, or password</div>
          <div id="profile-alert"></div>
          <form onsubmit="saveProfile(event)">
            <div class="profile-grid">
              <div class="form-group"><label class="form-label">Full name</label><input class="form-input" type="text" id="p-name"/></div>
              <div class="form-group"><label class="form-label">Phone number</label><input class="form-input" type="tel" id="p-phone" placeholder="085 123 4567"/></div>
            </div>
            <div class="form-group">
              <label class="form-label">Email address</label>
              <input class="form-input" type="email" id="p-email" disabled style="opacity:.6"/>
              <div class="form-hint">Email cannot be changed</div>
            </div>
            <hr style="border:none;border-top:1px solid var(--border);margin:1.25rem 0"/>
            <div style="font-size:13px;font-weight:500;color:#333;margin-bottom:.85rem">Change password</div>
            <div class="form-group"><label class="form-label">Current password</label><input class="form-input" type="password" id="p-current-pw" placeholder="Leave blank to keep current"/></div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">New password</label><input class="form-input" type="password" id="p-new-pw" placeholder="Min 8 characters"/></div>
              <div class="form-group"><label class="form-label">Confirm new password</label><input class="form-input" type="password" id="p-confirm-pw"/></div>
            </div>
            <button type="submit" class="btn btn-primary" id="profile-btn">Save changes</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <div class="mobile-tabs">
    <div class="mobile-tabs-inner">
      <button class="mt-item active" id="mt-listings" onclick="switchTab('listings')"><span class="mt-icon"><svg width="22" height="22" style="color:currentColor;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-house"/></svg></span>Listings</button>
      <button class="mt-item" id="mt-enquiries" onclick="switchTab('enquiries')"><span class="mt-icon"><svg width="22" height="22" style="color:currentColor;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-inbox"/></svg></span>Enquiries<span class="mt-badge" id="mobile-badge" style="display:none">0</span></button>
      <button class="mt-item" id="mt-saved" onclick="switchTab('saved')"><span class="mt-icon"><svg width="22" height="22" style="color:currentColor;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-heart"/></svg></span>Saved</button>
      <button class="mt-item" id="mt-profile" onclick="switchTab('profile')"><span class="mt-icon"><svg width="22" height="22" style="color:currentColor;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-user"/></svg></span>Profile</button>
    </div>
  </div>

  <script>
    window.MOVIN_API_URL = 'https://movin-backend-production-1fb3.up.railway.app'
  </script>
  <script src="../js/icons.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script>

  var activeTab = new URLSearchParams(window.location.search).get('tab') || 'listings'

  function fmtPrice(price, type) {
    return '€' + Number(price).toLocaleString('en-IE') + (type === 'rent' ? '/mo' : '')
  }

  function getPhoto(photo) {
    if (!photo) return null
    return photo.startsWith('http') ? photo : window.MOVIN_API_URL + photo
  }

  function switchTab(tab) {
    activeTab = tab
    var tabs = ['listings','enquiries','saved','profile']
    tabs.forEach(function(t) {
      document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none'
    })
    document.querySelectorAll('.db-nav-item').forEach(function(el) { el.classList.remove('active') })
    var navEl = document.querySelector('.db-nav-item[data-tab="' + tab + '"]')
    if (navEl) navEl.classList.add('active')
    document.querySelectorAll('.mt-item').forEach(function(el) { el.classList.remove('active') })
    var mtEl = document.getElementById('mt-' + tab)
    if (mtEl) mtEl.classList.add('active')
    if (tab === 'listings')  loadListings()
    if (tab === 'enquiries') loadEnquiries()
    if (tab === 'saved')     loadSaved()
  }

  async function loadListings() {
    var el = document.getElementById('listings-content')
    el.innerHTML = '<div class="db-spinner"></div>'
    try {
      var token = localStorage.getItem('movin_token')
      if (!token) {
        el.innerHTML = '<div class="alert-error">Please <a href="login.html" style="color:#1a5c45;font-weight:500">sign in</a> to see your listings.</div>'
        return
      }
      var res = await fetch(window.MOVIN_API_URL + '/api/listings/mine', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      var listings = await res.json()
      if (!Array.isArray(listings)) throw new Error(listings.error || 'Could not load listings')

      if (!listings.length) {
        document.getElementById('stats-row').style.display = 'none'
        el.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg width="48" height="48" style="color:#c8dfd4;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-house"/></svg></div><h3>No listings yet</h3><p>List your first property — it\'s free!</p><a href="list.html" class="btn btn-primary" style="margin-top:.5rem">Create listing</a></div>'
        return
      }

      var totalViews = listings.reduce(function(s,l){ return s+(l.views||0) },0)
      var totalEnqs  = listings.reduce(function(s,l){ return s+(parseInt(l.enquiry_count)||0) },0)
      document.getElementById('s-total').textContent = listings.length
      document.getElementById('s-views').textContent = totalViews
      document.getElementById('s-enqs').textContent  = totalEnqs
      document.getElementById('stats-row').style.display = 'grid'

      el.innerHTML = listings.map(function(l) {
        var photoUrl = getPhoto(l.primary_photo)
        var thumb = photoUrl ? '<img src="' + photoUrl + '" alt="' + l.title + '" loading="lazy"/>' : '🏡'
        var statusLabel = (l.status||'draft').replace(/_/g,' ')
        var dotClass = 'dot-' + (l.status||'draft')
        var payBtn = l.status === 'pending_payment'
          ? '<button class="btn btn-orange btn-sm" onclick="payForListing(\'' + l.id + '\')">Pay €24.99</button>'
          : ''
        return '<div class="listing-row">' +
          '<div class="listing-thumb">' + thumb + '</div>' +
          '<div class="listing-info">' +
            '<div class="listing-title">' + l.title + '</div>' +
            '<div class="listing-meta">' +
              '<span class="status-dot ' + dotClass + '"></span> ' + statusLabel +
              ' · ' + l.county +
              ' · ' + (l.enquiry_count||0) + ' enq' +
              ' · ' + (l.views||0) + ' views' +
            '</div>' +
          '</div>' +
          '<div class="listing-price">' + fmtPrice(l.price, l.listing_type) + '</div>' +
          '<div class="listing-actions">' +
            '<a href="listing.html?id=' + l.id + '" class="btn btn-ghost btn-sm">View</a>' +
            payBtn +
            '<button class="btn btn-sm" style="background:#fdf2f2;color:#b91c1c;border:1px solid #fecaca" onclick="deleteListing(\'' + l.id + '\',this)">Delete</button>' +
          '</div>' +
        '</div>'
      }).join('')
    } catch(e) {
      console.error('loadListings:', e)
      el.innerHTML = '<div class="alert-error">' + e.message + ' <button onclick="loadListings()" class="btn btn-ghost btn-sm" style="margin-left:.5rem">Retry</button></div>'
    }
  }

  async function loadEnquiries() {
    var el = document.getElementById('enquiries-content')
    el.innerHTML = '<div class="db-spinner"></div>'
    try {
      var token = localStorage.getItem('movin_token')
      var res = await fetch(window.MOVIN_API_URL + '/api/enquiries/inbox', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      var data = await res.json()
      var enquiries = data.enquiries || []
      var unread    = data.unread    || 0

      var badge = document.getElementById('unread-badge')
      var mb    = document.getElementById('mobile-badge')
      if (unread > 0) {
        badge.textContent = unread; badge.style.display = 'inline'
        mb.textContent = unread; mb.style.display = 'block'
      } else {
        badge.style.display = 'none'
        mb.style.display = 'none'
      }

      if (!enquiries.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg width="48" height="48" style="color:#c8dfd4;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-inbox"/></svg></div><h3>No enquiries yet</h3><p>When someone contacts you about a listing, it\'ll appear here.</p></div>'
        return
      }

      el.innerHTML = enquiries.map(function(e) {
        return '<div class="enq-card-row ' + (!e.is_read ? 'unread' : '') + '" onclick="markRead(\'' + e.id + '\',this)">' +
          '<div class="enq-header">' +
            '<span class="enq-from">' + e.sender_name +
              (!e.is_read ? ' <span style="background:var(--g);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px">New</span>' : '') +
            '</span>' +
            '<span class="enq-time">' + (e.created_at ? new Date(e.created_at).toLocaleDateString('en-IE') : '') + '</span>' +
          '</div>' +
          '<div class="enq-listing">Re: ' + (e.listing_title||'Your listing') + '</div>' +
          '<div class="enq-message">' + e.message + '</div>' +
          '<div class="enq-contact">' +
            '<a href="mailto:' + e.sender_email + '">📧 ' + e.sender_email + '</a>' +
            (e.sender_phone ? '<a href="tel:' + e.sender_phone + '">📞 ' + e.sender_phone + '</a>' : '') +
          '</div>' +
        '</div>'
      }).join('')
    } catch(err) {
      el.innerHTML = '<div class="alert-error">' + err.message + '</div>'
    }
  }

  async function loadSaved() {
    var el = document.getElementById('saved-content')
    el.innerHTML = '<div class="db-spinner" style="grid-column:1/-1"></div>'
    try {
      var token = localStorage.getItem('movin_token')
      var res = await fetch(window.MOVIN_API_URL + '/api/saved', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      var items = await res.json()
      if (!Array.isArray(items) || !items.length) {
        el.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon"><svg width="48" height="48" style="color:#c8dfd4;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-heart"/></svg></div><h3>No saved properties</h3><p>Heart any property while browsing to save it here.</p><a href="search.html" class="btn btn-ghost">Browse listings</a></div>'
        return
      }
      el.innerHTML = items.map(function(l) {
        var photoUrl = getPhoto(l.primary_photo)
        var thumb = photoUrl
          ? '<img src="' + photoUrl + '" style="width:100%;height:100%;object-fit:cover" alt="' + l.title + '"/>'
          : '<span style="font-size:34px">🏡</span>'
        var typeLabel = l.listing_type === 'rent' ? 'To Rent' : 'For Sale'
        return '<div style="background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer" onclick="location.href=\'listing.html?id=' + l.id + '\'">' +
          '<div style="height:140px;display:flex;align-items:center;justify-content:center;background:var(--gl);overflow:hidden">' + thumb + '</div>' +
          '<div style="padding:.85rem">' +
            '<div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">' + (l.address_area||l.county) + '</div>' +
            '<div style="font-family:Playfair Display,serif;font-size:14px;font-weight:700;color:#111;margin-bottom:4px">' + l.title + '</div>' +
            '<div style="font-size:15px;font-weight:500;color:var(--g)">' + fmtPrice(l.price, l.listing_type) + '</div>' +
          '</div>' +
        '</div>'
      }).join('')
    } catch(err) {
      el.innerHTML = '<div class="alert-error" style="grid-column:1/-1">' + err.message + '</div>'
    }
  }

  async function markRead(id, el) {
    var token = localStorage.getItem('movin_token')
    await fetch(window.MOVIN_API_URL + '/api/enquiries/' + id + '/read', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token }
    }).catch(function(){})
    el.classList.remove('unread')
    var badge = el.querySelector('.enq-from span')
    if (badge) badge.remove()
  }

  async function payForListing(id) {
    try {
      var token = localStorage.getItem('movin_token')
      var res = await fetch(window.MOVIN_API_URL + '/api/payments/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ listing_id: id })
      })
      var data = await res.json()
      if (data.checkout_url) window.location.href = data.checkout_url
    } catch(e) { alert('Payment error: ' + e.message) }
  }

  async function deleteListing(id, btn) {
    if (!confirm('Delete this listing? This cannot be undone.')) return
    btn.textContent = '…'; btn.disabled = true
    try {
      var token = localStorage.getItem('movin_token')
      await fetch(window.MOVIN_API_URL + '/api/listings/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      })
      loadListings()
    } catch(e) {
      alert('Error: ' + e.message)
      btn.textContent = 'Delete'
      btn.disabled = false
    }
  }

  async function saveProfile(e) {
    e.preventDefault()
    var btn     = document.getElementById('profile-btn')
    var alertEl = document.getElementById('profile-alert')
    var newPw   = document.getElementById('p-new-pw').value
    var confPw  = document.getElementById('p-confirm-pw').value
    if (newPw && newPw !== confPw) {
      alertEl.innerHTML = '<div class="alert-error">Passwords do not match.</div>'
      return
    }
    btn.disabled = true; btn.textContent = 'Saving…'
    alertEl.innerHTML = ''
    try {
      var token = localStorage.getItem('movin_token')
      var res = await fetch(window.MOVIN_API_URL + '/api/auth/profile', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          name:            document.getElementById('p-name').value,
          phone:           document.getElementById('p-phone').value,
          currentPassword: document.getElementById('p-current-pw').value || undefined,
          newPassword:     newPw || undefined
        })
      })
      var data = await res.json()
      if (!res.ok) throw new Error(data.error)
      alertEl.innerHTML = '<div class="alert-success">✓ Profile updated.</div>'
      document.getElementById('p-current-pw').value = ''
      document.getElementById('p-new-pw').value = ''
      document.getElementById('p-confirm-pw').value = ''
      // Update nav name
      if (data.user) {
        document.getElementById('db-uname').textContent = data.user.name || ''
        document.getElementById('db-avatar').textContent = (data.user.name||'U').charAt(0).toUpperCase()
      }
    } catch(err) {
      alertEl.innerHTML = '<div class="alert-error">' + err.message + '</div>'
    }
    btn.disabled = false; btn.textContent = 'Save changes'
  }

  // ── Init ──────────────────────────────────────────────────
  function initDashboard() {
    // Check login
    var token = localStorage.getItem('movin_token')
    if (!token) {
      window.location.href = 'login.html'
      return
    }

    // Render nav
    if (typeof renderNav === 'function') renderNav()

    // Get user info from token
    try {
      var payload = JSON.parse(atob(token.split('.')[1]))
      var userId = payload.userId
      // Fetch user details
      fetch(window.MOVIN_API_URL + '/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(function(r){ return r.json() }).then(function(user) {
        if (user && user.name) {
          document.getElementById('db-avatar').textContent = user.name.charAt(0).toUpperCase()
          document.getElementById('db-uname').textContent  = user.name
          document.getElementById('db-uemail').textContent = user.email || ''
          document.getElementById('p-name').value  = user.name || ''
          document.getElementById('p-phone').value = user.phone || ''
          document.getElementById('p-email').value = user.email || ''
        }
      }).catch(function(){})
    } catch(e) {}

    // Sign out
    document.getElementById('signout-btn').addEventListener('click', function() {
      localStorage.removeItem('movin_token')
      localStorage.removeItem('movin_user')
      window.location.href = '../index.html'
    })

    // Switch to tab from URL
    switchTab(activeTab)
  }

  // Wait for DOM + scripts to be ready
  if (document.readyState === 'complete') {
    initDashboard()
  } else {
    window.addEventListener('load', initDashboard)
  }

  </script>
  <footer class="site-footer" id="site-footer"></footer>
</body>
