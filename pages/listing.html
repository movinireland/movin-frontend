<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="apple-touch-icon" href="/favicon.svg"/>
<link rel="manifest" href="/manifest.json"/>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Property – Movin.ie</title>
  <meta id="og-title" property="og:title" content="Property on Movin.ie"/>
  <meta id="og-desc" property="og:description" content="Find your next home on Movin.ie — Ireland's property marketplace"/>
  <meta id="og-image" property="og:image" content="https://movin.ie/og-default.jpg"/>
  <meta id="og-url" property="og:url" content=""/>
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="Movin.ie"/>
  <meta id="tw-title" name="twitter:title" content="Property on Movin.ie"/>
  <meta id="tw-desc" name="twitter:description" content="Find your next home on Movin.ie"/>
  <meta id="tw-image" name="twitter:image" content="https://movin.ie/og-default.jpg"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link id="canonical" rel="canonical" href=""/>
  <link rel="stylesheet" href="../css/main.css"/>
  <meta name="theme-color" content="#1a5c45"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Movin"/>
  <style>
    .breadcrumb{padding:.65rem 1rem;font-size:12px;color:#aaa;background:var(--white,#fff);border-bottom:1px solid var(--border,#f5f2ec);display:flex;align-items:center;gap:6px}
    .breadcrumb span{color:var(--g);cursor:pointer}
    /* ── Zoopla-style gallery ── */
    /* ── MOVIN v2 LAYOUT — 2-column all screens ── */
    .listing-page-wrap{display:grid;grid-template-columns:1fr;background:var(--bg,#f5f2ec)}
    @media(min-width:580px){
      .listing-page-wrap{grid-template-columns:1fr 300px;align-items:start;max-width:1240px;margin:0 auto;padding:1rem;gap:1.25rem}
    }
    @media(min-width:960px){
      .listing-page-wrap{grid-template-columns:1fr 380px;padding:1.5rem 2rem;gap:2rem}
    }
    .listing-col-left{min-width:0;background:var(--white,#fff);border-radius:0}
    @media(min-width:580px){.listing-col-left{border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.06)}}
    .listing-col-right{display:none}
    @media(min-width:580px){.listing-col-right{display:block;position:sticky;top:72px}}

    /* Gallery */
    .gallery-wrap{position:relative;background:#111;user-select:none}
    .gallery-hero{width:100%;height:260px;position:relative;overflow:hidden;cursor:pointer}
    @media(min-width:580px){.gallery-hero{height:360px}}
    @media(min-width:960px){.gallery-hero{height:460px}}
    .gallery-hero img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .15s}
    .gallery-hero:hover img{transform:scale(1.015)}
    .gallery-hero-placeholder{width:100%;height:280px;background:linear-gradient(135deg,#c8dfd4,#e9f4ef);display:flex;align-items:center;justify-content:center;font-size:64px}
    .gallery-counter{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.65);color:#fff;font-size:12px;font-weight:500;padding:5px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
    .gallery-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.9);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.2);-webkit-tap-highlight-color:transparent}
    .gallery-nav:hover{background:#fff}
    .gallery-prev{left:10px}
    .gallery-next{right:10px}
    .gallery-thumbs{display:flex;gap:4px;padding:4px;background:#111;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .gallery-thumbs::-webkit-scrollbar{display:none}
    .gallery-thumb-item{width:72px;height:52px;flex-shrink:0;border-radius:4px;overflow:hidden;cursor:pointer;opacity:.6;transition:opacity .15s;border:2px solid transparent}
    .gallery-thumb-item:hover{opacity:.85}
    .gallery-thumb-item.active{opacity:1;border-color:#e07b3f}
    .gallery-thumb-item img{width:100%;height:100%;object-fit:cover;display:block}
    /* Lightbox */
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center}
    .lightbox.open{display:flex}
    .lightbox-img{max-width:95vw;max-height:85vh;object-fit:contain;border-radius:4px}
    .lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .lightbox-close:hover{background:rgba(255,255,255,.25)}
    .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .lightbox-nav:hover{background:rgba(255,255,255,.25)}
    .lightbox-prev{left:16px}
    .lightbox-next{right:16px}
    .lightbox-counter{position:absolute;bottom:20px;color:rgba(255,255,255,.7);font-size:13px}
    .detail-header{padding:1rem 1rem .5rem}
    .d-tag-row{display:flex;gap:6px;align-items:center;margin-bottom:.6rem;flex-wrap:wrap}
    .d-age{font-size:12px;color:#bbb}
    .d-title{font-family:'Playfair Display', Georgia, 'Times New Roman', serif;font-size:22px;font-weight:700;color:#111;margin-bottom:.4rem;line-height:1.2}
    .d-loc{font-size:13px;color:#aaa;margin-bottom:.75rem}
    .d-price{font-size:28px;font-weight:500;color:var(--g);margin-bottom:.75rem}
    .d-stats{display:flex;gap:.5rem;flex-wrap:wrap}
    .d-stat{background:var(--gl,#e9f4ef);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:500;color:var(--g);display:inline-flex;align-items:center;gap:5px}
    /* ── Action strip — mobile only ── */
    .action-strip{display:flex;gap:10px;padding:.85rem 1rem;background:var(--white,#fff);border-top:1px solid var(--border);border-bottom:1px solid var(--border);align-items:center}
    @media(min-width:580px){.action-strip{display:none!important}}
    .btn-enquire{flex:1;background:#e07b3f;color:#fff;border:none;border-radius:50px;padding:14px 0;font-size:15px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:background .15s}
    .btn-enquire:active{background:#c9642a}
    .btn-phone{flex:1;background:#fff;color:#1a5c45;border:2px solid #1a5c45;border-radius:50px;padding:12px 14px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;-webkit-tap-highlight-color:transparent;transition:all .15s}
    .btn-phone:active{background:#e9f4ef}
    .btn-more{background:#f5f2ec;border:none;border-radius:50%;width:48px;height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
    .btn-more:active{background:#e8e4dc}
    .btn-more svg{width:20px;height:20px;color:#555}
    /* Save button on photo */
    .gallery-save-btn{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.95);border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:3;box-shadow:0 2px 16px rgba(0,0,0,.18);-webkit-tap-highlight-color:transparent;transition:transform .15s,background .15s}
    .gallery-save-btn:hover{background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.22)}
    .gallery-save-btn:active{transform:scale(.9)}
    [data-theme="dark"] .gallery-save-btn{background:rgba(20,20,20,.95)}
    /* Share drawer */
    .share-drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9990;display:none;backdrop-filter:blur(2px)}
    .share-drawer-bg.open{display:block}
    .share-drawer{position:fixed;bottom:0;left:0;right:0;background:var(--white,#fff);border-radius:24px 24px 0 0;padding:1rem 1.5rem calc(2.5rem + env(safe-area-inset-bottom, 0px));z-index:9999;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-width:520px;margin:0 auto;max-height:calc(85vh - env(safe-area-inset-top, 0px));overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -10px 40px rgba(0,0,0,.18)}
    .share-drawer.open{transform:translateY(0)}
    .share-handle{width:40px;height:4px;background:#e0ddd8;border-radius:2px;margin:0 auto .85rem}
    .share-title{font-family:'Playfair Display', Georgia, 'Times New Roman', serif;font-size:17px;font-weight:700;color:var(--text,#111);margin-bottom:1.25rem;text-align:center}
    .share-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
    .share-opt{display:flex;flex-direction:column;align-items:center;gap:.5rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .share-opt:active .share-icon{transform:scale(.92)}
    .share-icon{width:56px;height:56px;border-radius:18px;display:flex;align-items:center;justify-content:center;transition:transform .15s}
    .share-label{font-size:11px;color:#777;font-weight:500;text-align:center}
    .si-whatsapp{background:#e8faf1}
    .si-facebook{background:#e8f0fd}
    .si-copy{background:#f5f2ec}
    .si-print{background:#fdf4e6}
    [data-theme="dark"] .share-drawer{background:#1a1a1a}
    [data-theme="dark"] .share-title{color:#e8e8e8}
    [data-theme="dark"] .share-label{color:#888}
    [data-theme="dark"] .si-copy{background:#252525}
    [data-theme="dark"] .si-print{background:#252525}
    [data-theme="dark"] .btn-more{background:#252525}
    [data-theme="dark"] .btn-phone{background:#1a1a1a;border-color:#2ecc8a;color:#2ecc8a}
    .detail-section{padding:1rem;border-bottom:1px solid var(--border)}
    .detail-section h2{font-family:'Playfair Display', Georgia, 'Times New Roman', serif;font-size:17px;font-weight:700;margin-bottom:.75rem}
    .desc-text{font-size:14px;color:#666;line-height:1.8;font-weight:300}
    .feat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem}
    .feat-item{display:flex;align-items:center;gap:12px;font-size:15px;font-weight:500;color:var(--text,#333);background:var(--white,#fff);border:1.5px solid var(--border,#e8e4dc);border-radius:12px;padding:.75rem 1rem}
    .feat-ico{width:36px;height:36px;border-radius:10px;background:var(--gl,#e9f4ef);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    [data-theme="dark"] .feat-item{background:#1e1e1e;border-color:#2a2a2a;color:#e8e8e8}
    #property-map{height:260px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);margin-bottom:.75rem}
    /* ── Local Area Guide ────────────────────────────────────────── */
    .lag-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:.85rem;flex-wrap:wrap}
    .lag-head-title{font-family:'Playfair Display', Georgia, 'Times New Roman', serif;font-size:18px;font-weight:700;color:#111;display:flex;align-items:center;gap:8px}
    .lag-head-title svg{width:18px;height:18px;stroke:var(--g,#1a5c45)}
    .lag-radius-pill{display:inline-flex;align-items:center;gap:5px;background:#f5f2ec;border-radius:18px;padding:5px 11px;font-size:11px;font-weight:500;color:#666}
    .lag-radius-pill svg{width:11px;height:11px;stroke:#888}
    .lag-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:.55rem;margin-bottom:1.1rem}
    @media(min-width:580px){.lag-stats{grid-template-columns:repeat(4,1fr);gap:.65rem}}
    .lag-stat{position:relative;background:linear-gradient(135deg,#fff 0%,#fafaf6 100%);border:1.5px solid var(--border);border-radius:14px;padding:.75rem .85rem;overflow:hidden;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .lag-stat:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(26,92,69,.08);border-color:#d8d3c8}
    .lag-stat-flare{position:absolute;top:-22px;right:-22px;width:80px;height:80px;border-radius:50%;opacity:.08;transition:opacity .2s,transform .3s ease}
    .lag-stat:hover .lag-stat-flare{opacity:.16;transform:scale(1.15)}
    .lag-stat-ico{position:relative;width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:.45rem;z-index:1}
    .lag-stat-ico svg{width:17px;height:17px}
    .lag-stat-num{position:relative;font-family:'Playfair Display', Georgia, 'Times New Roman', serif;font-size:22px;font-weight:700;color:#111;line-height:1;z-index:1}
    .lag-stat-num.shimmer{display:inline-block;width:30px;height:18px;border-radius:5px;background:linear-gradient(90deg,#f0ece4 0%,#f7f4ee 50%,#f0ece4 100%);background-size:200% 100%;animation:lag-shimmer 1.4s linear infinite}
    .lag-stat-lbl{position:relative;font-size:11px;color:#999;margin-top:4px;font-weight:500;z-index:1}
    .lag-cats{display:flex;gap:.45rem;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:.25rem;margin-bottom:.85rem;scroll-snap-type:x proximity}
    .lag-cats::-webkit-scrollbar{display:none}
    .lag-cat{flex-shrink:0;scroll-snap-align:start;display:inline-flex;align-items:center;gap:7px;background:#fff;border:1.5px solid var(--border);border-radius:24px;padding:.5rem 1rem;font-size:13px;font-weight:500;color:#555;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s ease;white-space:nowrap;font-family:inherit}
    .lag-cat svg{width:15px;height:15px;stroke:#888;transition:stroke .15s,transform .2s}
    .lag-cat:hover{border-color:#bbb;color:#333}
    .lag-cat:hover svg{transform:scale(1.08)}
    .lag-cat.active{background:linear-gradient(135deg,#1a5c45 0%,#2a7d5c 100%);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(26,92,69,.28)}
    .lag-cat.active svg{stroke:#fff}
    .lag-subs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem;min-height:30px}
    .lag-sub{font-size:12px;font-weight:500;color:#888;background:#f7f5f0;border:1px solid transparent;border-radius:18px;padding:6px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;font-family:inherit}
    .lag-sub:hover{background:#eeebe3;color:#333}
    .lag-sub.active{background:#fff;color:var(--g,#1a5c45);border-color:var(--g,#1a5c45);font-weight:600;box-shadow:0 2px 8px rgba(26,92,69,.10)}
    .lag-list{display:flex;flex-direction:column;gap:.5rem}
    .lag-card{display:flex;align-items:center;gap:.85rem;padding:.8rem;background:#fff;border:1px solid var(--border);border-radius:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s ease;position:relative;overflow:hidden;animation:lag-fadein .35s ease both}
    .lag-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--g,#1a5c45);opacity:0;transition:opacity .2s}
    .lag-card:hover{border-color:#d8d3c8;transform:translateX(2px);box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .lag-card:hover::before{opacity:1}
    .lag-card.is-active{border-color:var(--g,#1a5c45);box-shadow:0 4px 18px rgba(26,92,69,.12)}
    .lag-card.is-active::before{opacity:1}
    .lag-card-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .25s}
    .lag-card-ico svg{width:20px;height:20px}
    .lag-card:hover .lag-card-ico{transform:rotate(-3deg) scale(1.05)}
    .lag-card-body{flex:1;min-width:0}
    .lag-card-name{font-size:14px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
    .lag-card-sub{font-size:11px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
    .lag-rating{display:inline-flex;align-items:center;gap:2px;color:#e6a82b;font-weight:600}
    .lag-card-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
    .lag-card-dist{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:12px;white-space:nowrap}
    .lag-dist-near{background:#e9f7ef;color:#1a5c45}
    .lag-dist-mid{background:#e8f0fd;color:#1d62cf}
    .lag-dist-far{background:#fdf0e6;color:#c46221}
    .lag-card-walk{font-size:10.5px;color:#aaa;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
    .lag-card-walk svg{width:11px;height:11px;stroke:#aaa}
    .lag-skel{display:flex;gap:.85rem;padding:.8rem;background:#fff;border:1px solid var(--border);border-radius:14px}
    .lag-skel-ico{width:42px;height:42px;border-radius:12px;background:linear-gradient(90deg,#f0ece4 0%,#f7f4ee 50%,#f0ece4 100%);background-size:200% 100%;animation:lag-shimmer 1.4s linear infinite;flex-shrink:0}
    .lag-skel-body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:8px}
    .lag-skel-line{height:10px;border-radius:5px;background:linear-gradient(90deg,#f0ece4 0%,#f7f4ee 50%,#f0ece4 100%);background-size:200% 100%;animation:lag-shimmer 1.4s linear infinite}
    .lag-skel-line.short{width:55%}
    @keyframes lag-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @keyframes lag-fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .lag-empty{text-align:center;padding:2rem 1rem;color:#999;font-size:13px;background:#fafaf8;border-radius:14px;border:1px dashed var(--border)}
    .lag-empty-ico{font-size:30px;display:block;margin-bottom:8px;opacity:.5}
    [data-theme="dark"] .lag-head-title{color:#e8e8e8}
    [data-theme="dark"] .lag-radius-pill{background:#252525;color:#aaa}
    [data-theme="dark"] .lag-stat{background:linear-gradient(135deg,#1a1a1a 0%,#1f1f1d 100%);border-color:#2a2a2a}
    [data-theme="dark"] .lag-stat-num{color:#e8e8e8}
    [data-theme="dark"] .lag-cat{background:#1a1a1a;border-color:#2a2a2a;color:#bbb}
    [data-theme="dark"] .lag-sub{background:#202020;color:#aaa}
    [data-theme="dark"] .lag-sub.active{background:#1a1a1a}
    [data-theme="dark"] .lag-card{background:#1a1a1a;border-color:#2a2a2a}
    [data-theme="dark"] .lag-card-name{color:#e8e8e8}
    [data-theme="dark"] .lag-skel,[data-theme="dark"] .lag-empty{background:#1a1a1a;border-color:#2a2a2a}

    /* ── Saved Places (custom locations) ─────────────────────────── */
    .lag-add-card{display:flex;align-items:center;gap:.85rem;padding:.85rem;background:linear-gradient(135deg,#1a5c45 0%,#0e3d2e 100%);border:none;border-radius:14px;cursor:pointer;color:#fff;transition:transform .18s ease,box-shadow .18s ease;-webkit-tap-highlight-color:transparent;font-family:inherit;text-align:left;width:100%;box-shadow:0 6px 18px rgba(26,92,69,.22)}
    .lag-add-card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(26,92,69,.32)}
    .lag-add-card .lag-add-ico{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
    .lag-add-card .lag-add-ico svg{width:20px;height:20px;stroke:currentColor;fill:none}
    .lag-add-card .lag-add-body{flex:1;min-width:0}
    .lag-add-card .lag-add-title{font-size:14px;font-weight:600;margin-bottom:2px}
    .lag-add-card .lag-add-sub{font-size:11.5px;color:rgba(255,255,255,.75);font-weight:300}
    .lag-add-card .lag-add-arrow{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .18s ease}
    .lag-add-card:hover .lag-add-arrow{transform:translateX(3px)}
    .lag-add-card .lag-add-arrow svg{width:14px;height:14px;stroke:#fff;fill:none}

    /* Remove (×) button on saved-place cards */
    .lag-card-remove{
      background:transparent;border:none;color:#aaa;cursor:pointer;padding:6px;
      border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
      transition:background .15s ease,color .15s ease;font-family:inherit
    }
    .lag-card-remove:hover{background:#fde8eb;color:#c93f4e}
    .lag-card-remove svg{width:14px;height:14px;stroke:currentColor;fill:none}

    /* Empty / welcome state for the Saved Places tab */
    .lag-saved-welcome{padding:1.75rem 1.25rem;text-align:center;background:linear-gradient(135deg,#fafaf6 0%,#f7f5ee 100%);border:1px dashed var(--border);border-radius:14px}
    .lag-saved-welcome h4{font-family:'Playfair Display', Georgia, 'Times New Roman', serif;font-size:17px;color:#111;margin-bottom:.45rem;font-weight:700}
    .lag-saved-welcome p{font-size:12.5px;color:#888;font-weight:300;line-height:1.5;margin-bottom:1rem;max-width:340px;margin-left:auto;margin-right:auto}
    [data-theme="dark"] .lag-saved-welcome{background:linear-gradient(135deg,#1a1a1a 0%,#1f1f1d 100%);border-color:#2a2a2a}
    [data-theme="dark"] .lag-saved-welcome h4{color:#e8e8e8}

    /* ── Add Place bottom sheet ── */
    .sp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9990;opacity:0;pointer-events:none;transition:opacity .22s ease}
    .sp-overlay.open{opacity:1;pointer-events:all}
    .sp-sheet{

    renderNav()
    const listingId = new URLSearchParams(window.location.search).get('id')

    function loadGoogleMaps() {
      return new Promise(resolve => {
        if (window.google) { resolve(); return }
        const s = document.createElement('script')
        s.src = 'https://maps.googleapis.com/maps/api/js?key=' + window.GOOGLE_MAPS_KEY + '&libraries=places,geometry'
        s.onload = resolve
        document.head.appendChild(s)
      })
    }

    async function geocodeAddress(address) {
      return new Promise((resolve, reject) => {
        const geocoder = new google.maps.Geocoder()
        geocoder.geocode({ address: address + ', Ireland' }, (results, status) => {
          if (status === 'OK') resolve(results[0].geometry.location)
          else reject(new Error('Could not find location'))
        })
      })
    }

    async function renderMap(listing) {
      try {
        await loadGoogleMaps()
        const address = listing.address_line1 + ' ' + (listing.address_area || '') + ' ' + listing.county + ' ' + (listing.eircode || '')
        const location = await geocodeAddress(address)
        const map = new google.maps.Map(document.getElementById('property-map'), {

    function lagFindCat(id) {
      for (var i = 0; i < LAG_CATEGORIES.length; i++) if (LAG_CATEGORIES[i].id === id) return LAG_CATEGORIES[i]
      return null
    }
    function lagFindSub(catId, subId) {
      var cat = lagFindCat(catId); if (!cat) return null
      for (var i = 0; i < cat.subs.length; i++) if (cat.subs[i].id === subId) return cat.subs[i]
      return null
    }

    function lagDistanceM(place) {
      try {
        if (window.google && google.maps.geometry && google.maps.geometry.spherical) {
          return google.maps.geometry.spherical.computeDistanceBetween(locationInstance, place.geometry.location)
        }
      } catch(e) {}
      return null
    }

    function lagFmtDist(m) {
      if (m == null) return ''
      return m < 1000 ? Math.round(m) + 'm' : (m/1000).toFixed(1) + 'km'
    }

    function lagFmtWalk(m) {
      if (m == null) return ''
      var mins = Math.max(1, Math.round(m / LAG_WALK_MPM))
      if (mins <= 30) return mins + ' min walk'
      var dmins = Math.max(1, Math.round(m / LAG_DRIVE_MPM))
      return dmins + ' min drive'
    }

    function lagDistClass(m) {
      if (m == null) return 'lag-dist-mid'
      if (m < 600)  return 'lag-dist-near'
      if (m < 1500) return 'lag-dist-mid'
      return 'lag-dist-far'
    }

    function lagSearch(sub) {
      return new Promise(function(resolve) {
        if (!mapInstance || !locationInstance) { resolve([]); return }
        if (lagCache[sub.id]) { resolve(lagCache[sub.id]); return }
        if (!lagPlacesService) lagPlacesService = new google.maps.places.PlacesService(mapInstance)
        var params = { location: locationInstance, radius: LAG_RADIUS }
        if (sub.type) params.type = sub.type

          '<div class="lag-card-meta">' +

    function escAttr(s){ return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;') }

    function lagFocusSaved(idx){
      var places = lagSavedRead()
      var p = places[idx]

      document.querySelectorAll('.lag-card').forEach(function(c){ c.classList.remove('is-active') })

    // ── Add Place sheet ─────────────────────────────────────────────────
    var spPicked = null   // last picked place from autocomplete
    var spKind   = ''     // 'work' / 'school' / 'gym' / 'family' / 'heart' / 'bookmark'
    function lagOpenAddPlace(){
      spPicked = null
      spKind = ''
      var sheet = document.getElementById('sp-overlay')
      var nameInp = document.getElementById('sp-name')
      var addrInp = document.getElementById('sp-addr')
      nameInp.value = ''
      addrInp.value = ''
      document.querySelectorAll('.sp-preset').forEach(function(p){ p.classList.remove('on') })
      document.getElementById('sp-save').disabled = true
      sheet.classList.add('open')
      document.documentElement.style.overflow = 'hidden'

      // Lazy-attach Places autocomplete the first time
      if (window.google && google.maps && google.maps.places && !addrInp.dataset.acBound) {
        addrInp.dataset.acBound = '1'
        var ac = new google.maps.places.Autocomplete(addrInp, {
          componentRestrictions: { country: 'ie' },
          fields: ['geometry','name','formatted_address']
        })
        ac.addListener('place_changed', function(){
          var place = ac.getPlace()
          if (!place || !place.geometry || !place.geometry.location) return
          var loc = place.geometry.location
          spPicked = {
            label: place.formatted_address || place.name || addrInp.value,
            lat:   typeof loc.lat === 'function' ? loc.lat() : loc.lat,
            lng:   typeof loc.lng === 'function' ? loc.lng() : loc.lng
          }
          // Auto-fill the name with the place name if the user hasn't typed one
          if (!nameInp.value && place.name) nameInp.value = place.name
          updateSaveButton()
        })
        addrInp.addEventListener('input', function(){
          // If they edit after picking, invalidate the cached pick until they pick again
          spPicked = null
          updateSaveButton()
        })
        nameInp.addEventListener('input', updateSaveButton)
      }
      setTimeout(function(){ addrInp.focus() }, 200)
    }
    function lagCloseAddPlace(){
      var sheet = document.getElementById('sp-overlay')
      sheet.classList.remove('open')
      document.documentElement.style.overflow = ''
    }
    window.lagOpenAddPlace  = lagOpenAddPlace
    window.lagCloseAddPlace = lagCloseAddPlace

    function updateSaveButton(){
      var ok = !!(spPicked && document.getElementById('sp-name').value.trim())
      document.getElementById('sp-save').disabled = !ok
    }
    window.updateSaveButton = updateSaveButton

    function lagPickPreset(kind, label){
      spKind = kind
      document.querySelectorAll('.sp-preset').forEach(function(p){ p.classList.toggle('on', p.dataset.kind === kind) })
      var nameInp = document.getElementById('sp-name')
      if (!nameInp.value || nameInp.dataset.fromPreset === '1') {
        nameInp.value = label
        nameInp.dataset.fromPreset = '1'
      }
      updateSaveButton()
    }
    window.lagPickPreset = lagPickPreset

    function lagSaveNewPlace(){
      var nameInp = document.getElementById('sp-name')
      if (!spPicked) {
        if (typeof toast === 'function') toast('Pick a location from the dropdown', 'err')
        return
      }
      var name = (nameInp.value || '').trim() || spPicked.label.split(',')[0]
      var arr = lagSavedRead()
      arr.push({
        id:    Date.now(),
        name:  name,
        kind:  spKind || 'bookmark',
        label: spPicked.label,
        lat:   spPicked.lat,
        lng:   spPicked.lng
      })
      lagSavedWrite(arr)
      lagCloseAddPlace()
      // Make sure we're on the Saved tab and re-render
      lagCurrentCat = 'saved'
      lagRenderCategories()
      lagRenderSubs()
      lagRenderSaved()
      if (typeof toast === 'function') toast('Added · ' + name, 'ok')
    }
    window.lagSaveNewPlace = lagSaveNewPlace

    function lagPickCat(catId) {
      var cat = lagFindCat(catId); if (!cat) return
      lagCurrentCat = catId
      lagCurrentSub = cat.subs[0].id
      lagRenderCategories()
      lagRenderSubs()
      lagLoadCurrent()
    }

    function lagPickSub(subId) {
      lagCurrentSub = subId
      lagRenderSubs()
      lagLoadCurrent()
    }

    async function lagRenderStats() {
      var statsEl = document.getElementById('lag-stats'); if (!statsEl) return
      // Pick one signature sub from each of 4 main categories for the hero stats
      var picks = [
        { catId: 'transport', subId: 'bus',         label: 'Transport',  ico: LAG_ICONS.bus,    accent: '#1d62cf', tint: '#e8f0fd' },
        { catId: 'education', subId: 'primary',     label: 'Schools',    ico: LAG_ICONS.school, accent: '#1a5c45', tint: '#e9f4ef' },
        { catId: 'shopping',  subId: 'supermarket', label: 'Shops',      ico: LAG_ICONS.shop,   accent: '#7d3fc7', tint: '#f4eafc' },
        { catId: 'food',      subId: 'restaurant',  label: 'Restaurants',ico: LAG_ICONS.rest,   accent: '#c46221', tint: '#fdf0e6' },
      ]
      statsEl.innerHTML = picks.map(function(p) {
        return '<div class="lag-stat" onclick="lagPickCat(\'' + p.catId + '\')">' +
          '<div class="lag-stat-flare" style="background:' + p.accent + '"></div>' +
          '<div class="lag-stat-ico" style="background:' + p.tint + ';color:' + p.accent + '">' + p.ico + '</div>' +
          '<div class="lag-stat-num shimmer" data-key="' + p.subId + '"></div>' +
          '<div class="lag-stat-lbl">' + p.label + ' nearby</div>' +
        '</div>'
      }).join('')
      // Resolve counts in parallel
      for (var i = 0; i < picks.length; i++) {
        (function(p) {
          var sub = lagFindSub(p.catId, p.subId)
          if (!sub) return
          lagSearch(sub).then(function(results) {
            var n = results.length
            var slot = statsEl.querySelector('[data-key="' + p.subId + '"]')
            if (slot) {
              slot.classList.remove('shimmer')
              slot.textContent = n + (n >= 8 ? '+' : '')
            }
          })
        })(picks[i])
      }
    }

    function initLAG() {
      lagRenderCategories()
      lagRenderSubs()
      lagRenderStats()
      lagLoadCurrent()
    }

    function fmtPrice(price, type) {
      return '€' + Number(price).toLocaleString('en-IE') + (type === 'rent' ? '/mo' : '')
    }

    // Render the Eircode for the public listing.
    // - If the seller chose to show it, print the Eircode in bold.
    // - If they chose to hide it (eircode_visible === false), print "Eircode —"
    //   so visitors know the property has one but the owner kept it private.
    // ── Map preview card (right under the gallery) ────────────────
    // Uses Google Static Maps for the thumbnail when we have lat/lng,
    // falls back to a styled gradient + pin so the card never looks broken.
    function buildMapPreview(L){
      var addr = (L.address_line1 || '') + (L.address_area ? ', ' + L.address_area : '') + (L.county ? ', ' + L.county : '')
      var area = (L.address_area || L.county || '') + (L.eircode_visible !== false && L.eircode ? '  ·  ' + L.eircode : '')
      var lat  = L.latitude  != null ? L.latitude  : null
      var lng  = L.longitude != null ? L.longitude : null

      // Static map thumbnail — the pretty map preview baked into a single PNG.
      // We hide POI labels and tone things down so the card looks editorial.
      var thumb = ''
      if (lat != null && lng != null) {
        var sty = '&style=feature:poi|element:labels|visibility:off' +
                  '&style=feature:road|element:labels|visibility:simplified' +
                  '&style=feature:transit|visibility:off' +
                  '&style=feature:water|element:geometry|color:0xc8dfd4' +
                  '&style=feature:landscape|element:geometry|color:0xf7f5f0'
        var url = 'https://maps.googleapis.com/maps/api/staticmap'
                + '?center=' + lat + ',' + lng
                + '&zoom=15&size=320x200&scale=2&maptype=roadmap'
                + sty
                + '&key=' + window.GOOGLE_MAPS_KEY
        thumb = '<img src="' + url + '" alt="Map of ' + escAttr(addr) + '" loading="lazy"/>'
      }

      var pinSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2 C7 2 4 6 4 10 C4 14 12 22 12 22 C12 22 20 14 20 10 C20 6 17 2 12 2"/><circle cx="12" cy="10" r="2.5"/></svg>'

      // Category-aware eyebrow — "Where you'll live" only makes sense for
      // residential. Commercial / sharing get more appropriate copy.
      var COMMERCIAL_TYPES = ['commercial','office','offices','retail','shop','restaurant','industrial','warehouse','factory','hospitality','hotel','pub','leisure','healthcare','medical','clinic','mixed-use','mixeduse','investment','development','agricultural','land']
      var ptype = String(L.property_type || '').toLowerCase()
      var isCommercial = (L.category && String(L.category).toLowerCase() === 'commercial') || COMMERCIAL_TYPES.indexOf(ptype) !== -1
      var eyebrow
      if (isCommercial)                       eyebrow = 'Property location'
      else if (L.listing_type === 'share')    eyebrow = 'Where you\'ll be sharing'
      else if (L.listing_type === 'rent')     eyebrow = 'Where you\'ll rent'
      else                                    eyebrow = 'Where you\'ll live'

      return ''
        + '<button type="button" class="map-preview" onclick="openFullMap()" aria-label="Open full map">'
        +   '<div class="map-preview-thumb">'
        +     thumb
        +     '<div class="mp-pin" aria-hidden="true">'
        +       '<svg viewBox="0 0 24 24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/></svg>'
        +     '</div>'
        +   '</div>'
        +   '<div class="map-preview-body">'
        +     '<div class="mp-eyebrow">' + pinSvg + eyebrow + '</div>'
        +     '<div class="mp-addr">' + escAttr(addr) + '</div>'
        +     '<div class="mp-area">' + escAttr(area) + '</div>'
        +     '<span class="mp-cta">Open full map'
        +       '<svg viewBox="0 0 24 24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 5l7 7-7 7"/></svg>'
        +     '</span>'
        +   '</div>'
        +   '<span class="mp-corner-arrow" aria-hidden="true">'
        +     '<svg viewBox="0 0 24 24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M9 7h8v8"/></svg>'
        +   '</span>'
        + '</button>'
    }

    // ── Fullscreen map overlay ───────────────────────────────────
    var fsmapInstance = null
    var fsmapMarker   = null
    var fsmapStreetView = null
    var fsmapHasState = false

    function listingPosition(L){
      if (L.latitude != null && L.longitude != null) {
        return { lat: parseFloat(L.latitude), lng: parseFloat(L.longitude) }
      }
      if (locationInstance && typeof locationInstance.lat === 'function') {
        return { lat: locationInstance.lat(), lng: locationInstance.lng() }
      }
      return null
    }

    async function openFullMap(){
      var L = window.__listing; if (!L) return
      var addr = (L.address_line1 || '') + (L.address_area ? ', ' + L.address_area : '') + (L.county ? ', ' + L.county : '')
      var addrText = addr + (L.eircode_visible !== false && L.eircode ? ', ' + L.eircode : '') + ', Ireland'

      document.getElementById('fsmap-addr').textContent = addr
      document.getElementById('fsmap-extlink').href     = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(addrText)
      document.getElementById('fsmap-directions').href  = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(addrText)

      var fs = document.getElementById('fsmap')
      fs.classList.add('open')
      document.documentElement.style.overflow = 'hidden'

      // Push a history state so the browser/system Back button closes the overlay
      // instead of navigating away from the listing.
      if (!fsmapHasState) {
        try { history.pushState({ fsmap: true }, '', '#map') } catch(e){}
        fsmapHasState = true
      }

      // Lazy-load Google Maps the first time
      if (!window.google || !google.maps) {
        try { await loadGoogleMaps() } catch(e){}
      }

      var pos = listingPosition(L)
      if (!pos) {
        // Last-ditch: geocode the address
        try {
          var loc = await geocodeAddress(addr + (L.eircode ? ' ' + L.eircode : ''))
          pos = { lat: loc.lat(), lng: loc.lng() }
        } catch(e) {
          pos = { lat: 53.349, lng: -6.260 }   // Dublin fallback
        }
      }

      if (!fsmapInstance) {
        fsmapInstance = new google.maps.Map(document.getElementById('fsmap-canvas'), {
          center: pos, zoom: 16,
          mapTypeControl: true,
          streetViewControl: false,    // we expose our own action pill instead
          fullscreenControl: false,
          zoomControl: true,
          zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER },
          gestureHandling: 'greedy',
          styles: [{ featureType:'poi', elementType:'labels', stylers:[{ visibility:'off' }] }]
        })
        fsmapMarker = new google.maps.Marker({
          map: fsmapInstance, position: pos,
          title: addr,
          icon: { path: google.maps.SymbolPath.CIRCLE, scale: 11, fillColor: '#1a5c45', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 3 },
          animation: google.maps.Animation.DROP
        })
      } else {
        // Already initialised — just re-center and force a resize since the
        // overlay was hidden when we last showed it.
        fsmapInstance.setCenter(pos)
        fsmapMarker.setPosition(pos)
        setTimeout(function(){
          google.maps.event.trigger(fsmapInstance, 'resize')
          fsmapInstance.setCenter(pos)
        }, 320)
      }
    }

    function closeFullMap(){
      var fs = document.getElementById('fsmap')
      fs.classList.remove('open')
      document.documentElement.style.overflow = ''
      // Drop out of street view too
      if (fsmapStreetView && fsmapStreetView.getVisible && fsmapStreetView.getVisible()) {
        fsmapStreetView.setVisible(false)
      }
      // Pop our history state if we pushed one (so the URL hash is clean)
      if (fsmapHasState) {
        fsmapHasState = false
        if (location.hash === '#map') {
          try { history.back() } catch(e){}
        }
      }
    }
    window.openFullMap  = openFullMap
    window.closeFullMap = closeFullMap

    function toggleStreetView(){
      if (!fsmapInstance) return
      if (!fsmapStreetView) {
        fsmapStreetView = fsmapInstance.getStreetView()
        var c = fsmapInstance.getCenter()
        fsmapStreetView.setPosition(c)
        fsmapStreetView.setPov({ heading: 165, pitch: 0 })
      }
      fsmapStreetView.setVisible(!fsmapStreetView.getVisible())
    }
    window.toggleStreetView = toggleStreetView

    // ESC closes the overlay
    document.addEventListener('keydown', function(e){
      if (e.key === 'Escape') {
        var fs = document.getElementById('fsmap')
        if (fs && fs.classList.contains('open')) closeFullMap()
      }
    })
    // Browser Back button closes the overlay (we pushed a history state on open)
    window.addEventListener('popstate', function(){
      var fs = document.getElementById('fsmap')
      if (fs && fs.classList.contains('open')) {
        fs.classList.remove('open')
        document.documentElement.style.overflow = ''
        fsmapHasState = false
      }
    })

    function eircodeDisplay(L, color) {
      var c = color || '#111'
      var visible = (L.eircode_visible === undefined || L.eircode_visible === null)
        ? true
        : !!L.eircode_visible
      if (visible && L.eircode) {
        return '<strong style="color:' + c + '">' + L.eircode + '</strong>'
      }
      return '<span style="color:' + c + '">Eircode <span style="color:#bbb;font-weight:500">—</span></span>'
    }

    var galleryPhotos = []
    var galleryIndex  = 0
    var lbPhotos      = []
    var lbIndex       = 0

    function buildGallery(listing) {
      galleryPhotos = listing.photos || []
      galleryIndex  = 0

      if (!galleryPhotos.length) {
        return '<div class="gallery-wrap"><div class="gallery-hero-placeholder">🏠</div></div>'
      }

      var heroHtml =
        '<div class="gallery-wrap">' +
          '<div class="gallery-hero" onclick="openLightbox(0)" id="gallery-hero">' +
            '<img id="gallery-main-img" src="' + galleryPhotos[0].url + '" alt="' + listing.title + '" loading="eager"/>' +
            (galleryPhotos.length > 1 ?
              '<button class="gallery-nav gallery-prev" onclick="event.stopPropagation();slideGallery(-1)">&#8249;</button>' +
              '<button class="gallery-nav gallery-next" onclick="event.stopPropagation();slideGallery(1)">&#8250;</button>' : '') +
            '<div class="gallery-counter">📷 <span id="gallery-cur">1</span>/' + galleryPhotos.length + '</div>' +
            '<button class="gallery-save-btn" id="save-btn" onclick="event.stopPropagation();handleSave()" aria-label="Save listing">' +
            '<svg id="save-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
          '</button>' +
          '</div>'

      if (galleryPhotos.length > 1) {
        heroHtml += '<div class="gallery-thumbs" id="gallery-thumbs">'
        for (var i = 0; i < galleryPhotos.length; i++) {
          heroHtml += '<div class="gallery-thumb-item' + (i===0?' active':'') + '" data-idx="' + i + '" onclick="goToPhoto(' + i + ')">' +
            '<img src="' + galleryPhotos[i].url + '" loading="lazy"/>' +
          '</div>'
        }
        heroHtml += '</div>'
      }

      heroHtml += '</div>'
      return heroHtml
    }

    function slideGallery(dir) {
      if (!galleryPhotos.length) return
      galleryIndex = (galleryIndex + dir + galleryPhotos.length) % galleryPhotos.length
      goToPhoto(galleryIndex)
    }

    function goToPhoto(idx) {
      galleryIndex = idx
      var img = document.getElementById('gallery-main-img')
      var cur = document.getElementById('gallery-cur')
      if (img) img.src = galleryPhotos[idx].url
      if (cur) cur.textContent = idx + 1
      document.querySelectorAll('.gallery-thumb-item').forEach(function(el) {
        el.classList.toggle('active', parseInt(el.dataset.idx) === idx)
      })
      // Scroll thumb into view
      var thumbEl = document.querySelector('.gallery-thumb-item[data-idx="' + idx + '"]')
      if (thumbEl) thumbEl.scrollIntoView({ behavior:'smooth', inline:'nearest', block:'nearest' })
    }

    // ── Lightbox ──────────────────────────────────────────────────────────────
    function openLightbox(idx) {
      lbPhotos = galleryPhotos
      lbIndex  = idx
      var lb = document.getElementById('lightbox')
      if (!lb) return
      lb.classList.add('open')
      updateLightbox()
      document.body.style.overflow = 'hidden'
    }

    function closeLightbox() {
      var lb = document.getElementById('lightbox')
      if (lb) lb.classList.remove('open')
      document.body.style.overflow = ''
    }

    function slideLightbox(dir) {
      lbIndex = (lbIndex + dir + lbPhotos.length) % lbPhotos.length
      updateLightbox()
    }

    function updateLightbox() {
      var img = document.getElementById('lb-img')
      var ctr = document.getElementById('lb-counter')
      if (img) img.src = lbPhotos[lbIndex].url
      if (ctr) ctr.textContent = (lbIndex + 1) + ' / ' + lbPhotos.length
    }

    // Swipe support for lightbox
    var lbTouchX = 0
    document.addEventListener('keydown', function(e) {
      var lb = document.getElementById('lightbox')
      if (!lb || !lb.classList.contains('open')) return
      if (e.key === 'Escape') closeLightbox()
      if (e.key === 'ArrowLeft') slideLightbox(-1)
      if (e.key === 'ArrowRight') slideLightbox(1)
    })

    async function load() {
      if (!listingId) { window.location.href = 'search.html'; return }
      try {
        var L = await API.listings.get(listingId)
        window.__listing = L
        API.listings.trackView(listingId).catch(function(){})

        document.title = L.title + ' – Movin.ie'

        // SEO: Open Graph + canonical
        var canonUrl = 'https://movin.ie/pages/listing.html?id=' + L.id
        document.getElementById('og-title').content = L.title + ' – ' + fmtPrice(L.price, L.listing_type) + ' | Movin.ie'
        document.getElementById('og-desc').content  = L.description ? L.description.substring(0, 160) : 'View this property on Movin.ie'
        document.getElementById('og-url').content   = canonUrl

          'name': L.title,
          'description': L.description,
          'url': canonUrl,
          'price': L.price,
          'priceCurrency': 'EUR',
          'address': {
            '@type': 'PostalAddress',
            'streetAddress': L.address_line1,
            'addressLocality': L.address_area || L.county,
            'addressRegion': L.county,
            'postalCode': L.eircode || '',

        var ldScript = document.createElement('script')
        ldScript.type = 'application/ld+json'

        document.head.appendChild(ldScript)

        // Track recently viewed
        trackRecentlyViewed(L.id, L.title, L.price, L.listing_type, L.photos && L.photos.length ? L.photos[0].url : null)
        document.getElementById('bc-loc').textContent = (L.address_area || L.county) + ' · ' + L.title

        var typeLabel = L.listing_type === 'rent' ? 'To Rent' : L.listing_type === 'share' ? 'Sharing' : 'For Sale'
        var badgeClass = L.listing_type === 'rent' ? 'badge-o' : 'badge-g'
        // Prominent status badge for Sale Agreed / Let Agreed / Auction / Sold / Let
        var statusBadge = ''
        var _sBadgeMap = {
          sale_agreed: { l: 'SALE AGREED', bg: '#fbbf24', fg: '#78350f' },
          let_agreed:  { l: 'LET AGREED',  bg: '#fbbf24', fg: '#78350f' },
          auction:     { l: 'AUCTION',     bg: '#8b5cf6', fg: '#ffffff' },
          sold:        { l: 'SOLD',        bg: '#3b82f6', fg: '#ffffff' },
          let:         { l: 'LET',         bg: '#3b82f6', fg: '#ffffff' }
        }
        if (_sBadgeMap[L.status]) {
          var _sb = _sBadgeMap[L.status]
          statusBadge = '<span class="badge" style="background:' + _sb.bg + ';color:' + _sb.fg + ';font-size:10px;padding:3px 10px;border-radius:10px;font-weight:700;letter-spacing:.4px">' + _sb.l + '</span>'
        }

        var galleryHTML = buildGallery(L)

        var featuresHTML = ''
        if (L.parking || L.garden || L.garage || L.alarm) {
          featuresHTML = '<div class="detail-section"><h2>Features</h2><div class="feat-grid">'

    async function loadSimilar(L) {
      var el = document.getElementById('similar-list')
      if (!el) return
      try {
        var res = await fetch(window.MOVIN_API_URL + '/api/listings?listing_type=' + L.listing_type + '&county=' + encodeURIComponent(L.county) + '&limit=4')
        var data = await res.json()
        var similar = (data.listings || []).filter(function(s) { return s.id !== L.id }).slice(0, 3)
        if (!similar.length) {
          document.getElementById('similar-section').style.display = 'none'
          return
        }
        el.innerHTML = similar.map(function(s) {
          var photo = s.primary_photo
            ? (s.primary_photo.startsWith('http') ? s.primary_photo : window.MOVIN_API_URL + s.primary_photo)
            : null
          var thumb = photo
            ? '<img src="' + photo + '" style="width:100%;height:100%;object-fit:cover" loading="lazy"/>'
            : '<span style="font-size:28px">🏡</span>'
          return '<div onclick="window.location.href=\'listing.html?id=' + s.id + '\'" style="display:flex;gap:.75rem;padding:.85rem;background:#fff;border:1px solid var(--border);border-radius:14px;cursor:pointer;margin-bottom:.65rem;-webkit-tap-highlight-color:transparent">' +
            '<div style="width:80px;height:62px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--gl);display:flex;align-items:center;justify-content:center">' + thumb + '</div>' +
            '<div style="flex:1;min-width:0">' +
              '<div style="font-size:13px;font-weight:500;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px">' + s.title + '</div>' +
              '<div style="font-size:11px;color:#aaa;margin-bottom:4px">' + (s.address_area || s.county) + '</div>' +
              '<div style="font-size:15px;font-weight:500;color:var(--green)">' + fmtPrice(s.price, s.listing_type) + '</div>' +
            '</div>' +
          '</div>'
        }).join('')
      } catch(e) {
        document.getElementById('similar-section').style.display = 'none'
      }
    }

    async function submitEnquiry(e, lid) {
      e.preventDefault()
      var btn = document.getElementById('enq-btn')
      var alertEl = document.getElementById('enq-alert')
      btn.disabled = true
      btn.textContent = 'Sending…'
      try {
        await API.enquiries.send(lid, {
          sender_name:  e.target.sender_name.value,
          sender_email: e.target.sender_email.value,
          sender_phone: e.target.sender_phone.value,
          message:      e.target.message.value
        })
        alertEl.innerHTML = '<div class="alert alert-ok">✓ Enquiry sent! The owner will be in touch soon.</div>'
        e.target.reset()
      } catch(err) {
        alertEl.innerHTML = '<div class="alert alert-err">' + err.message + '</div>'
      }
      btn.disabled = false
      btn.textContent = 'Send enquiry'
    }

    var isSaved = false
    async function handleSave() {
      if (!API.auth.isLoggedIn()) { toast('Sign in to save listings', 'info'); return }
      try {
        if (isSaved) {
          await API.saved.unsave(listingId)
          isSaved = false
        } else {
          await API.saved.save(listingId)
          isSaved = true
        }
        // Update photo button
        var icon = document.getElementById('save-icon')
        if (icon) { icon.setAttribute('fill', isSaved?'#e07b3f':'none'); icon.setAttribute('stroke', isSaved?'#e07b3f':'#aaa') }
        // Update right panel button
        var rpIcon = document.getElementById('rp-save-icon')
        var rpLabel = document.getElementById('rp-save-label')
        var rpBtn = document.getElementById('rp-save-btn')
        if (rpIcon) { rpIcon.setAttribute('fill', isSaved?'#e07b3f':'none'); rpIcon.setAttribute('stroke', isSaved?'#e07b3f':'currentColor') }
        if (rpLabel) rpLabel.textContent = isSaved ? 'Saved' : 'Save'
        if (rpBtn) rpBtn.style.color = isSaved ? '#e07b3f' : '#555'
        toast(isSaved ? 'Saved ♥' : 'Removed from saved')
      } catch(e) { toast(e.message, 'error') }
    }

    // Track recently viewed
    function trackRecentlyViewed(id, title, price, type, photo) {
      try {
        var rv = JSON.parse(localStorage.getItem('movin_rv') || '[]')
        rv = rv.filter(function(x) { return x.id !== id })
        rv.unshift({ id: id, title: title, price: price, type: type, photo: photo, ts: Date.now() })
        rv = rv.slice(0, 6)
        localStorage.setItem('movin_rv', JSON.stringify(rv))
      } catch(e) {}
    }

    // Mortgage calculator
    function calcMort() {
      var price   = parseFloat(document.getElementById('mc-price')?.value || 0)
      var deposit = parseFloat(document.getElementById('mc-deposit')?.value || 0)
      var term    = parseFloat(document.getElementById('mc-term')?.value || 30)
      var rate    = parseFloat(document.getElementById('mc-rate')?.value || 4.0)
      if (!price || price <= deposit) {
        document.getElementById('mc-monthly').textContent = '—'
        document.getElementById('mc-meta').textContent = 'Deposit must be less than price'
        return
      }
      var principal = price - deposit
      var r = (rate / 100) / 12
      var n = term * 12
      var monthly = r === 0 ? principal / n : (principal * r * Math.pow(1+r,n)) / (Math.pow(1+r,n) - 1)
      var total = monthly * n
      document.getElementById('mc-monthly').textContent = '€' + Math.round(monthly).toLocaleString('en-IE') + '/mo'
      document.getElementById('mc-meta').textContent = 'Total repayment: €' + Math.round(total).toLocaleString('en-IE') + ' · Loan: €' + Math.round(principal).toLocaleString('en-IE')
    }

    // Share drawer
    function openShareDrawer() {
      document.getElementById('share-bg').classList.add('open')
      document.getElementById('share-drawer').classList.add('open')
      document.body.style.overflow = 'hidden'
    }
    function closeShareDrawer() {
      document.getElementById('share-bg').classList.remove('open')
      document.getElementById('share-drawer').classList.remove('open')
      document.body.style.overflow = ''
    }

    // Copy link
    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(function() {
        var btn = document.getElementById('copy-btn')
        btn.textContent = '✓ Copied!'
        setTimeout(function() { btn.innerHTML = '<svg width="14" height="14" style="color:#1a5c45;vertical-align:middle"><use href="/icons.svg#icon-document"/></svg> Copy'; }, 2000)
      })
    }

    // Report listing
    function reportListing(id) {
      var reason = prompt('Why are you reporting this listing?\n\n1. Fake or fraudulent\n2. Wrong location\n3. Already sold/rented\n4. Misleading photos\n5. Other\n\nType your reason:')
      if (!reason) return
      fetch(window.MOVIN_API_URL + '/api/listings/' + id + '/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason: reason })
      }).then(function() {
        toast('Report submitted. Thank you.', 'info')
      }).catch(function() {
        toast('Could not submit report. Please email hello@movin.ie', 'error')
      })
    }

    // Touch swipe for gallery
    document.addEventListener('touchstart', function(e) {
      if (e.target.closest('.gallery-wrap')) lbTouchX = e.touches[0].clientX
    }, { passive: true })
    document.addEventListener('touchend', function(e) {
      if (!e.target.closest('.gallery-wrap')) return
      var dx = e.changedTouches[0].clientX - lbTouchX
      if (Math.abs(dx) > 40) slideGallery(dx < 0 ? 1 : -1)
    }, { passive: true })

    load()

    // ── Post-render polish: section reveal, sticky CTA, heart pop ──────────
    // The page is rendered async by load() into #page-content. This watcher
    // fires once content is in the DOM, then sets everything up.
    ;(function postRenderHooks(){
      var pc = document.getElementById('page-content')
      if (!pc) return
      var done = false
      function setup(){
        if (done) return
        done = true

        // 1) Reveal sections as they enter the viewport
        var reveals = pc.querySelectorAll('.detail-section, .mort-section, #enq-section')
        if ('IntersectionObserver' in window) {
          var io = new IntersectionObserver(function(entries){
            entries.forEach(function(e){
              if (e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target) }
            })
          }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' })
          reveals.forEach(function(el){ io.observe(el) })
        } else {
          reveals.forEach(function(el){ el.classList.add('in') })
        }

        // 2) Build sticky mobile CTA from rendered price + listing type
        var price = pc.querySelector('.d-price')
        var bar = document.getElementById('sticky-cta')
        if (price && bar){
          bar.querySelector('.sticky-cta-price').textContent = price.textContent.trim()
          // Show after a beat so the entrance feels deliberate
          setTimeout(function(){
            bar.classList.add('show')
            document.body.classList.add('has-sticky-cta')
          }, 320)
        }

        // 3) Heart-pop on save buttons (matches #rp-save-icon and any others)
        var saveButtons = pc.querySelectorAll('[onclick*="toggleSave"], #rp-save-btn, .listing-save-btn, .prop-card-save')
        saveButtons.forEach(function(btn){
          btn.addEventListener('click', function(){
            btn.classList.remove('popping')
            // force reflow so the animation re-runs on each click
            void btn.offsetWidth
            btn.classList.add('popping')
          })
        })
      }
      // If content's already there, run now; otherwise watch for it.
      if (pc.querySelector('.listing-page-wrap')) { setup(); return }
      var mo = new MutationObserver(function(){
        if (pc.querySelector('.listing-page-wrap')) { setup(); mo.disconnect() }
      })
      mo.observe(pc, { childList:true, subtree:true })
    })()
  </script>

  <!-- Sticky mobile CTA bar — populated post-render -->
  <div class="sticky-cta" id="sticky-cta" role="region" aria-label="Property quick actions">
    <div class="sticky-cta-price">€—</div>
    <button class="sticky-cta-btn" onclick="document.getElementById('enq-section')&&document.getElementById('enq-section').scrollIntoView({behavior:'smooth'})">
      Enquire
    </button>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" ontouchstart="lbTouchX=event.touches[0].clientX" ontouchend="var dx=event.changedTouches[0].clientX-lbTouchX;if(Math.abs(dx)>40)slideLightbox(dx<0?1:-1)">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <img class="lightbox-img" id="lb-img" src="" alt="Property photo"/>
    <button class="lightbox-nav lightbox-prev" onclick="slideLightbox(-1)">&#8249;</button>
    <button class="lightbox-nav lightbox-next" onclick="slideLightbox(1)">&#8250;</button>
    <div class="lightbox-counter" id="lb-counter">1 / 1</div>
  </div>

  <!-- Fullscreen map overlay (opened from the .map-preview card under the gallery) -->

      <button class="fsmap-back" type="button" aria-label="Back" onclick="closeFullMap()">

      </button>
      <div class="fsmap-title">
        <div class="fsmap-title-eyebrow">Property location</div>
        <div class="fsmap-title-addr" id="fsmap-addr">—</div>
      </div>
      <a class="fsmap-share" id="fsmap-extlink" href="#" target="_blank" rel="noopener" aria-label="Open in Google Maps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
      </a>
    </div>
    <div class="fsmap-body">
      <div id="fsmap-canvas"></div>
      <div class="fsmap-actions">
        <button class="fsmap-action" type="button" onclick="toggleStreetView()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="9" r="3"/><path d="M5 19c0-3.3 3.1-6 7-6s7 2.7 7 6"/></svg>
          Street view
        </button>
        <a class="fsmap-action" id="fsmap-directions" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          Directions
        </a>
        <button class="fsmap-action" type="button" onclick="closeFullMap()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
          Close
        </button>
      </div>
    </div>
  </div>

  <!-- Add Place bottom sheet (used by Saved Places tab) -->
  <div class="sp-overlay" id="sp-overlay" onclick="if(event.target===this)lagCloseAddPlace()" aria-hidden="true">
    <div class="sp-sheet" role="dialog" aria-modal="true" aria-labelledby="sp-title">
      <div class="sp-handle"></div>
      <div class="sp-head">
        <div class="sp-title" id="sp-title">Add a saved place</div>
        <button class="sp-close" type="button" aria-label="Close" onclick="lagCloseAddPlace()">×</button>
      </div>

      <div class="sp-form-row">
        <label class="sp-label" for="sp-addr">Address or place name</label>

      <div class="sp-form-row">

          Work
        </button>
        <button type="button" class="sp-preset" data-kind="school"   onclick="lagPickPreset('school','School')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 2.5 9 2.5 12 0v-5"/></svg>
          School
        </button>
        <button type="button" class="sp-preset" data-kind="dumbbell" onclick="lagPickPreset('dumbbell','Gym')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h2M20 12h2M6 7v10M18 7v10M9 9v6M15 9v6M6 12h12"/></svg>
          Gym
        </button>
        <button type="button" class="sp-preset" data-kind="heart"    onclick="lagPickPreset('heart','Family')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Family
        </button>
        <button type="button" class="sp-preset" data-kind="bookmark" onclick="lagPickPreset('bookmark','Saved')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          Other
        </button>
      </div>

      <button class="sp-save" id="sp-save" type="button" disabled onclick="lagSaveNewPlace()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        Save place
      </button>
      <div class="sp-fineprint">Pick from the dropdown so we have an exact location. Saved places stay on this device.</div>
    </div>
  </div>

</body>
