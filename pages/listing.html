<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Property – Movin.ie</title>
  <meta id="og-title" property="og:title" content="Property on Movin.ie"/>
  <meta id="og-desc" property="og:description" content="Find your next home on Movin.ie — Ireland's property marketplace"/>
  <meta id="og-image" property="og:image" content="https://movin.ie/og-default.jpg"/>
  <meta id="og-url" property="og:url" content=""/>
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="Movin.ie"/>
  <meta id="tw-title" name="twitter:title" content="Property on Movin.ie"/>
  <meta id="tw-desc" name="twitter:description" content="Find your next home on Movin.ie"/>
  <meta id="tw-image" name="twitter:image" content="https://movin.ie/og-default.jpg"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link id="canonical" rel="canonical" href=""/>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#1a5c45"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Movin"/>
  <style>
    .breadcrumb{padding:.6rem 1rem;font-size:12px;color:#aaa;background:var(--white);border-bottom:1px solid #f5f2ec}
    .breadcrumb span{color:var(--g);cursor:pointer}
    /* ── Zoopla-style gallery ── */
    .gallery-wrap{position:relative;background:#111;user-select:none}
    .gallery-hero{width:100%;height:280px;position:relative;overflow:hidden;cursor:pointer}
    @media(min-width:600px){.gallery-hero{height:400px}}
    .gallery-hero img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
    .gallery-hero:hover img{transform:scale(1.02)}
    .gallery-hero-placeholder{width:100%;height:280px;background:linear-gradient(135deg,#c8dfd4,#e9f4ef);display:flex;align-items:center;justify-content:center;font-size:64px}
    .gallery-counter{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.65);color:#fff;font-size:12px;font-weight:500;padding:5px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
    .gallery-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.9);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.2);-webkit-tap-highlight-color:transparent}
    .gallery-nav:hover{background:#fff}
    .gallery-prev{left:10px}
    .gallery-next{right:10px}
    .gallery-thumbs{display:flex;gap:4px;padding:4px;background:#111;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .gallery-thumbs::-webkit-scrollbar{display:none}
    .gallery-thumb-item{width:72px;height:52px;flex-shrink:0;border-radius:4px;overflow:hidden;cursor:pointer;opacity:.6;transition:opacity .15s;border:2px solid transparent}
    .gallery-thumb-item:hover{opacity:.85}
    .gallery-thumb-item.active{opacity:1;border-color:#e07b3f}
    .gallery-thumb-item img{width:100%;height:100%;object-fit:cover;display:block}
    /* Lightbox */
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center}
    .lightbox.open{display:flex}
    .lightbox-img{max-width:95vw;max-height:85vh;object-fit:contain;border-radius:4px}
    .lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .lightbox-close:hover{background:rgba(255,255,255,.25)}
    .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .lightbox-nav:hover{background:rgba(255,255,255,.25)}
    .lightbox-prev{left:16px}
    .lightbox-next{right:16px}
    .lightbox-counter{position:absolute;bottom:20px;color:rgba(255,255,255,.7);font-size:13px}
    .detail-header{padding:1rem 1rem .5rem}
    .d-tag-row{display:flex;gap:6px;align-items:center;margin-bottom:.6rem;flex-wrap:wrap}
    .d-age{font-size:12px;color:#bbb}
    .d-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#111;margin-bottom:.4rem;line-height:1.2}
    .d-loc{font-size:13px;color:#aaa;margin-bottom:.75rem}
    .d-price{font-size:28px;font-weight:500;color:var(--g);margin-bottom:.75rem}
    .d-stats{display:flex;gap:.5rem;flex-wrap:wrap}
    .d-stat{background:var(--gl);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:500;color:var(--g)}
    .action-strip{display:flex;gap:8px;padding:.75rem 1rem;background:var(--white);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .action-strip .btn{flex:1;font-size:13px;padding:10px 8px}
    .detail-section{padding:1rem;border-bottom:1px solid var(--border)}
    .detail-section h2{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin-bottom:.75rem}
    .desc-text{font-size:14px;color:#666;line-height:1.8;font-weight:300}
    .feat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem}
    .feat-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#555}
    .feat-ico{width:30px;height:30px;border-radius:7px;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    #property-map{height:260px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);margin-bottom:.75rem}
    .nearby-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .nearby-tabs::-webkit-scrollbar{display:none}
    .nearby-tab{padding:.6rem 1rem;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;-webkit-tap-highlight-color:transparent;flex-shrink:0}
    .nearby-tab.active{color:var(--g);border-bottom-color:var(--g)}
    .nearby-list{display:flex;flex-direction:column;gap:.5rem}
    .nearby-item{display:flex;align-items:center;gap:10px;padding:.75rem;background:#fafaf8;border-radius:10px;border:1px solid var(--border)}
    .nearby-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .ni-bus{background:#e8f0fd}.ni-school{background:var(--gl)}.ni-hospital{background:#fdf0e6}.ni-shop{background:#f4eafc}
    .nearby-info{flex:1}
    .nearby-name{font-size:13px;font-weight:500;color:#111}
    .nearby-dist{font-size:11px;color:#aaa;margin-top:2px}
    .nearby-loading,.nearby-empty{text-align:center;padding:1.5rem;color:var(--muted);font-size:13px}
    .enq-card{padding:1rem;background:var(--white)}
    .enq-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:.2rem}
    .enq-by{font-size:12px;color:#aaa;margin-bottom:1rem}
    .enq-form{display:flex;flex-direction:column;gap:10px}
    .divider-text{display:flex;align-items:center;gap:8px;margin:.25rem 0}
    .divider-text span{font-size:11px;color:#ddd}
    .divider-text::before,.divider-text::after{content:'';flex:1;border-top:1px solid var(--border)}
    .call-btn{width:100%;background:transparent;border:1.5px solid var(--g);color:var(--g);padding:12px;border-radius:var(--rp);font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
    .agent-row{display:flex;gap:10px;align-items:center;padding-top:1rem;margin-top:1rem;border-top:1px solid #f0ede6}
    .agent-av{width:40px;height:40px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--g);flex-shrink:0}

    .mort-section{padding:1rem;border-bottom:1px solid var(--border)}
    .mort-section h2{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin-bottom:.75rem}
    .mort-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
    .mort-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;font-size:14px;background:#fafaf8;color:#333;outline:none;font-family:'DM Sans',sans-serif}
    .mort-input:focus{border-color:#1a5c45}
    .mort-label{font-size:11px;font-weight:500;color:#888;display:block;margin-bottom:3px}
    .mort-result{background:#e9f4ef;border-radius:12px;padding:1rem;text-align:center;margin-top:.5rem}
    .mort-monthly{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#1a5c45}
    .mort-meta{font-size:11px;color:#888;margin-top:4px}

    .no-photo-placeholder{background:linear-gradient(135deg,#c8dfd4,#e9f4ef);display:flex;align-items:center;justify-content:center;font-size:50px;width:100%;height:100%}
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>
  <div class="breadcrumb">
    <span onclick="window.location.href='../pages/search.html'">← Search</span> · <span id="bc-loc">Loading…</span>
  </div>

  <div id="page-content">
    <div class="loading-wrap"><div class="spinner"></div><span>Loading property…</span></div>
  </div>

  <script>
    window.MOVIN_API_URL = 'https://movin-backend-production-1fb3.up.railway.app'
    window.GOOGLE_MAPS_KEY = 'AIzaSyAvuyk032ZHZ1L_ZlFfqMhOSVz1Vncp6hk'
  </script>
  <script src="../js/icons.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script>
    renderNav()
    const listingId = new URLSearchParams(window.location.search).get('id')

    function loadGoogleMaps() {
      return new Promise(resolve => {
        if (window.google) { resolve(); return }
        const s = document.createElement('script')
        s.src = 'https://maps.googleapis.com/maps/api/js?key=' + window.GOOGLE_MAPS_KEY + '&libraries=places'
        s.onload = resolve
        document.head.appendChild(s)
      })
    }

    async function geocodeAddress(address) {
      return new Promise((resolve, reject) => {
        const geocoder = new google.maps.Geocoder()
        geocoder.geocode({ address: address + ', Ireland' }, (results, status) => {
          if (status === 'OK') resolve(results[0].geometry.location)
          else reject(new Error('Could not find location'))
        })
      })
    }

    async function renderMap(listing) {
      try {
        await loadGoogleMaps()
        const address = listing.address_line1 + ' ' + (listing.address_area || '') + ' ' + listing.county + ' ' + (listing.eircode || '')
        const location = await geocodeAddress(address)
        const map = new google.maps.Map(document.getElementById('property-map'), {
          center: location, zoom: 15,
          mapTypeControl: false, streetViewControl: true, fullscreenControl: true,
          styles: [{ featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] }]
        })
        new google.maps.Marker({
          position: location, map: map, title: listing.title,
          icon: { path: google.maps.SymbolPath.CIRCLE, scale: 10, fillColor: '#1a5c45', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }
        })
        return { map, location }
      } catch(e) {
        const el = document.getElementById('property-map')
        if (el) el.innerHTML = '<div style="height:260px;display:flex;align-items:center;justify-content:center;background:#f7f5f0;border-radius:14px;color:#aaa;font-size:14px">📍 Map unavailable</div>'
        return null
      }
    }

    const nearbyTypes = {
      bus:      { type: 'bus_station', icon: '🚌', cls: 'ni-bus' },
      school:   { type: 'school',      icon: '🏫', cls: 'ni-school' },
      hospital: { type: 'hospital',    icon: '🏥', cls: 'ni-hospital' },
      shop:     { type: 'supermarket', icon: '🛒', cls: 'ni-shop' },
    }

    let mapInstance = null
    let locationInstance = null
    let nearbyCache = {}

    async function loadNearby(type) {
      const listEl = document.getElementById('nearby-list')
      if (!listEl) return
      if (!mapInstance || !locationInstance) {
        listEl.innerHTML = '<div class="nearby-empty">Map not loaded yet</div>'
        return
      }
      if (nearbyCache[type]) { renderNearby(type, nearbyCache[type]); return }
      listEl.innerHTML = '<div class="nearby-loading">🔍 Finding nearby places…</div>'
      const service = new google.maps.places.PlacesService(mapInstance)
      const config = nearbyTypes[type]
      service.nearbySearch({ location: locationInstance, radius: 1000, type: config.type }, (results, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK) {
          nearbyCache[type] = results.slice(0, 6)
          renderNearby(type, nearbyCache[type])
        } else {
          listEl.innerHTML = '<div class="nearby-empty">No nearby places found</div>'
        }
      })
    }

    function renderNearby(type, places) {
      const listEl = document.getElementById('nearby-list')
      const config = nearbyTypes[type]
      if (!places.length) { listEl.innerHTML = '<div class="nearby-empty">None found nearby</div>'; return }
      listEl.innerHTML = places.map(function(p) {
        var dist = ''
        if (google.maps.geometry) {
          dist = ' · ' + Math.round(google.maps.geometry.spherical.computeDistanceBetween(locationInstance, p.geometry.location)) + 'm'
        }
        return '<div class="nearby-item"><div class="nearby-icon ' + config.cls + '">' + config.icon + '</div><div class="nearby-info"><div class="nearby-name">' + p.name + '</div><div class="nearby-dist">' + p.vicinity + dist + '</div></div></div>'
      }).join('')
    }

    function switchNearbyTab(type, el) {
      document.querySelectorAll('.nearby-tab').forEach(function(t) { t.classList.remove('active') })
      el.classList.add('active')
      loadNearby(type)
    }

    function fmtPrice(price, type) {
      return '€' + Number(price).toLocaleString('en-IE') + (type === 'rent' ? '/mo' : '')
    }

    var galleryPhotos = []
    var galleryIndex  = 0
    var lbPhotos      = []
    var lbIndex       = 0

    function buildGallery(listing) {
      galleryPhotos = listing.photos || []
      galleryIndex  = 0

      if (!galleryPhotos.length) {
        return '<div class="gallery-wrap"><div class="gallery-hero-placeholder">🏠</div></div>'
      }

      var heroHtml =
        '<div class="gallery-wrap">' +
          '<div class="gallery-hero" onclick="openLightbox(0)" id="gallery-hero">' +
            '<img id="gallery-main-img" src="' + galleryPhotos[0].url + '" alt="' + listing.title + '" loading="eager"/>' +
            (galleryPhotos.length > 1 ?
              '<button class="gallery-nav gallery-prev" onclick="event.stopPropagation();slideGallery(-1)">&#8249;</button>' +
              '<button class="gallery-nav gallery-next" onclick="event.stopPropagation();slideGallery(1)">&#8250;</button>' : '') +
            '<div class="gallery-counter">📷 <span id="gallery-cur">1</span>/' + galleryPhotos.length + '</div>' +
          '</div>'

      if (galleryPhotos.length > 1) {
        heroHtml += '<div class="gallery-thumbs" id="gallery-thumbs">'
        for (var i = 0; i < galleryPhotos.length; i++) {
          heroHtml += '<div class="gallery-thumb-item' + (i===0?' active':'') + '" data-idx="' + i + '" onclick="goToPhoto(' + i + ')">' +
            '<img src="' + galleryPhotos[i].url + '" loading="lazy"/>' +
          '</div>'
        }
        heroHtml += '</div>'
      }

      heroHtml += '</div>'
      return heroHtml
    }

    function slideGallery(dir) {
      if (!galleryPhotos.length) return
      galleryIndex = (galleryIndex + dir + galleryPhotos.length) % galleryPhotos.length
      goToPhoto(galleryIndex)
    }

    function goToPhoto(idx) {
      galleryIndex = idx
      var img = document.getElementById('gallery-main-img')
      var cur = document.getElementById('gallery-cur')
      if (img) img.src = galleryPhotos[idx].url
      if (cur) cur.textContent = idx + 1
      document.querySelectorAll('.gallery-thumb-item').forEach(function(el) {
        el.classList.toggle('active', parseInt(el.dataset.idx) === idx)
      })
      // Scroll thumb into view
      var thumbEl = document.querySelector('.gallery-thumb-item[data-idx="' + idx + '"]')
      if (thumbEl) thumbEl.scrollIntoView({ behavior:'smooth', inline:'nearest', block:'nearest' })
    }

    // ── Lightbox ──────────────────────────────────────────────────────────────
    function openLightbox(idx) {
      lbPhotos = galleryPhotos
      lbIndex  = idx
      var lb = document.getElementById('lightbox')
      if (!lb) return
      lb.classList.add('open')
      updateLightbox()
      document.body.style.overflow = 'hidden'
    }

    function closeLightbox() {
      var lb = document.getElementById('lightbox')
      if (lb) lb.classList.remove('open')
      document.body.style.overflow = ''
    }

    function slideLightbox(dir) {
      lbIndex = (lbIndex + dir + lbPhotos.length) % lbPhotos.length
      updateLightbox()
    }

    function updateLightbox() {
      var img = document.getElementById('lb-img')
      var ctr = document.getElementById('lb-counter')
      if (img) img.src = lbPhotos[lbIndex].url
      if (ctr) ctr.textContent = (lbIndex + 1) + ' / ' + lbPhotos.length
    }

    // Swipe support for lightbox
    var lbTouchX = 0
    document.addEventListener('keydown', function(e) {
      var lb = document.getElementById('lightbox')
      if (!lb || !lb.classList.contains('open')) return
      if (e.key === 'Escape') closeLightbox()
      if (e.key === 'ArrowLeft') slideLightbox(-1)
      if (e.key === 'ArrowRight') slideLightbox(1)
    })

    async function load() {
      if (!listingId) { window.location.href = 'search.html'; return }
      try {
        var L = await API.listings.get(listingId)
        API.listings.trackView(listingId).catch(function(){})

        document.title = L.title + ' – Movin.ie'

        // SEO: Open Graph + canonical
        var canonUrl = 'https://movin.ie/pages/listing.html?id=' + L.id
        document.getElementById('og-title').content = L.title + ' – ' + fmtPrice(L.price, L.listing_type) + ' | Movin.ie'
        document.getElementById('og-desc').content  = L.description ? L.description.substring(0, 160) : 'View this property on Movin.ie'
        document.getElementById('og-url').content   = canonUrl
        document.getElementById('tw-title').content = L.title + ' – ' + fmtPrice(L.price, L.listing_type)
        document.getElementById('tw-desc').content  = (L.bedrooms ? L.bedrooms + ' bed · ' : '') + (L.bathrooms ? L.bathrooms + ' bath · ' : '') + L.county + ' · Movin.ie'
        document.getElementById('canonical').href   = canonUrl
        if (L.photos && L.photos.length) {
          var imgUrl = L.photos[0].url
          document.getElementById('og-image').content = imgUrl
          document.getElementById('tw-image').content = imgUrl
        }

        // SEO: JSON-LD structured data
        var ld = {
          '@context': 'https://schema.org',
          '@type': 'RealEstateListing',
          'name': L.title,
          'description': L.description,
          'url': canonUrl,
          'price': L.price,
          'priceCurrency': 'EUR',
          'address': {
            '@type': 'PostalAddress',
            'streetAddress': L.address_line1,
            'addressLocality': L.address_area || L.county,
            'addressRegion': L.county,
            'postalCode': L.eircode || '',
            'addressCountry': 'IE'
          }
        }
        if (L.floor_size_m2) ld['floorSize'] = { '@type': 'QuantitativeValue', 'value': L.floor_size_m2, 'unitCode': 'MTK' }
        if (L.bedrooms)      ld['numberOfRooms'] = L.bedrooms
        if (L.photos && L.photos.length) ld['image'] = L.photos.map(function(p) { return p.url })
        var ldScript = document.createElement('script')
        ldScript.type = 'application/ld+json'
        ldScript.textContent = JSON.stringify(ld)
        document.head.appendChild(ldScript)

        // Track recently viewed
        trackRecentlyViewed(L.id, L.title, L.price, L.listing_type, L.photos && L.photos.length ? L.photos[0].url : null)
        document.getElementById('bc-loc').textContent = (L.address_area || L.county) + ' · ' + L.title

        var typeLabel = L.listing_type === 'rent' ? 'To Rent' : L.listing_type === 'share' ? 'Sharing' : 'For Sale'
        var badgeClass = L.listing_type === 'rent' ? 'badge-o' : 'badge-g'

        var galleryHTML = buildGallery(L)

        var featuresHTML = ''
        if (L.parking || L.garden || L.garage || L.alarm) {
          featuresHTML = '<div class="detail-section"><h2>Features</h2><div class="feat-grid">'
          if (L.parking)    featuresHTML += '<div class="feat-item"><div class="feat-ico"><svg width="14" height="14" style="color:#1a5c45"><use href="/icons.svg#icon-parking"/></svg></div>Parking</div>'
          if (L.garden)     featuresHTML += '<div class="feat-item"><div class="feat-ico"><svg width="14" height="14" style="color:#1a5c45"><use href="/icons.svg#icon-garden"/></svg></div>Garden</div>'
          if (L.garage)     featuresHTML += '<div class="feat-item"><div class="feat-ico"><svg width="14" height="14" style="color:#1a5c45"><use href="/icons.svg#icon-garage"/></svg></div>Garage</div>'
          if (L.alarm)      featuresHTML += '<div class="feat-item"><div class="feat-ico"><svg width="14" height="14" style="color:#1a5c45"><use href="/icons.svg#icon-alarm"/></svg></div>Alarm</div>'
          if (L.furnished)  featuresHTML += '<div class="feat-item"><div class="feat-ico"><svg width="14" height="14" style="color:#1a5c45"><use href="/icons.svg#icon-sofa"/></svg></div>Furnished</div>'
          if (L.pets)       featuresHTML += '<div class="feat-item"><div class="feat-ico"><svg width="14" height="14" style="color:#1a5c45"><use href="/icons.svg#icon-pets"/></svg></div>Pet-friendly</div>'
          featuresHTML += '</div></div>'
        }

        var callBtn = L.lister_phone
          ? '<div class="divider-text"><span>or</span></div><button class="call-btn" onclick="window.location.href=\'tel:' + L.lister_phone + '\'">📞 ' + L.lister_phone + '</button>'
          : ''

        var phoneBtn = L.lister_phone
          ? '<button class="btn btn-ghost" style="font-size:13px" onclick="window.location.href=\'tel:' + L.lister_phone + '\'"><svg width="16" height="16" style="color:#1a5c45;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-phone"/></svg> Call</button>'
          : ''

        var mapsQuery = encodeURIComponent(L.address_line1 + ' ' + (L.address_area || '') + ' ' + L.county + ' Ireland')

        document.getElementById('page-content').innerHTML =
          '<div class="gallery-scroll">' + galleryHTML + '</div>' +

          '<div class="detail-header">' +
            '<div class="d-tag-row">' +
              '<span class="badge ' + badgeClass + '">' + typeLabel + '</span>' +
              (L.ber_rating ? '<span class="badge badge-g" style="background:#2aaa50">BER: ' + L.ber_rating + '</span>' : '') +
              '<span class="d-age">Listed ' + timeAgo(L.created_at) + '</span>' +
              (((Date.now() - new Date(L.created_at).getTime()) / 86400000) < 7 ? '<span class="badge" style="background:#e07b3f;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600">NEW</span>' : '') +
            '</div>' +
            '<h1 class="d-title">' + L.title + '</h1>' +
            '<div class="d-loc">📍 ' + L.address_line1 + (L.address_area ? ', ' + L.address_area : '') + ', ' + L.county + (L.eircode ? ' · <strong>' + L.eircode + '</strong>' : '') + '</div>' +
            '<div class="d-price">' + fmtPrice(L.price, L.listing_type) + '</div>' +
            '<div class="d-stats">' +
              (L.bedrooms ? '<span class="d-stat"><svg width="13" height="13" style="color:#1a5c45;vertical-align:middle"><use href="/icons.svg#icon-bed"/></svg> ' + L.bedrooms + ' beds</span>' : '') +
              (L.bathrooms ? '<span class="d-stat"><svg width="13" height="13" style="color:#1a5c45;vertical-align:middle"><use href="/icons.svg#icon-bath"/></svg> ' + L.bathrooms + ' baths</span>' : '') +
              (L.floor_size_m2 ? '<span class="d-stat"><svg width="13" height="13" style="color:#1a5c45;vertical-align:middle"><use href="/icons.svg#icon-size"/></svg> ' + L.floor_size_m2 + 'm²</span>' : '') +
              (L.ber_rating ? '<span class="d-stat"><svg width="13" height="13" style="color:#1a5c45;vertical-align:middle"><use href="/icons.svg#icon-ber"/></svg> ' + L.ber_rating + '</span>' : '') +
              '<span class="d-stat"><svg width="13" height="13" style="color:#1a5c45;vertical-align:middle"><use href="/icons.svg#icon-eye"/></svg> ' + (L.views || 0) + ' views</span>' +
              (L.floor_size_m2 && L.price ? '<span class="d-stat"><svg width="13" height="13" style="color:#1a5c45;vertical-align:middle"><use href="/icons.svg#icon-euro"/></svg> €' + Math.round(parseInt(L.price) / parseInt(L.floor_size_m2)).toLocaleString('en-IE') + '/m²</span>' : '') +
            '</div>' +
          '</div>' +

          '<div class="action-strip">' +
            '<button class="btn btn-primary" style="font-size:13px" onclick="document.getElementById(\'enq-section\').scrollIntoView({behavior:\'smooth\'})"><svg width="16" height="16" style="color:#fff;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-message"/></svg> Enquire</button>' +
            phoneBtn +
            '<button class="btn btn-ghost" id="save-btn" style="font-size:13px" onclick="handleSave()"><svg width="16" height="16" style="color:#1a5c45;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-heart"/></svg> Save</button>' +
            '<button class="btn btn-ghost" style="font-size:13px;padding:10px 8px" onclick="copyLink()" id="copy-btn"><svg width="14" height="14" style="color:#1a5c45;vertical-align:middle"><use href="/icons.svg#icon-document"/></svg> Copy</button>' +
            '<a href="https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(window.location.href) + '" target="_blank" class="btn btn-ghost" style="font-size:13px;padding:10px 8px;color:#1877f2;border-color:#1877f2"><svg width="14" height="14" viewBox="0 0 24 24" fill="#1877f2" style="vertical-align:middle"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg> Share</a>' +
            '<a href="https://wa.me/?text=' + encodeURIComponent('Check out this property on Movin.ie: ' + L.title + ' - ' + fmtPrice(L.price, L.listing_type) + ' - ' + window.location.href) + '" target="_blank" class="btn btn-ghost" style="font-size:13px;color:#25d366;border-color:#25d366"><svg width="16" height="16" viewBox="0 0 24 24" fill="#25d366" style="vertical-align:middle"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> Share</a>' +
          '</div>' +

          '<div class="detail-section"><h2>About this property</h2><p class="desc-text">' + L.description.replace(/\n/g, '<br>') + '</p></div>' +

          (L.listing_type !== 'rent' && L.listing_type !== 'share' ? '<div class="mort-section" id="mort-section"><h2>Mortgage calculator</h2><div class="mort-grid"><div><label class="mort-label">Purchase price (€)</label><input class="mort-input" id="mc-price" type="number" value="' + L.price + '" oninput="calcMort()"/></div><div><label class="mort-label">Deposit (€)</label><input class="mort-input" id="mc-deposit" type="number" value="' + Math.round(parseInt(L.price)*0.1) + '" oninput="calcMort()"/></div><div><label class="mort-label">Term (years)</label><input class="mort-input" id="mc-term" type="number" value="30" min="5" max="35" oninput="calcMort()"/></div><div><label class="mort-label">Interest rate (%)</label><input class="mort-input" id="mc-rate" type="number" value="4.0" step="0.1" min="0.1" oninput="calcMort()"/></div></div><div class="mort-result" id="mc-result"><div class="mort-monthly" id="mc-monthly">€0/mo</div><div class="mort-meta" id="mc-meta">Enter values above to calculate</div></div></div>' : '') +

          featuresHTML +

          '<div class="detail-section">' +
            '<h2>Location &amp; nearby</h2>' +
            '<div id="property-map"></div>' +
            '<p style="font-size:12px;color:#aaa;margin-bottom:1rem">📍 ' + L.address_line1 + ', ' + (L.address_area || '') + ', ' + L.county +
              (L.eircode ? ' &nbsp;·&nbsp; <strong style="color:#555">' + L.eircode + '</strong>' : '') +
              ' &nbsp;·&nbsp; <a href="https://www.google.com/maps/search/?api=1&query=' + mapsQuery + '" target="_blank" style="color:var(--g)">Open in Google Maps ↗</a>' +
            '</p>' +
            '<div class="nearby-tabs">' +
              '<div class="nearby-tab active" onclick="switchNearbyTab(\'bus\', this)"><svg width="14" height="14" style="color:#1a5c45;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-location"/></svg> Bus stops</div>' +
              '<div class="nearby-tab" onclick="switchNearbyTab(\'school\', this)"><svg width="14" height="14" style="color:#1a5c45;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-document"/></svg> Schools</div>' +
              '<div class="nearby-tab" onclick="switchNearbyTab(\'hospital\', this)"><svg width="14" height="14" style="color:#1a5c45;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-alarm"/></svg> Hospitals</div>' +
              '<div class="nearby-tab" onclick="switchNearbyTab(\'shop\', this)"><svg width="14" height="14" style="color:#1a5c45;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-euro"/></svg> Shops</div>' +
            '</div>' +
            '<div id="nearby-list" class="nearby-list"><div class="nearby-loading">Loading map…</div></div>' +
          '</div>' +

          '<div class="enq-card" id="enq-section">' +
            '<div class="enq-title">Send an enquiry</div>' +
            '<div class="enq-by">Listed by <strong>' + (L.lister_name || 'Owner') + '</strong></div>' +
            '<div id="enq-alert"></div>' +
            '<form class="enq-form" onsubmit="submitEnquiry(event, \'' + L.id + '\')">' +
              '<input class="form-input" type="text" name="sender_name" placeholder="Your name" required/>' +
              '<input class="form-input" type="email" name="sender_email" placeholder="Email address" required/>' +
              '<input class="form-input" type="tel" name="sender_phone" placeholder="Phone (optional)"/>' +
              '<textarea class="form-input form-textarea" name="message" placeholder="Hi, I\'d like to arrange a viewing…" required></textarea>' +
              '<button type="submit" class="btn btn-primary btn-block" id="enq-btn"><svg width="16" height="16" style="color:#fff;flex-shrink:0;display:inline-block;vertical-align:middle" aria-hidden="true"><use href="/icons.svg#icon-message"/></svg> Send enquiry</button>' +
            '</form>' +
            callBtn +
            '<div class="agent-row">' +
              '<div class="agent-av">' + (L.lister_name || 'O').charAt(0).toUpperCase() + '</div>' +
              '<div>' +
                '<div style="font-size:13px;font-weight:500">' + (L.lister_name || 'Property owner') + '</div>' +
                '<div style="font-size:11px;color:#bbb">Listed on movin.ie</div>' +
              '<div style="margin-top:6px"><button onclick="reportListing(\'' + L.id + '\')" style="background:none;border:none;color:#ccc;font-size:11px;cursor:pointer;padding:0;font-family:inherit">Report this listing</button></div>' +
              '</div>' +
            '</div>' +
          '</div>' +

          '<div id="similar-section" style="padding:1rem">' +
            '<div style="font-family:Playfair Display,serif;font-size:18px;font-weight:700;color:#111;margin-bottom:1rem">Similar properties</div>' +
            '<div id="similar-list"><div class="loading-wrap"><div class="spinner"></div></div></div>' +
          '</div>' +

          '<footer class="site-footer" id="site-footer"></footer>'

        var mapResult = await renderMap(L)
        if (mapResult) {
          mapInstance = mapResult.map
          locationInstance = mapResult.location
          loadNearby('bus')
        }

        if (document.getElementById('mc-price')) calcMort()
        // Load similar properties
        loadSimilar(L)

        // Render footer
        if (typeof renderFooter === 'function') renderFooter()

      } catch(e) {
        document.getElementById('page-content').innerHTML =
          '<div style="padding:3rem 1rem;text-align:center">' +
            '<div style="font-size:40px;margin-bottom:1rem">😕</div>' +
            '<h3 style="font-family:Playfair Display,serif;margin-bottom:.5rem">Property not found</h3>' +
            '<p style="color:#aaa;margin-bottom:1rem">' + e.message + '</p>' +
            '<button class="btn btn-primary" onclick="window.location.href=\'search.html\'">Back to search</button>' +
          '</div>'
      }
    }

    async function loadSimilar(L) {
      var el = document.getElementById('similar-list')
      if (!el) return
      try {
        var res = await fetch(window.MOVIN_API_URL + '/api/listings?listing_type=' + L.listing_type + '&county=' + encodeURIComponent(L.county) + '&limit=4')
        var data = await res.json()
        var similar = (data.listings || []).filter(function(s) { return s.id !== L.id }).slice(0, 3)
        if (!similar.length) {
          document.getElementById('similar-section').style.display = 'none'
          return
        }
        el.innerHTML = similar.map(function(s) {
          var photo = s.primary_photo
            ? (s.primary_photo.startsWith('http') ? s.primary_photo : window.MOVIN_API_URL + s.primary_photo)
            : null
          var thumb = photo
            ? '<img src="' + photo + '" style="width:100%;height:100%;object-fit:cover" loading="lazy"/>'
            : '<span style="font-size:28px">🏡</span>'
          return '<div onclick="window.location.href=\'listing.html?id=' + s.id + '\'" style="display:flex;gap:.75rem;padding:.85rem;background:#fff;border:1px solid var(--border);border-radius:14px;cursor:pointer;margin-bottom:.65rem;-webkit-tap-highlight-color:transparent">' +
            '<div style="width:80px;height:62px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--gl);display:flex;align-items:center;justify-content:center">' + thumb + '</div>' +
            '<div style="flex:1;min-width:0">' +
              '<div style="font-size:13px;font-weight:500;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px">' + s.title + '</div>' +
              '<div style="font-size:11px;color:#aaa;margin-bottom:4px">' + (s.address_area || s.county) + '</div>' +
              '<div style="font-size:15px;font-weight:500;color:var(--green)">' + fmtPrice(s.price, s.listing_type) + '</div>' +
            '</div>' +
          '</div>'
        }).join('')
      } catch(e) {
        document.getElementById('similar-section').style.display = 'none'
      }
    }

    async function submitEnquiry(e, lid) {
      e.preventDefault()
      var btn = document.getElementById('enq-btn')
      var alertEl = document.getElementById('enq-alert')
      btn.disabled = true
      btn.textContent = 'Sending…'
      try {
        await API.enquiries.send(lid, {
          sender_name:  e.target.sender_name.value,
          sender_email: e.target.sender_email.value,
          sender_phone: e.target.sender_phone.value,
          message:      e.target.message.value
        })
        alertEl.innerHTML = '<div class="alert alert-ok">✓ Enquiry sent! The owner will be in touch soon.</div>'
        e.target.reset()
      } catch(err) {
        alertEl.innerHTML = '<div class="alert alert-err">' + err.message + '</div>'
      }
      btn.disabled = false
      btn.textContent = 'Send enquiry'
    }

    async function handleSave() {
      if (!API.auth.isLoggedIn()) { toast('Sign in to save listings', 'info'); return }
      var btn = document.getElementById('save-btn')
      var saved = btn.textContent.includes('♥')
      try {
        if (saved) {
          await API.saved.unsave(listingId)
          btn.textContent = '♡ Save'
          toast('Removed from saved')
        } else {
          await API.saved.save(listingId)
          btn.textContent = '♥ Saved'
          toast('Saved! ♥')
        }
      } catch(e) { toast(e.message, 'error') }
    }

    // Track recently viewed
    function trackRecentlyViewed(id, title, price, type, photo) {
      try {
        var rv = JSON.parse(localStorage.getItem('movin_rv') || '[]')
        rv = rv.filter(function(x) { return x.id !== id })
        rv.unshift({ id: id, title: title, price: price, type: type, photo: photo, ts: Date.now() })
        rv = rv.slice(0, 6)
        localStorage.setItem('movin_rv', JSON.stringify(rv))
      } catch(e) {}
    }

    // Mortgage calculator
    function calcMort() {
      var price   = parseFloat(document.getElementById('mc-price')?.value || 0)
      var deposit = parseFloat(document.getElementById('mc-deposit')?.value || 0)
      var term    = parseFloat(document.getElementById('mc-term')?.value || 30)
      var rate    = parseFloat(document.getElementById('mc-rate')?.value || 4.0)
      if (!price || price <= deposit) {
        document.getElementById('mc-monthly').textContent = '—'
        document.getElementById('mc-meta').textContent = 'Deposit must be less than price'
        return
      }
      var principal = price - deposit
      var r = (rate / 100) / 12
      var n = term * 12
      var monthly = r === 0 ? principal / n : (principal * r * Math.pow(1+r,n)) / (Math.pow(1+r,n) - 1)
      var total = monthly * n
      document.getElementById('mc-monthly').textContent = '€' + Math.round(monthly).toLocaleString('en-IE') + '/mo'
      document.getElementById('mc-meta').textContent = 'Total repayment: €' + Math.round(total).toLocaleString('en-IE') + ' · Loan: €' + Math.round(principal).toLocaleString('en-IE')
    }

    // Copy link
    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(function() {
        var btn = document.getElementById('copy-btn')
        btn.textContent = '✓ Copied!'
        setTimeout(function() { btn.innerHTML = '<svg width="14" height="14" style="color:#1a5c45;vertical-align:middle"><use href="/icons.svg#icon-document"/></svg> Copy'; }, 2000)
      })
    }

    // Report listing
    function reportListing(id) {
      var reason = prompt('Why are you reporting this listing?

1. Fake or fraudulent
2. Wrong location
3. Already sold/rented
4. Misleading photos
5. Other

Type your reason:')
      if (!reason) return
      fetch(window.MOVIN_API_URL + '/api/listings/' + id + '/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason: reason })
      }).then(function() {
        toast('Report submitted. Thank you.', 'info')
      }).catch(function() {
        toast('Could not submit report. Please email hello@movin.ie', 'error')
      })
    }

    // Touch swipe for gallery
    document.addEventListener('touchstart', function(e) {
      if (e.target.closest('.gallery-wrap')) lbTouchX = e.touches[0].clientX
    }, { passive: true })
    document.addEventListener('touchend', function(e) {
      if (!e.target.closest('.gallery-wrap')) return
      var dx = e.changedTouches[0].clientX - lbTouchX
      if (Math.abs(dx) > 40) slideGallery(dx < 0 ? 1 : -1)
    }, { passive: true })

    load()
  </script>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" ontouchstart="lbTouchX=event.touches[0].clientX" ontouchend="var dx=event.changedTouches[0].clientX-lbTouchX;if(Math.abs(dx)>40)slideLightbox(dx<0?1:-1)">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <img class="lightbox-img" id="lb-img" src="" alt="Property photo"/>
    <button class="lightbox-nav lightbox-prev" onclick="slideLightbox(-1)">&#8249;</button>
    <button class="lightbox-nav lightbox-next" onclick="slideLightbox(1)">&#8250;</button>
    <div class="lightbox-counter" id="lb-counter">1 / 1</div>
  </div>

</body>
