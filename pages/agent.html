<!DOCTYPE html>
<html lang="en">
  <script>
(function(){
  var t=localStorage.getItem('movin_theme');
  if(t&&t!=='auto') document.documentElement.setAttribute('data-theme',t);
})()
</script>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agent Profile – Movin.ie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/main.css"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/favicon-apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png"/>
<meta name="theme-color" content="#1a5c45"/>
<style>
:root{--g:#1a5c45;--gl:#e9f4ef;--o:#e07b3f;--border:#e8e4dc}
.agent-hero{background:linear-gradient(135deg,var(--g),#0e3d2e);padding:2.5rem 1.5rem;color:#fff}
.agent-card{display:flex;gap:1.25rem;align-items:center;max-width:700px;margin:0 auto}
.agent-av{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0;border:3px solid rgba(255,255,255,.3)}
.agent-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:.25rem}
.agent-meta{font-size:13px;color:rgba(255,255,255,.7)}
.agent-stats{display:flex;gap:1.5rem;margin-top:.75rem}
.agent-stat-n{font-size:20px;font-weight:700}
.agent-stat-l{font-size:11px;color:rgba(255,255,255,.6)}
.listings-wrap{max-width:700px;margin:0 auto;padding:1.5rem 1rem 4rem}
.listings-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#111;margin-bottom:1rem}
.spinner{width:24px;height:24px;border-radius:50%;border:3px solid var(--gl);border-top-color:var(--g);animation:spin .7s linear infinite;margin:2rem auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav class="nav" id="main-nav"></nav>

<div id="agent-hero" class="agent-hero">
  <div class="agent-card">
    <div class="agent-av" id="av-letter">?</div>
    <div>
      <div class="agent-name" id="agent-name">Loading…</div>
      <div class="agent-meta" id="agent-meta">Movin.ie member</div>
      <div class="agent-stats">
        <div><div class="agent-stat-n" id="stat-listings">—</div><div class="agent-stat-l">Active listings</div></div>
        <div><div class="agent-stat-n" id="stat-views">—</div><div class="agent-stat-l">Total views</div></div>
      </div>
    </div>
  </div>
</div>

<div class="listings-wrap">
  <div class="listings-title">All listings</div>
  <div id="agent-listings"><div class="spinner"></div></div>
</div>

<footer class="site-footer" id="site-footer"></footer>

<script>window.MOVIN_API_URL = 'https://movin-backend-production-1fb3.up.railway.app'</script>
<script src="../js/icons.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
renderNav()

var agentId = new URLSearchParams(window.location.search).get('id')

async function loadAgent() {
  if (!agentId) { window.location.href = 'search.html'; return }
  try {
    // Fetch agent's active listings
    var res = await fetch(window.MOVIN_API_URL + '/api/listings?user_id=' + agentId + '&limit=50')
    var data = await res.json()
    var listings = data.listings || []

    if (!listings.length) {
      document.getElementById('agent-listings').innerHTML =
        '<div style="text-align:center;padding:2rem;color:#aaa">No active listings found.</div>'
      return
    }

    // Get agent name from first listing
    var name = listings[0].lister_name || 'Property owner'
    var totalViews = listings.reduce(function(s,l) { return s + (l.views||0) }, 0)

    document.getElementById('av-letter').textContent = name.charAt(0).toUpperCase()
    document.getElementById('agent-name').textContent = name
    document.getElementById('agent-meta').textContent = 'Listed on Movin.ie · ' + listings[0].county
    document.getElementById('stat-listings').textContent = listings.length
    document.getElementById('stat-views').textContent = totalViews.toLocaleString('en-IE')
    document.title = name + ' – Movin.ie'

    document.getElementById('agent-listings').innerHTML =
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem">' +
      listings.map(function(l) { return buildPropertyCard(l) }).join('') +
      '</div>'

    if (typeof renderFooter === 'function') renderFooter()
  } catch(e) {
    document.getElementById('agent-listings').innerHTML =
      '<div style="text-align:center;padding:2rem;color:#aaa">Could not load listings: ' + e.message + '</div>'
  }
}

loadAgent()
</script>
</body>
</html>
