  <script>
    renderNav('rent')
    renderGuide({
      eyebrow:  'Renter guide',
      h1:       "The renter's guide to <em>Ireland</em>",
      intro:    'Everything you need before signing a lease — RPZ rent caps, deposit limits, RTB registration, your rights as a tenant and what landlords can and cannot do.',
      updated:  '2026-05-09',
      readTime: '9 min read',
      sections: [
        { id:'find', title:'1. Finding a place to rent', html:
          '<p>The Irish rental market moves fast. Best practice:</p>'+
          '<ul>'+
          '<li><strong>Set up alerts</strong> — on Movin you can save filters and be emailed the moment a match goes live.</li>'+
          '<li><strong>Have your paperwork ready</strong> — see <a href="#paperwork">section 2</a>. Landlords often pick the most prepared applicant first.</li>'+
          '<li><strong>Use multiple tools</strong> — Movin\'s <a href="../search.html?listing_type=rent">Search</a>, <a href="../map-search.html">Map view</a>, and <a href="../drive-time.html">drive-time search</a> for commuting near work or college.</li>'+
          '<li><strong>Sharing instead of renting whole?</strong> See our <a href="../sharing.html">rooms-to-share page</a>.</li>'+
          '</ul>'
        },
        { id:'paperwork', title:'2. What to bring to a viewing', html:
          '<p>Bring (or have ready to send by email):</p>'+
          '<ul>'+
          '<li><strong>Photo ID</strong> — passport or driving licence.</li>'+
          '<li><strong>Recent payslips</strong> (typically last 3 months) <em>or</em> proof of student finance.</li>'+
          '<li><strong>Employer / college reference letter</strong>.</li>'+
          '<li><strong>Previous landlord reference letter</strong> if you\'ve rented before.</li>'+
          '<li><strong>PPS number</strong> (the landlord may need it for RTB registration).</li>'+
          '<li><strong>Bank statement</strong> showing 2–3 months of consistent income.</li>'+
          '</ul>'+
          '<div class="gd-tip"><div class="gd-callout-ico"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg></div><div>Save it all in a single PDF. Email it to landlords as soon as you express interest. The applicant who replies first with a complete pack often wins the property.</div></div>'
        },
        { id:'deposit', title:'3. Deposits — the legal limit', html:
          '<p>Since 9 August 2021, Irish law caps a security deposit at the equivalent of <strong>one month\'s rent</strong>. Anything more is illegal under the Residential Tenancies (No. 2) Act 2021.</p>'+
          '<ul>'+
          '<li><strong>Standard:</strong> 1 month deposit + 1 month rent in advance = total <strong>2 months</strong> upfront.</li>'+
          '<li>The deposit is <strong>refundable in full</strong> at the end of the tenancy if rent is paid up and there\'s no damage beyond fair wear and tear.</li>'+
          '<li>Deposit disputes are resolved by the <a href="https://www.rtb.ie/" target="_blank">RTB</a>.</li>'+
          '</ul>'+
          '<div class="gd-warn"><div class="gd-callout-ico"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg></div><div>If a landlord asks for a deposit larger than one month\'s rent, that\'s a red flag. Walk away and report to the RTB.</div></div>'
        },
        { id:'rpz', title:'4. Rent Pressure Zones (RPZ)', html:
          '<p>Most of Ireland\'s major rental markets — including <strong>all of Dublin and Cork city, Galway, Limerick, Waterford and many commuter belt counties</strong> — are designated Rent Pressure Zones.</p>'+
          '<p>Inside an RPZ:</p>'+
          '<ul>'+
          '<li>Rent can only be increased once every <strong>12 months</strong>.</li>'+
          '<li>Increases are capped at the lower of <strong>2% per annum</strong> or the rate of inflation (HICP).</li>'+
          '<li>Landlords must serve <strong>90 days written notice</strong> of any rent review and use the official RTB form.</li>'+
          '</ul>'+
          '<p>Check whether a property is in an RPZ at <a href="https://onestopshop.rtb.ie/" target="_blank">RTB.ie</a> before signing.</p>'
        },
        { id:'tenancy-types', title:'5. Tenancy types', html:
          '<p>The most common tenancies in Ireland are:</p>'+
          '<ul>'+
          '<li><strong>Tenancy of unlimited duration</strong> (since June 2022) — the default for any new private rental. There\'s no fixed end date; the tenancy continues until the tenant leaves or the landlord ends it under one of the legal grounds.</li>'+
          '<li><strong>Fixed-term lease</strong> — usually 12 months. Both parties commit; breaking early can incur rent until a replacement is found.</li>'+
          '<li><strong>Rent-a-room (live-in landlord)</strong> — different rules apply because the landlord lives in the property. <a href="#rent-a-room">More below</a>.</li>'+
          '<li><strong>Student tenancies</strong> — special rules for purpose-built student accommodation only.</li>'+
          '</ul>'
        },
        { id:'rtb', title:'6. RTB registration & your protection', html:
          '<p>Most non-rent-a-room tenancies must be <strong>registered with the Residential Tenancies Board (RTB)</strong> within one month. The landlord pays the fee.</p>'+
          '<p>RTB registration unlocks important protections for you:</p>'+
          '<ul>'+
          '<li>Free dispute resolution if there\'s a deposit, rent or eviction issue.</li>'+
          '<li>Access to RTB tenancy records confirming the tenancy is real.</li>'+
          '<li>Penalties on landlords who don\'t register.</li>'+
          '</ul>'+
          '<p>You can verify registration at any time on the <a href="https://www.rtb.ie/" target="_blank">RTB website</a>.</p>'
        },
        { id:'eviction', title:'7. Notice periods if you\'re asked to leave', html:
          '<p>By law, the landlord must give you written notice using the RTB\'s sample form, served in advance. The minimum notice period depends on how long you\'ve been there:</p>'+
          '<table>'+
            '<thead><tr><th>Length of tenancy</th><th>Minimum notice (after RTB rules)</th></tr></thead>'+
            '<tbody>'+
              '<tr><td>Less than 6 months</td><td>90 days</td></tr>'+
              '<tr><td>6 months – 1 year</td><td>152 days</td></tr>'+
              '<tr><td>1 – 3 years</td><td>180 days</td></tr>'+
              '<tr><td>3 – 7 years</td><td>196 days</td></tr>'+
              '<tr><td>7 – 8 years</td><td>224 days</td></tr>'+
              '<tr><td>Over 8 years</td><td>196 days</td></tr>'+
            '</tbody>'+
          '</table>'+
          '<p>Landlords can only serve notice for one of the legal grounds (selling, family use, refurbishment, breach of tenant duties, etc.) and must include supporting evidence on the notice form.</p>'+
          '<div class="gd-note"><div class="gd-callout-ico"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></div><div>If you receive a notice of termination you believe is invalid, you have <strong>90 days from receipt</strong> to dispute it via the RTB. Don\'t miss this window.</div></div>'
        },
        { id:'rent-a-room', title:'8. Sharing a home with the owner (rent-a-room)', html:
          '<p>Renting a room in a home where the owner also lives is the <strong>rent-a-room scheme</strong>. It\'s outside Part 4 of the Residential Tenancies Act, so:</p>'+
          '<ul>'+
          '<li><strong>RTB registration is not required.</strong></li>'+
          '<li>Notice periods are usually agreed in the licence agreement, not by the RTB schedule.</li>'+
          '<li>The owner can earn up to <strong>€14,000/year tax-free</strong> (rent-a-room relief).</li>'+
          '<li>You typically share kitchen, bathroom and living spaces with the owner and any other tenants.</li>'+
          '</ul>'+
          '<p>Browse <a href="../sharing.html">rooms to rent</a> on Movin if this suits you.</p>'
        },
        { id:'rights', title:'9. Your rights as a tenant', html:
          '<p>Your basic rights under Irish residential tenancy law:</p>'+
          '<ul>'+
          '<li><strong>Quiet enjoyment</strong> of the property — the landlord can\'t enter without reasonable notice (typically 24h, except emergencies).</li>'+
          '<li><strong>Repairs</strong> — the landlord must keep the structure, heating, plumbing and electrics in good working order.</li>'+
          '<li><strong>Refund of deposit</strong> at end of tenancy minus only legitimate damage / unpaid rent.</li>'+
          '<li><strong>Privacy</strong> — the landlord can\'t demand access to inspect at any time.</li>'+
          '<li><strong>Receipts</strong> — for any cash rent payments.</li>'+
          '<li><strong>RTB redress</strong> if any of the above are breached.</li>'+
          '</ul>'+
          '<p>Full official guide at <a href="https://www.citizensinformation.ie/en/housing/renting-a-home/" target="_blank">Citizens Information</a>.</p>'
        }
      ],
      related: [
        { eyebrow:'For tenants',label:'Sharing & rooms', href:'../sharing.html' },
        { eyebrow:'For tenants',label:'Houses to rent',  href:'../house-for-rent.html' },
        { eyebrow:'For tenants',label:'Apartments to rent', href:'../apartment-for-rent.html' },
        { eyebrow:'For owners',label:"Landlord's guide", href:'landlords.html' },
        { eyebrow:'Tools',     label:'Find by drive time', href:'../drive-time.html' },
        { eyebrow:'Reference',label:'Help & FAQ',         href:'../faq.html' }
      ],
      cta: {
        h:     'Search rentals across Ireland',
        p:     'Houses, apartments, bungalows and rooms to share — filter by area, beds, max rent and more.',
        label: 'Browse properties to rent',
        href:  '../search.html?listing_type=rent'
      },
      breadcrumbs: [
        { name:'Home',          url:'/' },
        { name:'Resources',     url:'/pages/faq.html' },
        { name:"Renter's guide", url:'/pages/guides/renting.html' }
      ]
    })
