  <script>
    renderNav('buy')
    renderGuide({
      eyebrow:  'Mortgage guide',
      h1:       'How <em>Irish mortgages</em> actually work',
      intro:    "From Central Bank borrowing rules to fixed vs variable rates, term length and drawdown — a clear, plain-English guide to getting an Irish mortgage in 2026.",
      updated:  '2026-05-09',
      readTime: '11 min read',
      sections: [
        { id:'rules', title:'1. The Central Bank rules', html:
          '<p>The Central Bank of Ireland sets borrowing limits all regulated lenders must respect. Two thresholds matter:</p>'+
          '<h3>Loan-to-Value (LTV) — how much you can borrow vs the property price</h3>'+
          '<table>'+
            '<thead><tr><th>Buyer type</th><th>Max LTV</th><th>Min deposit</th></tr></thead>'+
            '<tbody>'+
              '<tr><td>First-time buyer</td><td>90%</td><td>10%</td></tr>'+
              '<tr><td>Second + subsequent buyer</td><td>90%</td><td>10% (most lenders apply 80% in practice)</td></tr>'+
              '<tr><td>Buy-to-let (investor)</td><td>70%</td><td>30%</td></tr>'+
            '</tbody>'+
          '</table>'+
          '<h3>Loan-to-Income (LTI) — how much you can borrow vs your salary</h3>'+
          '<table>'+
            '<thead><tr><th>Buyer type</th><th>Max LTI</th></tr></thead>'+
            '<tbody>'+
              '<tr><td>First-time buyer</td><td>4× gross household income</td></tr>'+
              '<tr><td>Second + subsequent</td><td>3.5× gross</td></tr>'+
            '</tbody>'+
          '</table>'+
          '<p>Lenders can issue a small share of mortgages outside these limits each year (\"<strong>exemptions</strong>\"). They\'re not guaranteed and not a strategy to plan around.</p>'+
          '<div class="gd-tip"><div class="gd-callout-ico"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg></div><div>A simple shortcut: <strong>FTB couple, €100k combined gross</strong> → up to <code>4× = €400k mortgage</code>, plus your 10% deposit = €440k purchase. Use our <a href="../tools.html#mortgage">mortgage calculator</a> for your numbers.</div></div>'
        },
        { id:'aip', title:'2. Approval in Principle (AIP)', html:
          '<p>Before you start house-hunting, get <strong>Approval in Principle</strong> — also called Mortgage in Principle. It tells you exactly what a lender is willing to give you, valid for 6 months, and is free.</p>'+
          '<p>Read our dedicated <a href="mortgage-in-principle.html">Approval in Principle guide</a> for the full process and document checklist.</p>'
        },
        { id:'fixed-vs-variable', title:'3. Fixed vs variable rates', html:
          '<h3>Fixed rate</h3>'+
          '<p>Your interest rate is locked for an agreed period (1, 3, 5, 7, 10 or even 20 years on some products). Repayments are predictable. Most Irish borrowers fix for 3–5 years.</p>'+
          '<ul>'+
          '<li>✓ Certainty — your payment can\'t go up.</li>'+
          '<li>✗ Break fees apply if you exit early (paying off, switching lender) before the fixed term ends.</li>'+
          '</ul>'+
          '<h3>Variable rate</h3>'+
          '<p>Your rate moves with the market. The lender can change it at any time (subject to giving notice).</p>'+
          '<ul>'+
          '<li>✓ Flexibility — overpay, pay off, or switch lender any time without break fees.</li>'+
          '<li>✗ Less predictable — your monthly payment can rise.</li>'+
          '</ul>'+
          '<h3>Green mortgages</h3>'+
          '<p>Most Irish lenders now offer a <strong>discounted rate for properties with BER B3 or higher</strong>. The discount is typically <code>0.2–0.4%</code> off the standard fixed rate — meaningful over 25 years. Bring your BER cert.</p>'
        },
        { id:'term', title:'4. Mortgage term — how long should you borrow for?', html:
          '<p>Most Irish mortgages run 25–30 years. The maximum is the <strong>lender\'s retirement-age cut-off</strong> (typically 70 for the youngest borrower).</p>'+
          '<ul>'+
          '<li><strong>Longer term</strong> = lower monthly repayment, but more total interest over the life of the loan.</li>'+
          '<li><strong>Shorter term</strong> = higher monthly repayment, but you own the home faster and pay much less interest.</li>'+
          '</ul>'+
          '<p>A common middle ground: take the longer term for safety, then <strong>overpay</strong> when you can. Most variable-rate Irish mortgages allow unlimited overpayments at no charge.</p>'
        },
        { id:'comparing', title:'5. How to compare lenders properly', html:
          '<p>Don\'t just compare headline rates. Look at:</p>'+
          '<ul>'+
          '<li><strong>The APRC</strong> (Annual Percentage Rate of Charge) — the proper apples-to-apples cost figure.</li>'+
          '<li><strong>Cashback</strong> — many lenders offer 1–3% of the loan as cashback on drawdown. Tempting but factor it against rate.</li>'+
          '<li><strong>Free valuation</strong> offers (~€150 saved).</li>'+
          '<li><strong>Free legal fees</strong> contributions on switcher mortgages.</li>'+
          '<li><strong>Overpayment policy</strong> on the chosen rate.</li>'+
          '<li><strong>Service speed</strong> — turnaround time for AIP, full offer and drawdown varies enormously between lenders.</li>'+
          '</ul>'+
          '<p>The current Irish mortgage lenders for residential borrowers are: AIB / EBS / Haven, Bank of Ireland, PTSB, Avant Money, ICS Mortgages and a few smaller specialists.</p>'+
          '<div class="gd-note"><div class="gd-callout-ico"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></div><div>A <strong>mortgage broker</strong> can compare every lender for you (often free to you — they\'re paid commission by the lender). Brokers shine when your application is non-standard (self-employed, contract worker, complex household).</div></div>'
        },
        { id:'drawdown', title:'6. From offer to drawdown', html:
          '<ol class="gd-steps">'+
          '<li>You receive your <strong>Letter of Loan Offer</strong> — a long, scary document. Your solicitor will review and explain.</li>'+
          '<li>You arrange <strong>mortgage protection insurance</strong> (life cover for the mortgage amount; mandatory under Irish law unless you have an exemption) and <strong>home insurance</strong>.</li>'+
          '<li>Your solicitor signs contracts on your behalf and you pay the balance of the deposit.</li>'+
          '<li>Closing day: lender wires the loan to your solicitor → solicitor wires the full price to the seller\'s solicitor → keys released to you.</li>'+
          '<li>Your <strong>first repayment</strong> is typically taken one month from drawdown.</li>'+
          '</ol>'
        },
        { id:'switching', title:'7. Switching mortgage (remortgaging)', html:
          '<p>Once you\'re a year or so into your mortgage and your fixed rate is about to expire (or you\'re on a high variable), check whether switching pays off.</p>'+
          '<p>Reasons to switch:</p>'+
          '<ul>'+
          '<li>A meaningfully better rate at another lender.</li>'+
          '<li><strong>Cashback</strong> on switching — often 1–2% of the new loan.</li>'+
          '<li>Your <strong>BER has improved</strong> after retrofitting → green-rate eligibility.</li>'+
          '<li>Your <strong>LTV has dropped</strong> below 60–70% (better rates often kick in at lower LTV bands).</li>'+
          '</ul>'+
          '<p>Switching costs include solicitor fees (€1,000–€1,500 typical), and a fresh property valuation. Most lenders contribute towards these on switcher mortgages.</p>'
        },
        { id:'help', title:'8. Help to Buy & First Home Scheme', html:
          '<p>Two state schemes can substantially boost your buying power on <em>new builds</em>:</p>'+
          '<ul>'+
          '<li><strong>Help to Buy (HTB)</strong> — up to €30,000 (or 10% of the price) refunded to FTBs purchasing a new build under €500,000.</li>'+
          '<li><strong>First Home Scheme (FHS)</strong> — the State takes up to a 30% equity stake (20% with HTB) so you need a smaller mortgage.</li>'+
          '</ul>'+
          '<p>Both apply only to <strong>new builds</strong> and have eligibility limits. Read the full breakdown in our <a href="buying.html#htb">buyer guide</a>.</p>'
        }
      ],
      related: [
        { eyebrow:'Mortgages',label:'Mortgage in Principle (AIP)', href:'mortgage-in-principle.html' },
        { eyebrow:'Tools',    label:'Mortgage calculator',         href:'../tools.html#mortgage' },
        { eyebrow:'Tools',    label:'Stamp duty calculator',       href:'../tools.html#stamp' },
        { eyebrow:'For buyers',label:"Buyer's guide",              href:'buying.html' },
        { eyebrow:'Energy',   label:'BER & energy efficiency',     href:'energy-efficiency.html' },
        { eyebrow:'Reference',label:'Help & FAQ',                  href:'../faq.html' }
      ],
      cta: {
        h:     'See what you can afford',
        p:     'Use our mortgage calculator to estimate monthly repayments and the price range you can comfortably target.',
        label: 'Open the mortgage calculator',
        href:  '../tools.html#mortgage'
      },
      breadcrumbs: [
        { name:'Home',         url:'/' },
        { name:'Resources',    url:'/pages/faq.html' },
        { name:'Mortgage guide', url:'/pages/guides/mortgage.html' }
      ]
    })
